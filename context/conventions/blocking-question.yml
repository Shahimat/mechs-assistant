key: blocking-question
rule: |
  Формат блокирующего вопроса.

  Если для продвижения задачи нужен ответ юзера — задать явно и
  остановиться. Не двигаться дальше по задаче, пока ответ не получен.

  Одно сообщение — либо блок вопросов, либо действия по задаче. Не
  смешивать в одном ответе «пункты, на которые жду решения» с
  «пунктами, по которым иду дальше по своим дефолтам, пока юзер
  думает». Такое сообщение расщепляется на два потока: вопросы
  решаются инерцией «ок», реальные ответы теряются, часть работы уже
  сделана поверх недосогласованных допущений.

  **Формат вопросов:**

    - пронумерованные, конкретные — один вопрос покрывает одну развилку;
    - у каждого — явный список вариантов, нумерованный (1, 2, 3 или
      1.1, 1.2, 1.3 при вложенности), не буквенный A/B/C; вложенные
      под-варианты — через тире;
    - у каждого — предлагаемый дефолт с обоснованием одной строкой
      («по умолчанию предлагаю вариант N, потому что …»);
    - дефолт — это предложение, а не принятое решение: пока юзер не
      подтвердил, вариант не применён, работа не идёт.

  После отправки блока вопросов — стоп: файлы не трогаем, план не
  расширяем, соседние под-задачи не подхватываем. Работа возобновляется
  только после явных ответов юзера.

  Проверка себя перед вопросом: этот блок действительно блокирует
  продвижение, или можно пойти дальше и вернуться? Ложные вопросы
  приучают юзера кликать «ок» по инерции — реальные развилки после
  этого сливаются с шумом.
