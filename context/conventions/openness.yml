key: openness
rule: |
  Принцип открытости. Совместная работа человека и агента должна быть
  прозрачной и доступной. Никаких «потаённых» знаний, которые видит только
  один агент или один разработчик у себя локально.

  Все устойчивые уточнения по проекту — договорённости, конвенции,
  реквизиты, ожидаемое поведение, ручные процедуры, крупные решения и
  вехи — идут в проектную документацию репозитория: `docs/entities/`,
  `docs/behavior/`, `docs/manuals/`, `context/conventions/`,
  `context/project.yml`, `CHANGELOG.md`. Так они видны любому, кто
  открывает репу, переживают смену агента, пересборку окружения и
  очистку локальных настроек.

  Команда «запомни» / «зафиксируй» / «сохрани это» по умолчанию =
  правка проектной документации (`docs/entities/`, `docs/behavior/`,
  `docs/manuals/`, `context/conventions/`, `context/project.yml`,
  `CHANGELOG.md`), а не memory / hooks / глобальные настройки
  инструмента. Проговаривать «запомни и внеси в доку» юзеру избыточно —
  это дефолт. Если юзер хочет именно memory или hooks — он скажет явно.

  НЕ переносить проектные уточнения в:
    - автоматическую memory агента, которая persists across
      conversations вне репозитория;
    - hooks и глобальные настройки инструментария
      (`~/.claude/settings.json`, глобальные `CLAUDE.md` вне репы);
    - внутренние заметки, невидимые ни человеку, ни другому агенту,
      открывшему проект.

  Memory и hooks — личное скрытое состояние инструмента у конкретного
  пользователя, невидимое ревьюеру PR. Проектный факт живёт в репе и
  проходит ревью как код. Соблазн «запомнить на будущее» — сигнал, что
  нужно завести файл в проектной документации.

  **Страховочный hook.** Правило про memory — мягкое, полагается на
  дисциплину. Отсюда — дополнительная страховка на уровне Claude Code:
  `PreToolUse` hook `~/.claude/hooks/block-memory-write-for-<contract-key>.sh`
  блокирует запись в `~/.claude/projects/*/memory/*` для проектов,
  подписанных на данный контракт. Логика hook — читает
  `sync.contract.key` из `context/project.yml` текущего CWD, сверяет с
  суффиксом собственного имени. Совпало → блок. Не совпало / файла нет
  → тихо пропускает. Отсутствие hook работу не блокирует — это
  страховка, не единственная линия обороны. Manual с пошаговой
  настройкой — `docs/manuals/setup-safety-hooks.md`.

  **Разграничение с открытостью.** Hook живёт вне репозитория
  (`~/.claude/hooks/...`), но это не нарушение принципа: hook не
  хранит проектных знаний, только страховку от нарушения правила,
  полностью опубликованного в этой convention. Правило — в репо; hook
  — техническая реализация правила у конкретного пользователя.
