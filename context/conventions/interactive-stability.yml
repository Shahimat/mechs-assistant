key: interactive-stability
rule: |
  Интерактивные элементы (кнопки, поля ввода, слайдеры, toggle-группы,
  hover-тултипы) не должны при взаимодействии сдвигать окружающий layout.
  Пользователь наводит/кликает/переключает — соседние блоки остаются на
  месте.

  **Частые причины «плясания» и как их избежать:**

    - Появление/исчезновение элемента (кнопка «Сбросить», bageг,
      подпись) → рендерим всегда, скрываем через `visibility: hidden`
      или `opacity: 0` + `pointer-events: none`. Не через условный
      `null`.
    - Изменение размера при hover/focus/active (padding, border-width,
      font-weight) → резервируем места через прозрачный border той же
      толщины / фиксированный min-width / min-height.
    - Slider с `valueLabelDisplay="auto"` — тултип появляется над
      ползунком и сдвигает вертикальный поток. Использовать `"on"`
      (всегда показан) или `"off"` (никогда) — не `"auto"`. Значение
      уровня показывать рядом текстом.
    - Tooltip'ы с `arrow` и без явно резервированного места — при
      появлении раздвигают контент. `Tooltip` внутри inline-flex ok,
      но не в grid-cell без min-height.

  **Проверка:** взаимодействовать с элементом в браузере — если
  соседние блоки сместились хотя бы на 1px, это баг стабильности.

  **Приоритет** — стабильность важнее лаконичности разметки. Пустой
  прозрачный placeholder предпочтительнее, чем conditional render.
