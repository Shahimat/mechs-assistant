key: assets-preservation
rule: |
  Ассеты (готовые webp в `assets/images/**`, исходники в `assets/raw/**`,
  иконки данных в `data/icons/**`) **не удаляем даже если UI-компонент,
  который на них ссылался, снят**. Дизайновые вложения могут
  пригодиться повторно: смена решения, восстановление раздела,
  переиспользование иконки в другом каталоге / плитке / карточке —
  типичные сценарии в этом проекте.

  **Что делать вместо удаления:**
    - При сносе плитки/view/каталога убираем только импорт и запись в
      массиве роутов/плиток. Файл в `assets/images/**` оставляем на
      месте.
    - Если файл кажется совсем неактуальным, помечаем это в
      `verified_note` соответствующей entity, а не удаляем.
    - Bundler (rspack + `asset/resource`) не тянет неимпортированные
      файлы в бандл — «лежат зря» они только на диске, не в проде.

  **Исключения:** можно удалить, если файл действительно ошибочный
  (дубликат с опечаткой в имени, вырезанный некорректно) — но
  обязательно с явного «да» юзера в этом же сообщении. Автоматический
  cleanup при снятии фичи запрещён.

  **Восстановление.** Все ассеты `tracked` в git (см. `.gitignore`),
  восстановление удалённого файла — через `git show <sha>:<path> >
  <path>`.

  Прецедент: 2026-07-13 удалили `assets/images/catalog-icons/currencies.webp`
  при снятии плитки «Валюта» — юзер попросил вернуть; файл восстановлен
  из git.
