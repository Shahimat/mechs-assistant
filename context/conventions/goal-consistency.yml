key: goal-consistency
rule: |
  Кросс-целевая проверка непротиворечивости. Обязательна при **создании новой
  цели** и при **уточнении плана существующей цели** (добавление / изменение
  задачи, зависимости, статуса). Цель — не допустить, чтобы структура целей
  внутренне противоречила себе: например, одна цель «настроить бэкенд X», а
  другая — «удалить бэкенд X».

  **Когда прогонять.** Перед сохранением правки в `goals.yaml` или любой
  `goal--<key>.yaml`. Если правка задевает несколько целей — прогон один раз
  по всему множеству после всех правок.

  **Множество проверки.** Подцели программ (`goal--<key>.yaml` с полем
  `program:`) и обычные цели — **одно множество**. Программа сама (`program--
  <key>.yaml`) со своим платформенным `tasks` тоже участвует: её задачи не
  должны дублировать задачи подцелей, а блокер подцели «ждёт платформу
  программы» должен реально покрываться задачей программы (аналог проверки 4).

  **Что проверять** (пройтись по всем целям и подцелям из `goals.yaml`):

    1. **Конфликт интентов.** Нет пары целей/задач, где одна создаёт/настраивает
       сущность, а другая её убирает/отменяет, без явной последовательной
       связи через `depends_on`. Пример-антипаттерн: goal A «поднять backend на
       Cloudflare», goal B «отказаться от backend'а». Если это осознанный
       переход (сначала A, потом разворот к B) — он должен быть выражен как одна
       эволюция (правка/замена цели или явная зависимость + пометка «заменяет»),
       а не две живые противоречащие цели.
    2. **Дублирование задач.** Одна и та же работа не висит задачей в двух целях.
       Если работа нужна двум целям — она принадлежит одной (по смыслу), вторая
       выражает потребность через `depends_on`.
    3. **Циклы зависимостей.** `depends_on` не образует цикл (A→B→A).
    4. **Согласованность зависимостей.** Если цель A `depends_on` B, то задача B,
       которую A ждёт, реально существует в B (или B закрывает эту потребность).
       Осиротевших ссылок на удалённые/переименованные цели нет.
    5. **Согласованность приоритетов.** Если A блокирована целью B
       (`depends_on`), B не должна стоять в `goals.yaml` ниже (позже) A без
       обоснования — иначе приоритет противоречит зависимости.

  **Что делать при конфликте.** Не сохранять молча. Остановиться, одной строкой
    сообщить юзеру найденное противоречие и предложить разрешение (слить цели,
    переформулировать, ввести зависимость, пометить одну как заменяющую другую).
    Действовать после решения юзера.

  Вшито в сценарии `plan` и `execute` (см. `workflow.md`): шаг «прогон
  goal-consistency» — часть распределения плана по целям.
