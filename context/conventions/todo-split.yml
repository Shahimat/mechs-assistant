key: todo-split
rule: |
  У проекта две системы задач — не смешивать. Каждая оптимизирована
  под свою аудиторию.

  **Структура целей `context/views/goals.yaml` + `goal--<key>.yaml`** —
    internal operational state. Аудитория: юзер + агент.
    Содержит: технические задачи (refactor, dev-decisions, инструкции
    для агента), стратегию (цели, зависимости между ними), внутренние
    блокеры. Задачи внутри цели — секции `blocker` / `high` / `medium` /
    `low`, приоритет = порядок; формат
    `суть → фаза-коммита → блокеры/зависимости`. Приоритет самих целей =
    порядок в `goals.yaml`. Устройство и жизненный цикл — convention
    `goals`; кросс-целевая непротиворечивость — convention
    `goal-consistency`. Правится агентом при появлении/уточнении/закрытии
    задач и целей. (Заменила прежние `active.todo` + `roadmap.md`.)

  **`todo` в Google Sheets → `data--todo-list` → `/todo`** — public
    product transparency.
    Аудитория: игроки.
    Содержит: product-facing задачи и планы («добавить фильтр X»,
    «починить отображение Y»), обычными формулировками без
    инженерной кухни. См. convention `ui-no-engineering-leak`.
    Правится вручную через Sheets (редакторы: 2 разработчика +
    доверенные игроки), синк — `sync:sheets` + `build:data`.

  **Куда что писать:**
    - «переименовать переменную», «мигрировать eslint», «выбрать zod
      или valibot» → в задачу соответствующей цели (структура целей).
    - «добавить в каталог поле цены за прокачку», «сделать сравнение
      двух мехов» → Sheets (юзер видит план).
    - Крупная product-новость, которая ещё требует dev-работы, может
      жить в обеих системах: в структуре целей — с техническими
      деталями и приоритетом, в Sheets — короткой продуктовой
      формулировкой. Синхронизация вручную (не автоматически) —
      разработчик решает, когда пункт готов к публикации.

  **Чтение агентом.** В сценариях `report` / «где активно» / «какие
  задачи в работе» — читать оба источника: структуру целей
  (`context/views/goals.yaml` + релевантные `goal--<key>.yaml`) и
  `data/overrides/todos.yml` (файл в git, всегда актуален относительно
  последнего sync; `.build/data/todos.json` может отставать между
  build'ами).
