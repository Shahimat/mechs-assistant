key: verification
rule: |
  Правило верификации из операционного контракта:
    - Перед планом задачи — прочитать relevant entities/behaviors по
      namespace + relevant conventions.
    - После изменения кода — поставить `verified: false` на затронутых
      `docs/behavior/*.yml`. Обязательно, даже если уверен, что поведение
      не сломалось: доверие подтверждается свежей проверкой, не памятью.
    - Если могу проверить сразу (`grep`, чтение кода, `npm test`,
      `npm run build`, `npm run lint`) — проверить, поставить
      `verified: true`, `verified_at: <ISO>`, короткий `verified_note`
      о том, чем именно проверил.
    - Если проверить сейчас нельзя — оставить `verified: false` и
      написать в `verified_note`, что мешает.
    - Не трогать `verified: true` без свежей проверки. Это самое дорогое
      поле в модели.
    - Противоречия entity ↔ behavior ↔ code — сразу поднимать юзеру,
      не молчать.
