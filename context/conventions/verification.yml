key: verification
rule: |
  Правило верификации из операционного контракта.

  Требование «читать проектную документацию перед правкой» вынесено в
  `context/workflow.md`, секция «Чтение перед правкой» — единственный
  источник правила.

  При любом изменении кода:

    - Обновить затронутые `docs/entities/*.yml`, если поменялась
      спецификация (значимые поля, зависимости, `features_*`).
    - Если правка меняет **семантику** поведения — публичный API,
      конфиг, схему данных, зависимость, инвариант, то что описано в
      `scenarios` затронутого behavior — поставить `verified: false`
      на затронутых `docs/behavior/*.yml`. Внутренний рефакторинг без
      изменения поведения, переименование локальных переменных,
      форматирование, косметика — `verified` не сбрасывают. Граница
      проходит по факту: изменилось ли то, что записано в `scenarios`.
      Не девальвируй `verified` шумовыми сбросами — иначе поле перестанет
      что-либо значить.
    - Если можно проверить сразу (`grep`, чтение кода, `npm test`,
      `npm run build`, `npm run lint`) — проверить, поставить
      `verified: true`, `verified_at: <ISO>`, короткий `verified_note`
      о том, чем именно проверил.
    - Если проверить сейчас нельзя — оставить `verified: false` и в
      `verified_note` кратко написать, что мешает.
    - Не трогать `verified: true` без свежей проверки. Это самое дорогое
      поле в модели.
    - Противоречия entity ↔ behavior ↔ code — сразу поднимать юзеру,
      не молчать.
