key: changelog
rule: |
  `CHANGELOG.md` в корне репозитория — журнал крупных решений. Отвечает
  на «когда» и «почему», не на «как сейчас». В дефолтный порядок чтения
  не входит: читается по запросу мотивации решения, таймлайна или
  обзорного среза.

  **Что попадает:**
    - крупные архитектурные решения;
    - смена стека / отказ от стека;
    - изменения внешних зависимостей (смена провайдера, major-версии);
    - крупные правки `context/` (перестройка модели, переезд правил
      между слоями);
    - ключевые вехи (первый релиз, включение нового namespace, закрытие
      миграции).

  **Что НЕ попадает:**
    - багфиксы;
    - рефакторинг без смены поведения;
    - косметика, форматирование;
    - точечные изменения, полностью покрываемые `git log`.

  **Формат записи — жёсткий: одна запись = одна строка.** Не влезает —
  уровень абстракции не тот, детали идут в `entities/*.yml`, PR или
  `git log`. Шаблон:

  ```
  - YYYY-MM-DD · <суть решения одной фразой> · <почему одной фразой>
  ```

  Разделитель — `·` (интерпункт). Маркер `-`, без вложенных списков и
  полей. Дата ISO (`YYYY-MM-DD`). Порядок в файле — обратный
  хронологический, свежее сверху.

  Первая строка файла — заголовок `# Журнал решений`, дальше одна
  поясняющая строка про границу «когда/почему vs как сейчас», дальше —
  список записей.

  **Когда обновляется.** Запись появляется в фазе `docs` (см.
  `workflow.md`, «Атомарность фаз и коммитов»), вместе с обновлением
  затронутых `entities/*.yml` и `behavior/*.yml`. В фазах `feat` / `fix`
  / `refactor` / `test` / `perf` / `chore` / `style` `CHANGELOG.md` не
  трогают — атомарность типа изменения важнее.

  Фаза внесла изменение, попадающее под критерий журнала, но записи
  нет — это незавершённая фаза, не «уже готово» (см. convention
  `consistency-check`).

  Ссылки на затронутые слои, авторов, PR-номера в строку не размещаются:
  они выводятся из `entities/*.yml`, `behavior/*.yml` и `git blame`.
