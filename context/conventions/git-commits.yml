key: git-commits
rule: |
  Коммиты и push делает юзер сам. Агент коммитить и пушить не должен —
  и НЕ должен спрашивать «закоммитить?» после каждой пачки правок.

  Что делает агент:
    - Закончил работу — короткий отчёт (что сделано + git status при
      необходимости).
    - НЕ предлагает коммит, НЕ запускает `git commit / git push`.
    - Если юзер напишет «закоммитил», «запушил», «в мастере» — учитывает
      как свершившийся факт.

  Что оставляем в силе:
    - Глобальное правило `~/.claude/CLAUDE.md` о том, что любые операции,
      меняющие историю git/arc, — только после явного «да» юзера. Эта
      convention не разрешает агенту такие операции: она наоборот убирает
      промежуточный вопрос «может, закоммитим?», потому что юзер и так
      всё делает руками.
    - Если юзер сам явно просит закоммитить/запушить — тогда работаем
      по глобальному правилу: показать команды одним сообщением, дождаться
      «да», выполнить.
