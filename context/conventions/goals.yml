key: goals
rule: |
  Система целей — internal-очередь работы проекта (dev/internal, аудитория
  юзер + агент). Живёт в `context/views/`. Заменила прежние `active.todo`
  (рабочий срез) и `roadmap.md` (стратегия) — они слиты в одну структуру.

  **Устройство.**

    - `context/views/goals.yaml` — индекс целей. Упорядоченный список; порядок
      записи = **приоритет цели** (сверху — важнее / раньше). Каждая запись:
      `key`, `file` (goal--<key>.yaml), `status`, `one_liner`.
    - `context/views/goal--<key>.yaml` — одна цель. Поля:
      - `key` — совпадает с key в индексе;
      - `title` — человекочитаемое название;
      - `status` — `active` | `planned` | `paused` (см. ниже; `done` НЕ бывает);
      - `why` — зачем цель, чью боль решает, откуда взялась;
      - `description` — детальное «что»: состав, архитектура, риски, открытые
        вопросы;
      - `tasks` — разбиение по приоритету: `blocker` / `high` / `medium` / `low`.
        Внутри секции **порядок задач = их приоритет** (сверху — берёмся
        первым). Формат задачи — одна строка:
        `суть → фаза-коммита (docs/fix/refactor/feat/...) → блокеры/зависимости`.
        «Фаз»-нумерации (Phase A/M1/…) больше нет — очередь задаёт положение
        в списке;
      - `depends_on` — список `key` других целей, от которых зависит эта.
        Двусторонность не требуется, но при добавлении зависимости прогони
        `goal-consistency` (нет ли цикла, знает ли зависимая цель о связи).

  **Программы.** Крупная инициатива с общей технологической базой и набором
    подцелей заводится как **программа**, а не одна цель.

    - `context/views/program--<key>.yaml` — файл программы. Поля как у цели
      (`key`, `title`, `status`, `why`, `description`, `tasks`, `depends_on`)
      плюс `kind: program`. `tasks` программы — её **платформенный слой**:
      общая для всех подцелей работа (техбаза, сервер, транспорт синхронизации,
      авторизация). Подцель, которой платформа нужна, ставит у себя блокер-задачу
      «ждёт платформу программы», а не `depends_on` на отдельную подцель.
    - Подцель — обычный `goal--<key>.yaml` с полем `program: <key>` (совпадает с
      key программы). Живёт своей жизнью: свой `status`, свои `tasks`, свой
      жизненный цикл (решена → CHANGELOG + удаление).
    - В `goals.yaml` программа — запись с `kind: program` и вложенным списком
      `subgoals` (каждая: `key`, `file`, `status`, `one_liner`). **Порядок
      подцелей во вложенном списке = их приоритет** (как порядок целей в корне).
    - `goal-consistency` прогоняется по подцелям так же, как по обычным целям
      (подцели одной программы и цели вне программы — одно множество для проверок
      конфликтов/дублей/циклов/зависимостей).

    Программа полностью решена → её файл + все файлы подцелей уходят по общему
    жизненному циклу (CHANGELOG + удаление). Отдельная решённая подцель
    удаляется, программа и остальные подцели живут.

  **Статусы цели.** `active` — работаем сейчас / есть незакрытые задачи в
    работе. `planned` — согласована, но ещё не стартовала (ждёт
    предшественников). `paused` — сознательно отложена. Статуса `done` нет:
    решённая цель не существует в структуре (см. жизненный цикл).

  **Жизненный цикл.** Цель полностью решена → (1) запись в `CHANGELOG.md`,
    если решение подпадает под критерий журнала (см. convention `changelog`);
    (2) удалить `goal--<key>.yaml`; (3) вычеркнуть из `goals.yaml`. Done-логи
    и история закрытых задач в файле цели НЕ накапливаются — они уходят в
    CHANGELOG / git. Отдельные закрытые задачи внутри живущей цели просто
    удаляются из своей секции.

  **Куда попадает новая работа.** Любой согласованный план распределяется по
    существующим целям. Если подходящей цели нет — предложить создать новую
    (не «подвесить в воздухе»). При создании цели и при уточнении плана
    существующей — обязательный прогон `goal-consistency`.

  **Что сюда НЕ пишем.** Product-facing задачи (планы, интересные игрокам)
    живут в отдельной системе — лист `todo` в Google Sheets → `/todo`
    (см. convention `todo-split`). Реализованную архитектуру («как сейчас
    работает») — в `docs/entities|behavior/*.yml`, conventions или manuals,
    не в цель (цель смотрит вперёд).

  **Чтение агентом.** Файлы целей — рабочий срез, читаются в сценариях
    `report` / `execute` / `plan` (см. `workflow.md` и convention
    `context-minimization`), не в дефолтном обходе `docs/`.
