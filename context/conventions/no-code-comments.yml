key: no-code-comments
rule: |
  По умолчанию комментарии в коде не пишем. Правило усиливает глобальное
  «Default to writing no comments» — в этом проекте оно обязательное.

  **Что не пишем:**
    - Пересказ того, что делает код («// парсим строку», «/** сохраняет
      значение в стор */»).
    - JSDoc на очевидные функции/константы с говорящими именами.
    - Отсылки к текущему тикету/PR/фиксу (уходит в git blame и PR).
    - Комментарии-разделители, ASCII-заголовки блоков.

  **Что пишем — только когда без комментария читатель не поймёт WHY:**
    - Скрытая инвариант или ограничение (например: «поле не может быть
      null, потому что API возвращает 0 вместо null»).
    - Не очевидный workaround под конкретный баг (со ссылкой на issue).
    - Причина отклонения от общего паттерна.

  Формат разрешённого комментария — короткая одна строка, максимум две.
  Многострочные JSDoc блоки и параграфы объяснений — запрещены.

  При сомнении: не пиши. Хороший identifier заменяет описание.
