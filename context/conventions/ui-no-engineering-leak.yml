key: ui-no-engineering-leak
rule: |
  В пользовательском UI не пропускаем инженерную кухню проекта:
  внутренние идентификаторы сущностей документации (`data--*`,
  `view--*`, `parser--*`), названия MVP-эпиков («MVP2», «MVP3»),
  ссылки на overlay/схемы/резолверы, TS-типы, коммит-хэши,
  оговорки про «пока не реализовано, будет позже».

  Юзер видит **факты игры**: имена сущностей, характеристики,
  описания из вики, стоимости, совместимости. Служебная информация
  живёт в проектной документации (`docs/entities/*.yml`,
  `docs/behavior/*.yml`, `CHANGELOG.md`) и в комментариях кода — там
  же ей и место.

  **Что можно в UI:**
    - Chip'ы, лейблы, значения полей игровой сущности.
    - Короткие пояснения про игровую механику, если помогают юзеру
      («+X% на 1 стат», «Пауза ремонта»).
    - Ключи сущности (`weapon.key`, `skill.key`) — как копируемый
      технический артефакт (KeyChip), потому что игроки просят их
      для скриптов/чатов. Это допустимо: `key` = data facts, не
      про архитектуру.

  **Что нельзя:**
    - «MVP2 через `data--skill-modifiers`».
    - «RuntimeIntegration через parser-wiki».
    - «Overlay ещё не заполнен, дождитесь фазы feat».
    - «Спецификация в docs/behavior/…».
    - Отсылки на устройство парсеров, стора, роутов.

  **Прецедент:** 2026-07-14 в `SkillDetail.tsx` попала строка
  «Семантические теги (RuntimeIntegration — MVP2 через
  data--skill-modifiers)». Юзер справедливо возразил — убрали
  немедленно, convention заведена.

  Проверка перед пушом UI-правок: перечитать все видимые тексты, чтобы
  убедиться, что они читаются с позиции игрока, а не разработчика.
