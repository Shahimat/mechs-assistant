key: data-overlay
rule: |
  Overlay — точечные уточнения данных, поверх автопарса из вики.
  Доступны для ВСЕХ data-сущностей (не только гибридных loot/components):
  любые неточности автопарса поправляются через overlay.

  **Источник правды — Google Sheets.**

  Одна Google-таблица, N листов — по одному на каталог (`mechs`,
  `weapons`, `equipment`, `ammo`, `items`, `loot`, `blueprints`, `ore`,
  `components`, `currencies`, `skills`). Владелец таблицы — автор
  проекта, доступ на редактирование раздаётся через Google Drive share
  доверенным игрокам (2 разработчика + несколько игроков). Sheets —
  знакомая среда для редакторов, revision history из коробки.

  **Формат листа Sheets:**

  ```
  key                     | field1  | field2      | source_note
  loot-monster-scrap-t1   | 12      | 340         | измерил в v2
  loot-monster-shell-t2   |         | 220         |
  ```

  Первая колонка — `key` сущности (совпадает с ключом в parsed-JSON).
  Далее — колонки полей, значения перезаписывают одноимённые поля
  parsed-JSON. Пустые ячейки — «не переопределяем, оставляем parsed».
  Колонка `source_note` — свободный комментарий редактора (не попадает
  в JSON, только для внутренней синхронизации).

  **Синк из Sheets в репо.**

  Долгоживущий `parser--google-sheets` (js/ts-скрипт) при запуске тянет
  данные через Sheets API v4 (Service Account key вне репо) и
  генерирует `data/overrides/<catalog>.yml` в формате:

  ```yaml
  # data/overrides/loot.yml
  # АВТО-СГЕНЕРИРОВАНО из Google Sheets, вручную не редактировать.
  # Правки — в Sheets, следующий синк перезапишет этот файл.
  loot-monster-scrap-t1:
    weight: 12
    basePrice: 340
    _updatedAt: 2026-07-08T12:34:56Z
    _sourceRow: 42
  ```

  Запускается как часть GitHub Actions workflow `sync-and-deploy.yml`
  (кнопка `workflow_dispatch`, доступна Collaborators), либо локально
  автором для отладки. Скрипт коммитит изменения `data/overrides/*.yml`
  в репо от имени sync-бота.

  `data/overrides/*.yml` — **авто-кэш** для build-time. Вручную не
  редактируется. Правки — только в Sheets, следующий синк перезапишет.
  Файлы в репе нужны, чтобы build не требовал сетевого доступа к Sheets
  каждый раз и чтобы был git-снапшот на каждый коммит.

  **Merge при build-time.**

  Скрипт сборки (`scripts/build-data.ts`) читает
  `data/<catalog>.json` (parsed из вики) и `data/overrides/<catalog>.yml`
  (overlay из Sheets), мержит их и сохраняет метаинформацию:

  ```json
  {
    "key": "loot-monster-scrap-t1",
    "name": "Обломок монстра T1",
    "weight": 12,
    "basePrice": 340,
    "_meta": {
      "overlayFields": ["weight", "basePrice"],
      "overlayUpdatedAt": "2026-07-08T12:34:56Z",
      "overlaySource": "google-sheets:mechs-overlay/loot!row-42"
    }
  }
  ```

  Overlay побеждает parsed при конфликте полей. `_meta` используется в
  UI для визуальной подсветки уточнённых значений — тонкий маркер
  (значок / подчёркивание) + tooltip с датой последнего обновления,
  чтобы пользователь понимал «что уточнено сообществом, а что как в
  вики».

  **Иконки.** Иконка сущности хранится в основном репо под путём
  `data/icons/<catalog>/<key>.<ext>`. Если парсер не вытащил иконку
  автоматически, редактор присылает автору скриншот игрового экрана —
  агент обрезает и складывает в `data/icons/`, поле `iconPath` в
  overrides (или прямо в parsed-JSON) указывает на конечный путь.

  **Что живёт в overlay:**

    - Недостающие поля, которых нет в вики (вес и базовая цена лута;
      рецепты крафта компонентов).
    - Точечные исправления ошибок парсинга.
    - Иконки (`iconPath`), если парсер не вытащил их автоматически.
    - **Полностью новые сущности.** Если в Sheets появилась строка с
      `key`, которого нет в parsed-JSON (мех не на вики, сезонное
      оружие, свежий добавленный в игру предмет и т.п.), merger
      `scripts/build-data` заведёт запись как самостоятельную сущность
      — только из overlay-полей, с `_meta.overlayFields` и
      `_meta.overlaySource`. Такие записи попадают в счётчик
      «overlay-only» в логах билда. Обязательные поля модели (например
      `stats.durability` у Weapon) редактор должен заполнить сам,
      иначе UI покажет неполную карточку.

  **Что НЕ живёт в overlay:**

    - Массовые данные, которые должен вытаскивать парсер. Если парсер
      что-то не тянет системно — сигнал доработать парсер, а не
      пихать в overlay все записи каталога.

  **Backup Google Sheets.**

    - Встроенный: Sheets revision history в UI, откат без настройки.
    - Неявный: `data/overrides/*.yml` в git — snapshot на каждый синк.
    - Программный (опциональный): дампы в `backups/gsheets/*.json`.
      Заводим при инциденте или росте объёма редакторов (задача — в
      goal `infra`).

  **Хранение данных — всё в основном репо (вариант α).** Без внешнего
  хранилища (ни S3, ни R2, ни Synology): parsed-JSON, overlay-кэш и
  иконки лежат в git. Причины: объём (10-50 MB, потенциально до 200 MB)
  без проблем помещается в git; PR-diff при обновлении parsed-данных даёт
  бесплатный review; локальная разработка = `git clone` без ключей.
  Порог перехода на Git LFS / отдельное хранилище — «когда почувствуем
  боль» (задача-триггер — в goal `infra`).

  **Версионирование данных.** `game_patch_version` в snapshot данных +
  git-history репозитория + встроенная revision history Sheets.

  **Контекстные вариации** (цены на разных заводах, лут в разных
  локациях, боевые параметры на разных картах) — открытая тема, накапли-
  ваем факты через разведку в игре. Модель эволюционирует при подходе к
  калькулятору прокачки / боевому калькулятору. Возможные направления:
  nested `contexts` в overlay, или отдельные каталоги вроде
  `data--upgrade-costs-by-factory`. Задачи — в goal `calculator`
  (прокачка) и goal `combat-calculator` (боевые).
