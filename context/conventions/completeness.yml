key: completeness
rule: |
  Правило полноты и корректности из операционного контракта.

  **Появление.** Появилась новая сущность / behavior / задача /
  соглашение / manual → сразу заводим соответствующий файл и обновляем
  связанные ссылки. Никаких «потом добавим». Симметрично: если новое
  поведение упоминается в диалоге / существующем behavior / коде, но
  файла нет — заведи файл. Если новая convention устно согласована —
  заведи атомарный файл.

  Не уверен, что новая штука устойчива (может оказаться одноразовой) —
  заведи файл со статусом `unresolved` в `verified_note` (или отдельном
  поле), и в `context/views/active.todo` добавь пункт «вернуться и
  решить».

  **Корректность.** Новая entity / behavior / manual / convention не
  считается корректно добавленной, пока не выполнено всё из списка:

    - двусторонние ссылки entity ↔ behavior ↔ manual обновлены;
    - `context/index.yml` обновлён (запись в соответствующем namespace
      или в списке conventions);
    - `context/views/active.todo` обновлён, если появилась новая работа;
    - внесена запись в `CHANGELOG.md`, если изменение подпадает под его
      критерий (см. convention `changelog`);
    - если работа затронула подключённый модуль (создание, изменение или
      удаление файла из его `provides`) — `context/modules/<key>.yml`
      обновлён; при синхронизации — `synced_sha` соответствующего
      источника актуализирован;
    - пройдена проверка внутренней непротиворечивости (см. convention
      `consistency-check`);
    - выставлены корректные `verified` / `verified_at` (или явный
      `verified: false` + `verified_note`);
    - неочевидные изменения существующих правил приняты юзером явно.

  Создание файла без обновления связанных слоёв — некорректное частичное
  изменение. Молчаливое сохранение конфликтного состояния — тоже.
