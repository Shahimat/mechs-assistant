key: assets-layout
rule: |
  Разделение статических ассетов на слои:

  - `assets/raw/` — **исходники**. Сюда попадают png / jpg / svg /
    коллажи-заготовки, всё что редактируется дизайнером или пришло
    в чат «как идея». Не раздаётся напрямую, но tracked в git.
    Alias `@raw` (rspack + tsconfig) — только если реально нужно
    импортировать сырьё (обычно нет).

  - `assets/images/` — **готовые для прода webp**. Сюда попадают
    результаты `npm run convert:webp` (и любые другие итоговые
    ассеты, готовые к отдаче в бандле). Импортируются в код через
    alias `@img`, попадают в bundle через правило `asset/resource`
    (rspack.config.js) с contenthash в имени.

  - `public/favicon/` — фавикон и manifest'ы PWA. Копируются в
    `dist/favicon/` через `CopyRspackPlugin`, ссылаются в
    `public/index.html` относительными путями.

  **Правило.** webp (или любой другой output-формат) **не хранится
  в `assets/raw/`** — там только заготовки. Скрипт `convert:webp` по
  умолчанию кладёт webp рядом с исходником; для корректного размещения
  указывай output-путь в `assets/images/…` (см. `--help` или
  `scripts/convert-to-webp/index.ts`).

  Если появится новый тип ассетов (напр. видео `.mp4`, шрифт `.woff2`),
  правило распространяется на них так же: исходник — в `raw/`,
  сконвертированное — в `images/` (или новую специализированную
  папку `fonts/`, `videos/` рядом с `images/`).
