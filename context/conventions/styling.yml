key: styling
rule: |
  Стили компонентов — в CSS-модулях рядом с компонентом.

    - `src/components/Foo.tsx` + `src/components/Foo.module.css`.
    - Импорт: `import styles from './Foo.module.css'`.
    - Класс: `<Box className={styles.card}>`.
    - Rspack распознаёт `*.module.css` автоматически (тип `css/module`).

  MUI `sx` — только в крайних случаях, когда CSS-модуль неоправдан:
    - одноразовый layout-стиль на примитивном `<Box>` (`display: flex`,
      `gap`, `mb`);
    - условная стилизация от React state, которую неудобно выразить
      через className;
    - модификаторы переданные снаружи через prop `sx` пробрасываются
      дальше.

  Не использовать `sx` для многострочных стилей карточек, кнопок,
  типографики. Для этого — CSS-модуль.

  Не использовать `styled()` без сильной причины — предпочтение
  CSS-модулям.

  Существующий код с `sx` мигрируется постепенно, отдельными PR.
  См. `context/views/active.todo`.
