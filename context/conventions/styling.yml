key: styling
rule: |
  Стили компонентов — через MUI `styled()` из `@mui/material/styles`.

  **Организация файлов:**

    - `Component.tsx` — JSX + логика.
    - `Component.styles.ts` — все стилизованные обёртки. Экспорт:
      `export const Header = styled('div')(...)`,
      `export const Card = styled(MuiCard)(...)`.
    - Переиспользуемые styled-компоненты — `apps/web/src/styles/<name>.ts`
      (например `apps/web/src/styles/overlay.ts` c `OverlayPill`).

  **Почему styled(), а не sx / CSS-модули:**

    - Специфичность на одном уровне с MUI (emotion) — нет конфликтов
      при перекрытии встроенных стилей.
    - TypeScript-типы и доступ к theme через второй аргумент
      (`theme.palette.*`, `theme.spacing()`, `theme.vars.palette.*` при
      включённых cssVariables в `createTheme`).
    - Условные стили через props: `shouldForwardProp` исключает
      кастомные пропсы из DOM.

  **`sx` разрешён только для одноразовых inline-правок layout** на
  MUI-компоненте, где выделять styled-обёртку избыточно (например
  `<Divider sx={{ my: 2 }} />`).

  **CSS-модули не используем.** Обычные `.css` файлы допустимы только
  для глобального reset или ассетов сторонних библиотек.

  Существующий код приводится к правилу постепенно.
