key: consistency-check
rule: |
  Проверка внутренней непротиворечивости перед сохранением новой или
  изменённой сущности. Минимум:

    - entity ссылается на несуществующую behavior или наоборот;
    - behavior `verified: true`, но `verified_at` пусто;
    - behavior `verified: true`, но код в связанной entity был изменён
      без пересмотра verified-статуса;
    - manual ссылается на удалённое / переименованное поле entity;
    - одна convention противоречит другой convention;
    - задача в файле цели (`goal--<key>.yaml`) содержит процедурный шаг
      без ссылки на конкретный manual + пункт (при наличии manuals);
    - `features_enabled` в entity не отражён ни в одной behavior;
    - имя файла и `id` внутри YAML не совпадают;
    - запись в `context/index.yml` расходится с фактическим наличием /
      именем / namespace файла;
    - фаза внесла изменение, попадающее под критерий CHANGELOG
      (см. convention `changelog`), но записи в `CHANGELOG.md` за этот
      период нет;
    - файл, привнесённый модулем, существует в проекте, но не отражён в
      `provides` его `context/modules/<key>.yml`;
    - `context/modules/<key>.yml` существует, но файлы из `provides`
      удалены (модуль числится подключённым, а следа нет);
    - `applicable_to` подключённого модуля больше не содержит `key`
      базового контракта проекта (несовместимая версия);
    - `sync.index_sha` в `context/project.yml` совпал с индексом
      источника, но `synced_sha` отдельного источника (контракта или
      модуля) разошёлся с тем, что в индексе — сигнал ручной правки в
      проекте или в индексе.

  Найдено противоречие — не сохранять молча. Явно перечислить конфликт,
  предложить вариант починки, дождаться подтверждения юзера, если
  исправление меняет уже согласованные решения.
