key: code-style
rule: |
  Стиль кода задан Prettier + ESLint:
    - отступ 2 пробела;
    - одинарные кавычки;
    - точки с запятой обязательны;
    - trailing commas — `es5`;
    - максимум 100 символов в строке;
    - именованные импорты (см. также `mui-imports`).
  Форматирование: `npm run format`. Линт: `npm run lint`.
  Не отключать правила ESLint инлайном без обоснования в комментарии.
