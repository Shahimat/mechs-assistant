key: monorepo-shared-config
rule: |
  Подпроекты `apps/*` не тащат свои копии тяжёлых build-time
  зависимостей, но **обязаны иметь свой собственный `.npmrc`** —
  идентичный корневому. Правило-микс: контент шарится, файлы физически
  лежат в каждом подпроекте.

  Конкретика:

  - **`.npmrc` / registry** — держим и в корне (`./.npmrc`), и в
    каждом `apps/<x>/.npmrc`. Содержимое одинаковое. Причина: npm cli
    ищет `.npmrc` только в cwd + user config + global, вверх по дереву
    не walks-up. Если в `apps/<x>` нет своего `.npmrc`, то `npm ci`
    оттуда упадёт с непредсказуемым registry (глобальный / зеркала /
    прокси), и на CI-сборке (где нет `~/.npmrc`) вылетит с
    невнятными ошибками вида «Exit handler never called!». Env-override
    типа `NPM_CONFIG_USERCONFIG=…/.npmrc` умышленно не используем: он
    прячет конфиг в workflow-файле, а физический `.npmrc` в подпроекте
    — самодокументируем и не зависит от того, как именно запущена
    сборка. При изменении root `.npmrc` — синхронизируй все копии в
    `apps/*/.npmrc` вручную (сейчас копия одна, чек-лист лёгкий).

  - **Тяжёлые build-time зависимости** (Sharp, ImageMagick-биндинги,
    Playwright browsers и т.п.) — держим ТОЛЬКО в root `package.json`
    (`devDependencies`), даже если скрипт живёт в `apps/<x>/scripts/`.
    Скрипт запускается из корня (`npm run <task>` в root); пути
    внутри резолвит от собственного `__dirname`. Причина: (1) избегаем
    множественных копий нативных модулей; (2) не тащим Sharp/аналоги
    в `apps/*` `npm ci` — на Windows-CI native optional deps
    хронически ломают install. Артефакты таких скриптов, если они
    детерминированные (зависят только от версионируемых входов) —
    коммитятся в git, а не генерятся на CI (пример —
    `apps/inventory-parser/src/generated/phash-index.json`).

  - **Lint / formatter / базовый tsconfig** — если появится второе
    приложение, ESLint/Prettier/базовый tsconfig шарить из корня
    через `extends: "../../<root>.json"`. Не дублировать конфиги
    ради «локальности».

  Проверка при добавлении новой зависимости в `apps/<x>/package.json`:
  спроси — «это runtime-зависимость самого приложения или build-time
  инструмент?». Build-time инструмент → в root. Runtime приложения →
  локально.
