key: rspack
rule: |
  Rspack — сборщик и dev-сервер.
    - Конфиг — `rspack.config.js` (ESM, `defineConfig` из `@rspack/cli`).
    - dev: `npm run dev` → порт 3000, hot reload через
      `@rspack/plugin-react-refresh`.
    - production: `npm run build` → `dist/`, чистится через `clean: true`.
    - TS/TSX — `builtin:swc-loader` (без `ts-loader`).
    - Alias `@` → `./src`.
    - `optimization.usedExports + sideEffects` включены — MUI
      tree-shaking работает при именованных импортах (см. convention
      `mui-imports`).
