# Карта репозитория для агента.
# namespace → id (entity/behavior) + одностроковое описание.
# Читается сразу после project.yml — чтобы точечно выбрать релевантные
# файлы вместо `ls`. Обновляется в том же коммите, что создаёт /
# удаляет / переименовывает сущность. Расхождение с фактическим
# содержимым — сигнал рассинхрона.
#
# Именование entities/behaviors — префикс `<type>--` (view/data/parser/
# other), см. convention `entity-naming`.

namespaces:
  catalog:
    description: Данные игровых каталогов, парсеры (wiki + Google Sheets), build-time merger.
    entities:
      - id: data--robots-catalog
        one_liner: Каталог мехов (parsed data/robots.json + overlay data/overrides/robots.yml → merged .build/data/robots.json → типы Robot). Пилот-каталог MVP1 — закрыт 2026-07-12.
      - id: data--weapons-catalog
        one_liner: Каталог вооружения — оружие в основные слоты мехов (wiki 3341). Shell-entity MVP1.
      - id: data--equipment-catalog
        one_liner: Каталог оборудования — Доп. оборудование + Чипы + Энергоснабжение + Защита (wiki 3682/3657/3106/3108). Shell-entity MVP1.
      - id: data--ammo-catalog
        one_liner: Каталог боезапасов — расходники для оружия (wiki 3661). Shell-entity MVP1.
      - id: data--items-catalog
        one_liner: Каталог используемых предметов — аптечки, ускорители и прочие расходники (wiki 3111). Shell-entity MVP1.
      - id: data--loot-catalog
        one_liner: Каталог лута — выпадает с монстров/кротов/пиратов (wiki 3023/3027/20118). Гибридный (парсер + overlay).
      - id: data--blueprints-catalog
        one_liner: Каталог чертежей — источники крафта компонентов (wiki 3034). Shell-entity MVP1.
      - id: data--ore-catalog
        one_liner: Каталог руды и полезных ископаемых (wiki 3036). Shell-entity MVP1.
      - id: data--components-catalog
        one_liner: Каталог компонентов — базовые + составные, крафтятся из лута/чертежей (wiki 3955). Гибридный (парсер + overlay рецептов).
      - id: data--currencies
        one_liner: Справочник валют — Боны + Реглы (wiki 3017/3020). Без своего view.
      - id: data--skills-catalog
        one_liner: Каталог навыков и умений персонажа (wiki 2902/2905). В MVP1 — только факты, модификаторы позже.
      - id: parser--wiki
        one_liner: Универсальный js/ts-парсер вики new.mechs.su — один скрипт с конфигом каталогов, коммитит JSON и иконки в data/ основного репо.
      - id: parser--google-sheets
        one_liner: Синк из Google Sheets в data/overrides/*.yml — тянет overlay через Sheets API v4, авто-кэш в репе.
    behaviors:
      - id: data--robots-catalog-loaded-from-json
        one_liner: Каталог мехов загружается из data/robots.json при инициализации стора.
      - id: data--robots-catalog-schema-typed
        one_liner: Каждая запись robots.json соответствует типу Robot (TS strict).

  ui:
    description: Компоненты интерфейса — app shell, роутинг, плитки, страницы-хабы, каталоги.
    entities:
      - id: layout--app-shell
        one_liner: Общая оболочка приложения — AppHeader (logo + title + breadcrumbs) + Outlet из react-router v7.
      - id: view--home
        one_liner: Главная страница `/` — сетка плиток разделов приложения (пока одна плитка «Каталоги»).
      - id: view--catalogs-hub
        one_liner: Хаб каталогов `/catalogs` — сетка плиток по одной на каталог (пока «Мехи»).
      - id: view--robots-catalog
        one_liner: Карточный каталог мехов `/catalogs/mechs-catalog` — собран из примитивов other--catalog-shell.
      - id: other--tile
        one_liner: Квадратная плитка навигации с hover-scale, active-press, focus-ring, слотом для иконки.
      - id: other--catalog-shell
        one_liner: Набор примитивов и hook'ов для сборки страницы каталога (не комбайн-компонент, а lightweight-generic).
    behaviors:
      - id: layout--app-shell-renders-header-and-outlet
        one_liner: AppLayout рендерит AppHeader (logo/title/breadcrumbs) и вложенную страницу через Outlet.
      - id: view--home-renders-section-tiles
        one_liner: Главная рендерит сетку плиток разделов приложения.
      - id: view--catalogs-hub-renders-catalog-tiles
        one_liner: Хаб каталогов рендерит по одной плитке на каталог; клик уводит в конкретный каталог.
      - id: other--tile-scales-on-hover-and-navigates-on-click
        one_liner: Плитка масштабируется на hover, press-эффект на active, focus-ring, клик уводит на to-URL.
      - id: view--robots-catalog-renders-cards-grid
        one_liner: view--robots-catalog рендерит сетку RobotCard из data--robots-catalog.
      - id: view--robots-catalog-opens-mech-detail-on-click
        one_liner: Клик по карточке меха открывает детализацию (RobotDetail).

  comparison:
    description: Механики сравнения и приоритизации мехов (избранное, будущий боевой калькулятор).
    entities:
      - id: other--favorites
        one_liner: Механика избранных мехов (звёздочка в карточке, персист выбора).
    behaviors:
      - id: other--favorites-toggle-on-star-click
        one_liner: Клик по звёздочке в карточке меха добавляет/удаляет робота из избранного и персистит в IndexedDB.

  persistence:
    description: IndexedDB-персистенция состояния Zustand.
    entities:
      - id: other--indexeddb-persistence
        one_liner: Собственный middleware для Zustand, персистирующий указанные ключи в IndexedDB.
    behaviors:
      - id: other--indexeddb-persistence-hydrates-on-mount
        one_liner: При создании стора middleware гидратирует persistKeys из IndexedDB и ставит флаг _persistHydrated.
      - id: other--indexeddb-persistence-writes-on-key-change
        one_liner: Middleware записывает в IndexedDB только те persistKeys, значение которых изменилось.

# Атомарные conventions — кросс-namespace, читаются по релевантности задачи.
# Соответствие «правка → convention» самоочевидно из ключа (rspack.yml
# про rspack и т.д.); перечисляем только описания.
conventions:
  - key: blocking-question
    one_liner: Формат блокирующего вопроса — нумерованные вопросы и варианты, дефолт с обоснованием, стоп после отправки.
  - key: changelog
    one_liner: CHANGELOG.md — журнал крупных решений, одна запись = одна строка, обновляется только в фазе docs.
  - key: code-style
    one_liner: Стиль кода — Prettier + ESLint (2 пробела, одинарные кавычки, trailing commas).
  - key: completeness
    one_liner: Новая сущность/правило = сразу файл + двусторонние ссылки + index + active.todo.
  - key: consistency-check
    one_liner: Чек-лист непротиворечивости перед сохранением сущности (ссылки, verified, имена).
  - key: context-minimization
    one_liner: Читать ровно то, что нужно для задачи; не обходить `docs/` подряд.
  - key: data-overlay
    one_liner: Overlay для гибридных data-сущностей — data/overrides/<catalog>.yml поверх parsed-JSON, merge при build-time.
  - key: entity-naming
    one_liner: Именование entities с префиксом `<type>--` (view/data/parser/other), наследуется в behaviors.
  - key: interactive-stability
    one_liner: Интерактивные элементы не сдвигают соседний layout при взаимодействии; резервируем места, используем `visibility` вместо conditional render.
  - key: git-commits
    one_liner: Коммит и push делает юзер сам; агент — только отчёт, не спрашивать «закоммитить?».
  - key: language
    one_liner: Русский для содержательной части; английский — только идентификаторы/YAML-ключи/имена.
  - key: mui
    one_liner: MUI v5+ Core, ThemeProvider на корне, кастомизация через `styled()` или `sx`.
  - key: no-code-comments
    one_liner: Комментарии в коде по умолчанию не пишем; только короткие «почему» для скрытых инвариантов.
  - key: styling
    one_liner: Стили компонентов — CSS-модули (`*.module.css`) рядом с TSX; `sx` только для крайних случаев.
  - key: theme-colors
    one_liner: Цвета в одном месте — `src/theme.ts` через MUI CssVars; в CSS доступ через `var(--mui-palette-*)`.
  - key: mui-imports
    one_liner: Именованные импорты MUI из корня пакета для tree-shaking.
  - key: openness
    one_liner: Устойчивые уточнения — в репу, не в memory/hooks; «запомни» = правка доки по умолчанию.
  - key: react
    one_liner: React 18+, только функциональные компоненты + hooks.
  - key: rspack
    one_liner: Rspack — сборщик и dev-сервер, конфиг ESM, порт 3000, swc-loader.
  - key: stack
    one_liner: "Фиксированный стек — React 18, MUI v5, Zustand, TanStack Query, Rspack, Jest+RTL."
  - key: tanstack-query
    one_liner: TanStack Query v5 подключён в bootstrap; реальных queries пока нет.
  - key: testing
    one_liner: Jest + React Testing Library; компоненты оборачивать в ThemeProvider с проектной темой.
  - key: typescript
    one_liner: "Строгий TypeScript (strict: true) с активными noImplicit* флагами."
  - key: verification
    one_liner: Механика verified в docs/behavior/*.yml — ставить/сбрасывать по правилам контракта.
  - key: zustand
    one_liner: Zustand — единственное глобальное состояние клиента; стор `src/stores/robots/store.ts`.

# Ручные процедуры для человека.
manuals:
  - id: setup-safety-hooks
    one_liner: Настройка страховочного PreToolUse-hook, блокирующего запись проектных фактов в приватную memory Claude Code.
  - id: setup-google-sheets
    one_liner: Настройка Google Cloud Service Account, Sheets API, JSON-ключа локально и в GitHub Secrets для parser--google-sheets.
  - id: setup-github-workflow
    one_liner: Настройка публичности репо, Collaborators, GitHub Pages, deploy prefix /mechs-assistant/, три workflow-ручки (sync-wiki PR, sync-sheets прямой push с автотриггером deploy, deploy автомат).
