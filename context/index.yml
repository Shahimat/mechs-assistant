# Карта репозитория для агента.
# namespace → id (entity/behavior) + одностроковое описание.
# Читается сразу после project.yml — чтобы точечно выбрать релевантные
# файлы вместо `ls`. Обновляется в том же коммите, что создаёт /
# удаляет / переименовывает сущность. Расхождение с фактическим
# содержимым — сигнал рассинхрона.
#
# Именование entities/behaviors — префикс `<type>--` (view/data/parser/
# other), см. convention `entity-naming`.

namespaces:
  catalog:
    description: Данные игровых каталогов, парсеры (wiki + Google Sheets), build-time merger.
    entities:
      - id: data--robots-catalog
        one_liner: Каталог мехов (parsed data/robots.json + overlay data/overrides/robots.yml → merged .build/data/robots.json → типы Robot). Пилот-каталог MVP1 — закрыт 2026-07-12.
      - id: data--weapons-catalog
        one_liner: Каталог вооружения — 323 записи, 16 CSS-категорий (bullet/missile/mortar/…/laser/repair/faser/empp). Раскатан 2026-07-13, transformsFrom (цепочка преобразований) добавлен 2026-07-14; фильтр по category, не по склеенному group.
      - id: data--equipment-catalog
        one_liner: Каталог оборудования — 173 записи из wiki 3682/3657/3106/3108, family+subtype из CSS-класса, transformsFrom (2026-07-14). Единая data-сущность обслуживает 7 UI-каталогов (chips/shields/armour/accumulators/reactors/drills/cargos).
      - id: data--ammo-catalog
        one_liner: "Каталог боезапасов — ~58 записей из wiki 3661, поле `compatibleCategories: string[]` — массив CSS-slug'ов совместимого оружия (ключевая связь с data--weapons-catalog.category). Стор+view — в фазе feat."
      - id: data--items-catalog
        one_liner: Каталог используемых предметов — 58 записей, 8 subtype (pack/gift/energy/invis/repair/scanner/teleport/upgrade), BFS с зашитым в ctx subtype. upgrade+providesSkill добавлены 2026-07-14. Раскатан 2026-07-13.
      - id: data--loot-catalog
        one_liner: 'Каталог лута — 65 записей из wiki 3023 (монстры, 41) + 3027 (кроты, 14) + 20118 (пираты, 10), BFS с ctx.source; `sources: string[]` (готов к пересечениям, сейчас всегда одноэлементный). Стор+view — в фазе feat.'
      - id: data--blueprints-catalog
        one_liner: 'Каталог чертежей — 211 записей из 9 подстраниц вики (7 категорий: mech/weapon/equipment+subtype/component/pack/upgrade/teleport, mech — post-processing из pack по префиксу `robot_`). Встроенный рецепт с cross-catalog resolve через двухпроходной merger. Раскатан 2026-07-14.'
      - id: data--ore-catalog
        one_liner: 'Каталог руды и полезных ископаемых — 8 записей из wiki 3036 (три кристалла, гафний, магма, железная руда, железо, цезий); поле `foundIn: string[]` — простой список источников (без count/chance, в отличие от items.stats.creates). Стор+view — в фазе feat.'
      - id: data--components-catalog
        one_liner: 'Каталог компонентов — 32 записи из wiki 3955, гибридный (parsed: name/weight/sellPrice/description/craftFromBlueprints; overlay: kind base|composite + recipe). Overlay пустой на старте — заполняется по мере необходимости.'
      - id: data--currencies
        one_liner: Справочник валют — Боны + Реглы (wiki 3017/3020). Без своего view, без плитки (2026-07-13). Понятия используются как `Price { bonds?, regls? }` в других каталогах.
      - id: data--skills-catalog
        one_liner: 'Каталог навыков и умений — 12 записей из wiki 2902/2905, полу-ручной парсер (SKILL_ENTRIES захардкожен, description/perStatPercent из HTML). В MVP1 только справочный слой; модель модификаторов — отдельная сущность data--skill-modifiers перед MVP2.'
      - id: data--todo-list
        one_liner: 'Meta-каталог задач разработки — публичный TODO-список ассистента (не игровые данные). Sheet-only источник: лист `todo` в overlay-spreadsheet, dropdown-validation на priority/status, sync через тот же parser-google-sheets → data/overrides/todos.yml → merged JSON.'
      - id: parser--wiki
        one_liner: Универсальный js/ts-парсер вики new.mechs.su — один скрипт с конфигом каталогов, коммитит JSON и иконки в data/ основного репо.
      - id: parser--google-sheets
        one_liner: Синк из Google Sheets в data/overrides/*.yml — тянет overlay через Sheets API v4, авто-кэш в репе. Расширен 2026-07-14 обработкой листа `todo` (meta-каталог задач разработки).
    behaviors:
      - id: data--robots-catalog-loaded-from-json
        one_liner: Каталог мехов загружается из data/robots.json при инициализации стора.
      - id: data--robots-catalog-schema-typed
        one_liner: Каждая запись robots.json соответствует типу Robot (TS strict).
      - id: data--weapons-catalog-loaded-from-json
        one_liner: Каталог оружия загружается из merged .build/data/weapons.json при инициализации стора.
      - id: data--weapons-catalog-schema-typed
        one_liner: Каждая запись weapons.json соответствует типу Weapon (TS strict), включая опциональный transformsFrom.
      - id: data--equipment-catalog-loaded-from-json
        one_liner: Каталог оборудования загружается из merged .build/data/equipment.json при инициализации стора.
      - id: data--equipment-catalog-schema-typed
        one_liner: Каждая запись equipment.json соответствует типу Equipment (TS strict).

  ui:
    description: Компоненты интерфейса — app shell, роутинг, плитки, страницы-хабы, каталоги.
    entities:
      - id: layout--app-shell
        one_liner: Общая оболочка приложения — AppHeader (logo + title + breadcrumbs) + Outlet из react-router v7.
      - id: view--home
        one_liner: Главная страница `/` — сетка плиток разделов приложения (пока одна плитка «Каталоги»).
      - id: view--catalogs-hub
        one_liner: Хаб каталогов `/catalogs` — сетка плиток по одной на каталог (пока «Мехи»).
      - id: view--robots-catalog
        one_liner: Карточный каталог мехов `/catalogs/mechs-catalog` — собран из примитивов other--catalog-shell.
      - id: view--weapons-catalog
        one_liner: Карточный каталог оружия `/catalogs/weapons-catalog` — 323 записи, PairToggleGroup по CSS-category с русскими подписями + LevelRangeFilter.
      - id: view--chips-catalog
        one_liner: Карточный каталог `/catalogs/chips-catalog` — узкий срез data--equipment-catalog по subtype='computer' (42 записи). LevelRangeFilter.
      - id: view--shields-catalog
        one_liner: Карточный каталог `/catalogs/shields-catalog` — subtype='shield' (31 запись, primary=«Мощность поля»). LevelRangeFilter.
      - id: view--armour-catalog
        one_liner: Карточный каталог `/catalogs/armour-catalog` — subtype='armour' (29 записей, primary=«Броня»). LevelRangeFilter.
      - id: view--accumulators-catalog
        one_liner: Карточный каталог `/catalogs/accumulators-catalog` — subtype='accumulator' (25 записей, primary=«Емкость»). LevelRangeFilter.
      - id: view--reactors-catalog
        one_liner: Карточный каталог `/catalogs/reactors-catalog` — subtype='generator' (26 записей, primary=«Мощность»). LevelRangeFilter.
      - id: view--drills-catalog
        one_liner: Карточный каталог `/catalogs/drills-catalog` — subtype='extractor' (7 записей, primary=«Мощность подъема»). LevelRangeFilter.
      - id: view--cargos-catalog
        one_liner: Карточный каталог `/catalogs/cargos-catalog` — subtype='cargo' (13 записей, primary=«Трюм»). LevelRangeFilter.
      - id: view--ammo-catalog
        one_liner: Карточный каталог `/catalogs/ammo-catalog` — ~58 боезапасов, PairToggleGroup по `compatibleCategories` (CSS-slug'ам weapons) + LevelRangeFilter. Спецификация есть, реализация — в фазе feat.
      - id: view--items-catalog
        one_liner: 'Карточный каталог `/catalogs/items-catalog` — 58 предметов, PairToggleGroup по subtype (5 капсул: паки+подарки/ремкомплект+шокеры/невидимость+сканер/телепортатор/апгрейды), «главный» stat по subtype, секция «Прибавка к навыку» для upgrade. Раскатан 2026-07-13.'
      - id: view--ore-catalog
        one_liner: Карточный каталог `/catalogs/ore-catalog` — 8 руд, без фильтров и без поиска (мало записей), foundIn показан только в детализации. Спецификация есть, реализация — в фазе feat.
      - id: view--components-catalog
        one_liner: Карточный каталог `/catalogs/components-catalog` — 32 компонента, SearchField + PairToggleGroup по kind (auto-hide при пустом overlay). Спецификация есть, реализация — в фазе feat.
      - id: view--loot-catalog
        one_liner: Карточный каталог `/catalogs/loot-catalog` — 65 записей, SearchField + PairToggleGroup по sources (3 капсулы «Монстры»/«Кроты»/«Пираты»). Спецификация есть, реализация — в фазе feat.
      - id: view--skills-catalog
        one_liner: Карточный каталог `/catalogs/skills-catalog` — 12 записей навыков/умений, без фильтров и поиска (мало записей). Спецификация есть, реализация — в фазе feat.
      - id: view--blueprints-catalog
        one_liner: Карточный каталог `/catalogs/blueprints-catalog` — 211 чертежей, SearchField + ToggleButtonGroup 7 раздельных категорий (мехи/оружие/оборудование/компоненты/апгрейды/паки/телепорты), встроенный рецепт в детали с мини-карточками ингредиентов. Раскатан 2026-07-14.
      - id: view--todo-list
        one_liner: Публичная страница планов разработки `/todo` — 4 секции по priority (Блокер/Высокий/Средний/Низкий), карточки с status-chip, кнопка «Предложить задачу» → Google Sheets. Плитка «Планы разработки» на HomePage. Реализация — в фазе feat.
      - id: other--tile
        one_liner: Квадратная плитка навигации с hover-scale, active-press, focus-ring, слотом для иконки.
      - id: other--catalog-shell
        one_liner: Набор примитивов (Header/Section/Grid/FilterPanel/SearchField/LevelRangeFilter/PairToggleGroup/OverlayBadge/IngredientMiniCard/BlueprintChipList) и hook'ов (useSearchFilter/useTypeFilter/useLevelRangeFilter/usePairFilter/useDeepLinkOpen) для сборки страницы каталога.
      - id: other--cross-catalog-navigation
        one_liner: 'Механика взаимной навигации: клик по ингредиенту/чертежу/трансформации открывает Detail в другом каталоге. URL ?open=<key> + useDeepLinkOpen + catalogPathFor + crossCatalogLookup. Push при клике, replace при крестике, back-navigation работает.'
    behaviors:
      - id: layout--app-shell-renders-header-and-outlet
        one_liner: AppLayout рендерит AppHeader (logo/title/breadcrumbs) и вложенную страницу через Outlet.
      - id: view--home-renders-section-tiles
        one_liner: Главная рендерит сетку плиток разделов приложения.
      - id: view--catalogs-hub-renders-catalog-tiles
        one_liner: Хаб каталогов рендерит по одной плитке на каталог; клик уводит в конкретный каталог.
      - id: other--tile-scales-on-hover-and-navigates-on-click
        one_liner: Плитка масштабируется на hover, press-эффект на active, focus-ring, клик уводит на to-URL.
      - id: view--robots-catalog-renders-cards-grid
        one_liner: view--robots-catalog рендерит сетку RobotCard из data--robots-catalog.
      - id: view--robots-catalog-opens-mech-detail-on-click
        one_liner: Клик по карточке меха открывает детализацию (RobotDetail).
      - id: view--weapons-catalog-renders-cards-grid
        one_liner: view--weapons-catalog рендерит сетку WeaponCard из data--weapons-catalog (без фильтров на первый заход).
      - id: view--weapons-catalog-opens-weapon-detail-on-click
        one_liner: Клик по карточке оружия открывает детализацию (WeaponDetail).
      - id: view--chips-catalog-renders-cards-grid
        one_liner: view--chips-catalog фильтрует data--equipment-catalog по subtype='computer' и рендерит сетку EquipmentCard.
      - id: view--chips-catalog-opens-detail-on-click
        one_liner: Клик по карточке чипа открывает EquipmentDetail.
      - id: view--shields-catalog-renders-cards-grid
        one_liner: view--shields-catalog фильтрует по subtype='shield' и рендерит сетку EquipmentCard.
      - id: view--shields-catalog-opens-detail-on-click
        one_liner: Клик по карточке энергощита открывает EquipmentDetail.
      - id: view--armour-catalog-renders-cards-grid
        one_liner: view--armour-catalog фильтрует по subtype='armour' и рендерит сетку EquipmentCard.
      - id: view--armour-catalog-opens-detail-on-click
        one_liner: Клик по карточке брони открывает EquipmentDetail.
      - id: view--accumulators-catalog-renders-cards-grid
        one_liner: view--accumulators-catalog фильтрует по subtype='accumulator' и рендерит сетку EquipmentCard.
      - id: view--accumulators-catalog-opens-detail-on-click
        one_liner: Клик по карточке накопителя открывает EquipmentDetail.
      - id: view--reactors-catalog-renders-cards-grid
        one_liner: view--reactors-catalog фильтрует по subtype='generator' и рендерит сетку EquipmentCard.
      - id: view--reactors-catalog-opens-detail-on-click
        one_liner: Клик по карточке реактора открывает EquipmentDetail.
      - id: view--drills-catalog-renders-cards-grid
        one_liner: view--drills-catalog фильтрует по subtype='extractor' и рендерит сетку EquipmentCard.
      - id: view--drills-catalog-opens-detail-on-click
        one_liner: Клик по карточке бура открывает EquipmentDetail.
      - id: view--cargos-catalog-renders-cards-grid
        one_liner: view--cargos-catalog фильтрует по subtype='cargo' и рендерит сетку EquipmentCard.
      - id: view--cargos-catalog-opens-detail-on-click
        one_liner: Клик по карточке трюма открывает EquipmentDetail.
      - id: data--ammo-catalog-loaded-from-json
        one_liner: Каталог боезапасов загружается из merged .build/data/ammo.json при инициализации стора.
      - id: data--ammo-catalog-schema-typed
        one_liner: Каждая запись ammo.json соответствует типу Ammo (TS strict).
      - id: view--ammo-catalog-renders-cards-grid
        one_liner: view--ammo-catalog рендерит сетку AmmoCard из data--ammo-catalog, фильтр по compatibleCategories + LevelRangeFilter.
      - id: view--ammo-catalog-opens-detail-on-click
        one_liner: Клик по карточке боезапаса открывает детализацию (AmmoDetail).
      - id: data--items-catalog-loaded-from-json
        one_liner: Каталог предметов загружается из merged .build/data/items.json при инициализации стора.
      - id: data--items-catalog-schema-typed
        one_liner: Каждая запись items.json соответствует типу Item (TS strict), включая subtype='upgrade' и overlay-поле providesSkill { skillKey, value }.
      - id: view--items-catalog-renders-cards-grid
        one_liner: view--items-catalog рендерит сетку ItemCard из data--items-catalog, фильтр PairToggleGroup по subtype.
      - id: view--items-catalog-opens-detail-on-click
        one_liner: Клик по карточке предмета открывает детализацию (ItemDetail).
      - id: data--ore-catalog-loaded-from-json
        one_liner: Каталог руды загружается из merged .build/data/ore.json при инициализации стора.
      - id: data--ore-catalog-schema-typed
        one_liner: Каждая запись ore.json соответствует типу Ore (TS strict).
      - id: view--ore-catalog-renders-cards-grid
        one_liner: view--ore-catalog рендерит сетку OreCard из data--ore-catalog, без фильтров и поиска.
      - id: view--ore-catalog-opens-detail-on-click
        one_liner: Клик по карточке руды открывает детализацию (OreDetail).
      - id: data--components-catalog-loaded-from-json
        one_liner: Каталог компонентов загружается из merged .build/data/components.json при инициализации стора.
      - id: data--components-catalog-schema-typed
        one_liner: Каждая запись components.json соответствует типу Component (TS strict).
      - id: view--components-catalog-renders-cards-grid
        one_liner: view--components-catalog рендерит сетку ComponentCard, SearchField + PairToggleGroup по kind (auto-hide).
      - id: view--components-catalog-opens-detail-on-click
        one_liner: Клик по карточке компонента открывает детализацию (ComponentDetail).
      - id: data--loot-catalog-loaded-from-json
        one_liner: Каталог лута загружается из merged .build/data/loot.json при инициализации стора.
      - id: data--loot-catalog-schema-typed
        one_liner: Каждая запись loot.json соответствует типу Loot (TS strict).
      - id: view--loot-catalog-renders-cards-grid
        one_liner: view--loot-catalog рендерит сетку LootCard, SearchField + PairToggleGroup по sources.
      - id: view--loot-catalog-opens-detail-on-click
        one_liner: Клик по карточке лута открывает детализацию (LootDetail).
      - id: data--skills-catalog-loaded-from-json
        one_liner: Каталог навыков загружается из merged .build/data/skills.json при инициализации стора.
      - id: data--skills-catalog-schema-typed
        one_liner: Каждая запись skills.json соответствует типу Skill (TS strict).
      - id: view--skills-catalog-renders-cards-grid
        one_liner: view--skills-catalog рендерит сетку SkillCard, без фильтров и поиска.
      - id: view--skills-catalog-opens-detail-on-click
        one_liner: Клик по карточке навыка открывает детализацию (SkillDetail).
      - id: data--blueprints-catalog-loaded-from-json
        one_liner: Каталог чертежей загружается из merged .build/data/blueprints.json при инициализации стора.
      - id: data--todo-list-loaded-from-json
        one_liner: TODO-список загружается из merged .build/data/todos.json при инициализации useTodosStore.
      - id: data--todo-list-schema-typed
        one_liner: Каждая запись todos.json соответствует типу Todo (TS strict); priority/status — строгие enum, валидированные dropdown'ом в Sheets.
      - id: data--blueprints-catalog-schema-typed
        one_liner: Каждая запись blueprints.json соответствует типу Blueprint (TS strict) с встроенным рецептом.
      - id: view--blueprints-catalog-renders-cards-grid
        one_liner: view--blueprints-catalog рендерит сетку BlueprintCard, SearchField + PairToggleGroup 6 капсул по category.
      - id: view--blueprints-catalog-opens-detail-on-click
        one_liner: Клик по карточке чертежа открывает детализацию (BlueprintDetail) с полным рецептом.
      - id: other--cross-catalog-navigation-deep-link-opens-detail
        one_liner: URL-параметр ?open=<key> синхронизирует открытие/закрытие Detail с историей браузера через useDeepLinkOpen (push при клике, replace при крестике, back — переоткрывает предыдущий).
      - id: other--cross-catalog-navigation-ingredient-mini-card-navigates
        one_liner: Клик по IngredientMiniCard (иконка+×N+tooltip) навигирует в соответствующий каталог с ?open=<key>; equipment — через resolve subtype в один из 7 UI-подкаталогов.
      - id: view--todo-list-renders-sections-by-priority
        one_liner: TodoPage рендерит 4 секции по priority (пустые скрываются) + кнопку «Предложить задачу» → внешняя ссылка на Google Sheets в новой вкладке.

  comparison:
    description: Механики сравнения и приоритизации мехов (избранное, будущий боевой калькулятор).
    entities:
      - id: other--favorites
        one_liner: Механика избранных мехов (звёздочка в карточке, персист выбора).
    behaviors:
      - id: other--favorites-toggle-on-star-click
        one_liner: Клик по звёздочке в карточке меха добавляет/удаляет робота из избранного и персистит в IndexedDB.

  persistence:
    description: IndexedDB-персистенция состояния Zustand.
    entities:
      - id: other--indexeddb-persistence
        one_liner: Собственный middleware для Zustand, персистирующий указанные ключи в IndexedDB.
    behaviors:
      - id: other--indexeddb-persistence-hydrates-on-mount
        one_liner: При создании стора middleware гидратирует persistKeys из IndexedDB и ставит флаг _persistHydrated.
      - id: other--indexeddb-persistence-writes-on-key-change
        one_liner: Middleware записывает в IndexedDB только те persistKeys, значение которых изменилось.

# Атомарные conventions — кросс-namespace, читаются по релевантности задачи.
# Соответствие «правка → convention» самоочевидно из ключа (rspack.yml
# про rspack и т.д.); перечисляем только описания.
conventions:
  - key: assets-layout
    one_liner: Разделение assets/ на raw (исходники png/jpg/svg) и images (готовые webp для прода) — webp не хранить в raw.
  - key: assets-preservation
    one_liner: Ассеты не удаляем даже при снятии UI-компонента; неиспользуемые файлы в бандл не попадают, но на диске сохраняются для повторного использования.
  - key: blocking-question
    one_liner: Формат блокирующего вопроса — нумерованные вопросы и варианты, дефолт с обоснованием, стоп после отправки.
  - key: changelog
    one_liner: CHANGELOG.md — журнал крупных решений, одна запись = одна строка, обновляется только в фазе docs.
  - key: code-style
    one_liner: Стиль кода — Prettier + ESLint (2 пробела, одинарные кавычки, trailing commas).
  - key: completeness
    one_liner: Новая сущность/правило = сразу файл + двусторонние ссылки + index + active.todo.
  - key: consistency-check
    one_liner: Чек-лист непротиворечивости перед сохранением сущности (ссылки, verified, имена).
  - key: context-minimization
    one_liner: Читать ровно то, что нужно для задачи; не обходить `docs/` подряд.
  - key: data-overlay
    one_liner: Overlay для гибридных data-сущностей — data/overrides/<catalog>.yml поверх parsed-JSON, merge при build-time.
  - key: entity-naming
    one_liner: Именование entities с префиксом `<type>--` (view/data/parser/other), наследуется в behaviors.
  - key: interactive-stability
    one_liner: Интерактивные элементы не сдвигают соседний layout при взаимодействии; резервируем места, используем `visibility` вместо conditional render.
  - key: git-commits
    one_liner: Коммит и push делает юзер сам; агент — только отчёт, не спрашивать «закоммитить?».
  - key: language
    one_liner: Русский для содержательной части; английский — только идентификаторы/YAML-ключи/имена.
  - key: mui
    one_liner: MUI v5+ Core, ThemeProvider на корне, кастомизация через `styled()` или `sx`.
  - key: no-code-comments
    one_liner: Комментарии в коде по умолчанию не пишем; только короткие «почему» для скрытых инвариантов.
  - key: styling
    one_liner: Стили компонентов — CSS-модули (`*.module.css`) рядом с TSX; `sx` только для крайних случаев.
  - key: theme-colors
    one_liner: Цвета в одном месте — `src/theme.ts` через MUI CssVars; в CSS доступ через `var(--mui-palette-*)`.
  - key: todo-split
    one_liner: Две системы задач — active.todo (dev/internal, привязана к workflow.md) и Sheets `todo`/страница /todo (product-facing, transparency). Не смешивать. Агент читает обе при report-сценариях.
  - key: monorepo-shared-config
    one_liner: apps/* держат свой .npmrc (копия root — npm не walks-up) и НЕ тащат тяжёлые build-time зависимости (Sharp живёт только в root).
  - key: mui-imports
    one_liner: Именованные импорты MUI из корня пакета для tree-shaking.
  - key: openness
    one_liner: Устойчивые уточнения — в репу, не в memory/hooks; «запомни» = правка доки по умолчанию.
  - key: ui-no-engineering-leak
    one_liner: В UI не пропускаем инженерную кухню (data--*, «MVP2», overlay, TS-типы) — юзер видит факты игры, служебное живёт в docs/*.yml.
  - key: react
    one_liner: React 18+, только функциональные компоненты + hooks.
  - key: rspack
    one_liner: Rspack — сборщик и dev-сервер, конфиг ESM, порт 3000, swc-loader.
  - key: stack
    one_liner: 'Фиксированный стек — React 18, MUI v5, Zustand, TanStack Query, Rspack, Jest+RTL.'
  - key: tanstack-query
    one_liner: TanStack Query v5 подключён в bootstrap; реальных queries пока нет.
  - key: testing
    one_liner: Jest + React Testing Library; компоненты оборачивать в ThemeProvider с проектной темой.
  - key: typescript
    one_liner: 'Строгий TypeScript (strict: true) с активными noImplicit* флагами.'
  - key: verification
    one_liner: Механика verified в docs/behavior/*.yml — ставить/сбрасывать по правилам контракта.
  - key: zustand
    one_liner: Zustand — единственное глобальное состояние клиента; стор `src/stores/robots/store.ts`.

# Ручные процедуры для человека.
manuals:
  - id: setup-safety-hooks
    one_liner: Настройка страховочного PreToolUse-hook, блокирующего запись проектных фактов в приватную memory Claude Code.
  - id: setup-google-sheets
    one_liner: Настройка Google Cloud Service Account, Sheets API, JSON-ключа локально и в GitHub Secrets для parser--google-sheets.
  - id: setup-github-workflow
    one_liner: Настройка публичности репо, Collaborators, GitHub Pages, deploy prefix /mechs-assistant/, три workflow-ручки (sync-wiki PR, sync-sheets прямой push с автотриггером deploy, deploy автомат).
  - id: design-clan-warehouse-schema
    one_liner: Учебная задача для начинающего backend-разработчика — спроектировать реляционную схему БД для кланового склада (постановка + требования + вопросы для размышления + критерии оценки, без готовой схемы).
