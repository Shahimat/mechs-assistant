name: mechs-assistant
description: Ассистент игры Мехи.Земля — монорепо (npm workspaces). apps/web — публичный WEB-справочник (карточные каталоги + фундамент под калькулятор прокачки); apps/cop — десктоп-клиент клана (Tauri, COP); packages/shared — скаффолд общего слоя.
author:
  name: Gevorg Nakhapetyan
  email: ngs22071993@gmail.com
  github: https://github.com/Shahimat

# Продуктовое позиционирование. Задаёт рамку для решений «нужно/не
# нужно» (i18n, аналитика, онбординг, публичный хостинг) и приоритеты
# MVP. Полный план развития — в context/views/goals.yaml + goal--<key>.yaml.
product:
  audience: |
    Микро-сообщество игры Мехи.Земля: сейчас порядка 5 человек, потенциально
    до 300 (игра нишевая). Приоритет — личное использование автора и узкий
    круг команды; публикация возможна, но не блокирует решения (i18n,
    онбординг, аналитика — не сейчас).
  positioning: |
    Ассистент решений для игроков и кланов Мехи.Земля. Не «энциклопедия
    характеристик», а инструмент для конкретных задач: калькулятор прокачки,
    боевой калькулятор, учёт клановых ресурсов. Развивается по целям,
    см. context/views/goals.yaml.

# Синхронизация с источниками (см. workflow.md, раздел «Синхронизация с
# источниками»). Все SHA-256 — hex-строка. Fetch — только curl, WebFetch
# для source-sync запрещён. Обновляется по команде «сверь всё».
sync:
  index_source: https://raw.githubusercontent.com/Shahimat/ai-prompts/main/prompts/index.yml
  index_sha: 8935d1bcf2df47545aa4327bee9531dcf5ba03a6231e724e90e8344cf3aad3c8
  contract:
    key: agent-operational-contract-v2
    synced_sha: 6f002e3a8037cab3f70723b6f5995f3b010a10c445716c0ed04ae4a3cc28640a
  synced_at: 2026-07-09

stack:
  language: TypeScript (strict)
  ui: React 19 + MUI v7 + Emotion (styled components)
  dnd: dnd-kit — drag-and-drop сортировка избранных карточек
  state: Zustand + собственный indexedDB middleware
  data_layer: TanStack Query (v5) — подключён в bootstrap, реальных queries пока нет (см. goal--infra, решить судьбу)
  bundler: Rspack
  testing: Jest + React Testing Library
  lint: ESLint (@typescript-eslint) + Prettier
  deploy: GitHub Pages (deploy-pages@v4) под префиксом /mechs-assistant/

runtime:
  dev_port: 3000 # apps/web (SPA); apps/cop (Tauri) — 1420
  dev_server: rspack serve
  indexeddb:
    db_name: mechs-assistant
    db_version: 2
    store_name: robots-store
    persisted_keys: [favorites]

paths:
  source: apps/web/src/ # SPA-справочник; десктоп-клиент — apps/cop/src/, общий слой — packages/shared/src/
  data_processed: data/robots.json
  data_raw: raw-data/ # gitignored, HTML-выгрузки со страниц вики (исходники для robots.json)
  docs_entities: docs/entities/
  docs_behavior: docs/behavior/
  conventions: context/conventions/
  workflow: context/workflow.md
  goals: context/views/goals.yaml

namespaces:
  - catalog # каталоги, парсеры (wiki + Sheets), build-time merger
  - ui # карточные view каталогов, общие UI-компоненты
  - comparison # избранное (список ключей + drag-and-drop сортировка)
  - persistence # IndexedDB-персистенция

commands:
  install: npm install
  dev: npm run dev
  build: npm run build
  test: npm test
  test_watch: npm run test:watch
  test_coverage: npm run test:coverage
  lint: npm run lint
  format: npm run format

external_links:
  official_site: https://new.mechs.su/ # официальный сайт игры
  wiki_robots: https://new.mechs.su/wiki/robots # первичный источник данных мехов и иллюстраций (парсинг вики)
  upgrade_calculator: https://new.mechs.su/help/upgrade-robots # референс онлайн-калькулятора прокачки для MVP2, клиентский Redux
  mechs_earth_system: https://github.com/MechsEarth/System # community-maintained база знаний ЕСИ, возможный вторичный источник (не первичный)
  # todo_sheet: URL публичного листа `todo` в overlay-spreadsheet — не в git.
  # Собирается в apps/web/src/config/links.ts из env `MECHS_OVERLAY_SPREADSHEET_ID`
  # (инжектится rspack DefinePlugin) + фиксированного GID листа. Кнопка
  # «Предложить задачу» на /todo скрывается если ID не задан. См.
  # .env.local.example.
  todo_sheet_env: MECHS_OVERLAY_SPREADSHEET_ID + TODO_SHEET_GID
