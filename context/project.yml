name: mechs-assistant
description: WEB-ассистент игры Мехи.Земля. Сравнительная таблица роботов.
author:
  name: Gevorg Nakhapetyan
  email: ngs22071993@gmail.com
  github: https://github.com/Shahimat

# Продуктовое позиционирование. Задаёт рамку для решений «нужно/не
# нужно» (i18n, аналитика, онбординг, публичный хостинг) и приоритеты
# MVP. Полный план развития — в context/roadmap.md.
product:
  audience: |
    Микро-сообщество игры Мехи.Земля: сейчас порядка 5 человек, потенциально
    до 300 (игра нишевая). Приоритет — личное использование автора и узкий
    круг команды; публикация возможна, но не блокирует решения (i18n,
    онбординг, аналитика — не сейчас).
  positioning: |
    Ассистент решений для игроков и кланов Мехи.Земля. Не «энциклопедия
    характеристик», а инструмент для конкретных задач: калькулятор прокачки,
    боевой калькулятор, учёт клановых ресурсов. Развивается по MVP-эпикам,
    см. context/roadmap.md.

# Синхронизация с источниками (см. workflow.md, раздел «Синхронизация с
# источниками»). Все SHA-256 — hex-строка. Fetch — только curl, WebFetch
# для source-sync запрещён. Обновляется по команде «сверь всё».
sync:
  index_source: https://raw.githubusercontent.com/Shahimat/ai-prompts/main/prompts/index.yml
  index_sha: 8935d1bcf2df47545aa4327bee9531dcf5ba03a6231e724e90e8344cf3aad3c8
  contract:
    key: agent-operational-contract-v2
    synced_sha: 6f002e3a8037cab3f70723b6f5995f3b010a10c445716c0ed04ae4a3cc28640a
  synced_at: 2026-07-09

stack:
  language: TypeScript (strict)
  ui: React 18 + MUI v5 + Emotion
  grid: AG Grid Community v35 (ag-grid-react)
  state: Zustand + собственный indexedDB middleware
  data_layer: TanStack Query (v5) — подключён в bootstrap, реальных queries пока нет
  bundler: Rspack
  testing: Jest + React Testing Library
  lint: ESLint (@typescript-eslint) + Prettier

runtime:
  dev_port: 3000
  dev_server: rspack serve
  indexeddb:
    db_name: mechs-assistant
    db_version: 2
    store_name: robots-store
    persisted_keys: [baseRobotKey, favorites]

paths:
  source: src/
  data_processed: data/robots.json
  data_raw: raw-data/       # gitignored, HTML-выгрузки со страниц вики (исходники для robots.json)
  docs_entities: docs/entities/
  docs_behavior: docs/behavior/
  conventions: context/conventions/
  workflow: context/workflow.md
  active_todo: context/views/active.todo

namespaces:
  - catalog       # каталог роботов, источники данных
  - ui            # компоненты интерфейса
  - comparison    # избранное и базовый робот
  - persistence   # IndexedDB-персистенция

commands:
  install: npm install
  dev: npm run dev
  build: npm run build
  test: npm test
  test_watch: npm run test:watch
  test_coverage: npm run test:coverage
  lint: npm run lint
  format: npm run format

external_links:
  official_site: https://new.mechs.su/                       # официальный сайт игры
  mechs_earth_system: https://github.com/MechsEarth/System   # community-maintained база знаний ЕСИ, первичный источник данных
  mechs_earth_assets: https://github.com/MechsEarth/assets   # ассеты (иллюстрации мехов и прочее) для UI
