key: improvements
title: Улучшения и полировка (nice-to-have)

status: planned

why: |
  Отложенные улучшения UX и косметика, не тянущие на отдельную продуктовую
  цель и не блокирующие ничего. Держим их здесь, чтобы идеи не терялись и не
  засоряли активные цели. Всплывают, когда доходят руки или когда конкретное
  улучшение становится ощутимо нужным.

description: |
  Сюда попадают точечные улучшения существующего поведения (UX, косметика,
  удобство редакторов), у которых нет своей продуктовой цели. Если пункт
  дорастает до полноценной инициативы — заводим отдельную цель и переносим.

