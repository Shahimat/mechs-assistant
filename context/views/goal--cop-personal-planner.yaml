key: cop-personal-planner
program: cop
title: Индивидуальный планировщик задач
status: planned

why: |
  Личный слой поверх клановой платформы: сколько лута накопить, что нужно
  сделать, расписание активностей. Помогает игроку держать свои цели, не
  смешивая их с клановыми.

description: |
  Локальные (личные) данные игрока в том же Tauri-клиенте: задачи-накопления
  (собрать N ресурса X), чек-листы дел, расписание/напоминания об активностях.
  Хранение — локальный SQLite; синхронизация с кланом не требуется (личное),
  поэтому платформенный sync не блокер. Может переиспользовать локальный SQLite
  из платформы, но живёт автономно.

  Открытые вопросы: где пересекается с клановыми целями (goal--cop-team-goals) —
  личная накопительная задача может быть «моим куском» клановой цели; связку
  прорабатываем при старте, пока подцели независимы.

