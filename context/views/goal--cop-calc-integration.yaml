key: cop-calc-integration
program: cop
title: Интеграция калькуляторов в COP
status: planned

why: |
  Связать самостоятельные калькуляторы (прокачки — goal calculator, боевой —
  goal combat-calculator) с клановыми данными COP: автоподстановка остатков
  склада, вычисление требований под цель, сохранение расчёта как клановой цели.
  Сами движки калькуляторов остаются отдельными целями — здесь только мост
  «калькулятор ↔ COP-данные».

description: |
  Требует готовых движков калькуляторов (depends_on: calculator,
  combat-calculator) и платформы программы с локальным SQLite (для чтения
  остатков). Доменно НЕ дублирует движок — берёт его результат и подставляет
  клановый контекст.

  Состав:
  - автоподстановка остатков из локального/кланового SQLite в поле «что у меня
    уже есть» калькулятора прокачки (вместо ручного ввода инвентаря);
  - вычисление goal_requirements: калькулятор считает, чего не хватает под
    целевой уровень меха, результат ложится в структуру клановой цели;
  - сохранение персонального расчёта как клановой цели (через approve владельца)
    — точка входа в goal--cop-team-goals.

  Открытый вопрос: usefulness-вес частичного соответствия (вклад чертежа
  соседнего уровня) — прорабатывается вместе с cop-team-goals.

tasks:
  blocker: []

  high: []

  medium: []

  low:
    - 'мост калькулятор ↔ COP: автоподстановка остатков из SQLite в калькулятор прокачки; вычисление goal_requirements под целевой уровень; сохранение расчёта как клановой цели через approve владельца → фаза feat → блокеры: движки calculator + combat-calculator, платформа программы (локальный SQLite)'

depends_on:
  - calculator
  - combat-calculator
