key: cop-voice-chat
program: cop
title: Общекомандный войс с чатом
status: planned

why: |
  Своя связь клана внутри инструмента: голос + текстовый чат, чтобы не завязывать
  координацию на сторонние Discord/TeamSpeak. Самая дальняя и наименее
  проработанная идея программы — пока стадия исследования.

description: |
  Реальный realtime-транспорт (WebRTC для голоса, отдельный канал для текста) —
  принципиально иная инфраструктура, чем async KV-outbox остального COP:
  KV-транспорт с задержкой ~30 сек для войса не годится. Поэтому подцель
  автономна от платформенного sync (свой транспорт), но живёт в том же
  Tauri-клиенте.

  Стадия исследования: выбрать модель (peer-to-peer WebRTC vs SFU-сервер),
  оценить стоимость/сложность TURN/STUN, понять, оправдана ли своя реализация
  против интеграции существующего решения.

