key: calculator
title: Калькулятор прокачки (MVP2)
status: planned

why: |
  Личная боль автора: «что мне нужно, чтобы прокачать меха до уровня N — какие
  ресурсы, что у меня уже есть, чего не хватает». Помимо самостоятельной
  ценности — движок для целей клана (goal clan-operations-platform, Phase M4:
  вычисление goal_requirements).

description: |
  Состав:
  - Расширение модели меха: уровни, стоимость перехода между уровнями. Формула
    для реглов известна из community-калькулятора:
    reglsCostMultiplier = mech.level / K, где K зависит от типа
    (FIGHTER 100 / SCOUT 60 / TRADER 90 / MINER 35).
  - Модель модификаторов навыков (проработка перед стартом эпика — см. blocker).
  - Модель контекстных вариаций стоимости прокачки (заводы v2/v3) — если к
    моменту MVP2 накопилась разведка в игре.
  - Инвентарь пользователя («что у меня есть») — локально, IndexedDB.
  - UI: выбор меха + целевой уровень → таблица дефицита ресурсов.

  Референс UI/логики: онлайн-калькулятор new.mechs.su/help/upgrade-robots
  (React SPA от community mechsearth, встроен через iframe в WP) — используется
  как сверка результатов и вторичный источник данных.

  Зависимости: MVP1 (полный справочный слой — мехи, currencies, ore, components,
  blueprints, skills) закрыт 2026-07-14.

  Риски: детальной таблицы стоимости прокачки может не быть в вики (fallback —
  вытянуть из state онлайн-калькулятора либо через overlay); модель составных
  рецептов компонентов (что из чего крафтится) — ручной ввод, объём неясен.

tasks:
  blocker:
    - 'новая сущность data--skill-modifiers — модель числовых модификаторов (skill × level → множитель к weapon.damage / robot.armor / sellPrice / ...), overlay-первичная (данных на вики нет, ручной ввод). Завести entity + связать с data--skills-catalog → фаза docs → блокирует старт калькулятора'

  high: []
  medium: []
  low: []

depends_on: []
