key: combat-calculator
title: Боевой калькулятор (MVP4)
status: planned

why: |
  Изначальная мотивация проекта: «насколько крепкий мех получится из моего
  билда; кто победит в 1v1 или групповом бою; сколько аптечек класть».

description: |
  Состав:
  - Модель оборудования и скиллов меха, включая механики «Модификация» из вики
    (Установка навыков 3950, Модификация оборудования 3940, Временный апгрейд
    4019).
  - Модель боя (1v1, групповой), метрики выживаемости.
  - Контекстные вариации боевых характеристик по карте (v2/v3) — если к моменту
    MVP4 накопилась разведка.
  - Сравнение мехов в бою: spec-sheet + radar overlay. Возврат сравнительной
    механики — но как визуализации боевых сборок, а не голых характеристик.

  Дизайн: здесь возвращается выделенная дизайн-фаза (radar + spec-sheet) —
  MUI-defaults, которых хватало в MVP1, уже недостаточно.

  Зависимости: MVP2 (прокачанная модель меха — фундамент боевых расчётов),
  полный справочный слой MVP1 (weapons, equipment, ammo, items, skills).

tasks:
  blocker: []
  high: []
  medium: []

  low:
    - 'модель механик «Модификация» (Установка навыков / Модификация оборудования / Временный апгрейд) — важные механики, но не отдельные каталоги; проработка при подходе к MVP4 → фаза docs → нет'
    - 'контекстные вариации боевых характеристик по карте (v2/v3) — модель ещё сырая, накапливаем факты разведкой, эволюционируем схему при подходе к MVP4 → фаза docs → нет'

depends_on:
  - calculator
