key: catalogs
title: Доводка справочного слоя каталогов
status: active

why: |
  MVP1 (11 data-сущностей + 16 UI-роутов + cross-catalog навигация: deep-link +
  мини-карточки) закрыт 2026-07-14. Остаётся живой «хвост»: наполнение overlay
  реальными уточнениями, доуточнение неоднозначностей автопарса, валидация
  схем — всё это повышает точность каталогов относительно вики.

description: |
  Источник правды overlay — Google Sheets (одна таблица, лист на каталог) →
  parser-google-sheets тянет через API → data/overrides/<catalog>.yml (авто-кэш
  в репе, не редактируется вручную) → build-time merge поверх parsed-JSON.
  Наполнение = ручная работа редакторов (2 разработчика + доверенные игроки).
  Детали конвейера — convention data-overlay.

