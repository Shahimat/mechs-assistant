key: cop-launch-game
program: cop
title: Главная страница COP + запуск игры
status: planned

why: |
  Убрать лишний шаг перед сессией: запускать игру прямо из COP одной кнопкой, а
  не искать клиент руками. COP и так открыт у игрока (парсер инвентаря, помощник
  по рутине) — логично стартовать игру оттуда же. Ключевая боль: обычный ярлык
  Windows указывает на конкретную папку версии, а после установки апдейта папка
  версии меняется — ярлык становится нерабочим. COP должен запускать ВСЕГДА самую
  свежую установленную версию независимо от обновлений.

description: |
  Локальное удобство поверх Tauri-клиента, серверной платформы программы не ждёт.

  ## Устройство клиента игры (известно)
  Игровой десктоп-клиент со своим апдейтером ставится по пути вида
  `%LOCALAPPDATA%\MechsEarth\bin\v<A-B-C-BUILD>\MechsEarth.exe`
  (пример: `C:\Users\Gevorg\AppData\Local\MechsEarth\bin\v4-1-1-8733\MechsEarth.exe`).
  После установки обновления создаётся новая папка версии (`v4-1-2-…` и т.п.), а
  старая остаётся/удаляется — поэтому жёсткая ссылка на конкретный `v…` ломается.

  ## Логика «самой свежей версии»
  COP хранит путь до **папки игры** (базовая директория `…\MechsEarth\bin`), а не
  до конкретного exe. При запуске: сканирует подпапки `v*`, парсит версию из имени
  (`v<A-B-C-BUILD>` → сравнение по A.B.C и номеру билда), выбирает максимальную,
  запускает `MechsEarth.exe` внутри неё. Так запуск устойчив к смене папки версии
  после апдейта. Дефолт базового пути — `%LOCALAPPDATA%\MechsEarth\bin` (LOCALAPPDATA
  разворачивается под конкретного пользователя, переносимо между машинами клана).

  ## Пользовательская настройка
  Путь до папки с игрой настраивается в COP и сохраняется в tauri-plugin-store
  (по аналогии с GridSettings парсера инвентаря): дефолт как выше, форма ручного
  ввода на случай нестандартной установки. Рядом храним и разрешённый путь до
  папки игры.

  ## Главная страница COP
  В COP добавляется **главная страница — первый маршрут** в существующем header
  tabbar routing (реализован коммитом `feat[cop]: header tabbar routing`). Наверху
  этой страницы — блок запуска игры (кнопка/иконка). Главная страница — стартовый
  экран клиента; сейчас её содержимое = запуск игры, дальше может обрастать
  виджетами других подцелей (не проектируем наперёд).

  ## Раскладка окон (мультизапуск) — специфицировано, ждёт реализации
  Многие игроки держат сразу несколько окон игры (напр. 5, у кого-то больше/меньше)
  и каждый раз вручную расставляют их в привычном порядке. Делаем: одной кнопкой
  запустить N инстансов и разложить окна по сохранённому пресету, чтобы не
  перенастраивать заново. Выбран **вариант B** — COP и запускает N инстансов, и сам
  расставляет их окна (полная автоматизация, не MVP «запусти-один»).
    - **Пресет — per-user, только «запомни как сейчас».** Хранится в tauri-store
      (ключ `windowLayout`, локально на машине игрока = «для конкретного меня») как
      `{ slots: { x, y, width, height }[] }`. Ручного ввода координат нет вообще:
      пользователь расставляет окна как удобно и жмёт «Запомнить текущую раскладку»
      — COP через `list_game_windows` считывает позиции и сохраняет по слоту на окно.
    - **Число окон — произвольное (обычно ≤10), на усмотрение пользователя.** Сколько
      окон открыто в момент «запомнить» — столько слотов в пресете; `launch_and_arrange`
      запускает ровно `slots.len()` инстансов.
    - **Чтение и позиционирование — новый нативный Windows-код.** xcap только читает
      окна и без координат — заводим `list_game_windows` (EnumWindows +
      GetWindowThreadProcessId, геометрия окон MechsEarth.exe) и `launch_and_arrange`
      (SetWindowPos + SW_RESTORE) на crate `windows`, `#[cfg(windows)]`. Обе —
      `async` + `spawn_blocking`, главный поток не фризит.
    - **Нюансы (заложены в спеку).** Окна игры с одинаковым заголовком — процессы
      ищем по имени exe, сопоставление слот↔окно по порядку запуска PID; окно
      появляется не мгновенно после spawn — поллинг с таймаутом, не появившееся окно
      пропускается с предупреждением (частичный успех). На кнопку мультизапуска
      распространяется тот же кулдаун-гард, что и на одиночную (осознанный запуск N
      штук — одна операция, повторный клик по ней тоже гасим). Детали команд — в
      other--cop-native-bridge + behavior other--cop-native-bridge-arranges-game-windows;
      UI — view--cop-home + behavior view--cop-home-manages-window-layout.

  ## Редактор настроек игры (UserDefault.xml) — специфицировано, ждёт реализации
  На главной COP — блок правки конфига игры `…\MechsEarth\UserDefault.xml`
  (родитель `bin`). Стиль — минимализм: действия иконками без текста, всё в
  тултипах (иконка папки для «открыть папку игры» и т.п.).
    - **Генерик-редактор (вариант 3.1).** Модалка читает `read_game_settings`
      → упорядоченный `SettingEntry { key, type, value }`; виджет по типу
      (int/float → число, bool → тумблер, str → текст, `Keyboard:*` → захват
      клавиши), группировка по префиксу до `:`. Сохранение — `write_game_settings`
      с сохранением формата/порядка/нетронутых ключей. Парсинг толерантный
      (ключи с `:`/`::` невалидны по строгому XML, но игра их читает).
    - **Регданные и бэкап.** При первом чтении создаётся дамп
      `UserDefault.backup.xml` рядом с конфигом, БЕЗ регистрационных данных.
      `restore_game_settings` («вернуть как было») применяет дамп, сохраняя
      текущие `LastEmail`/`LicenseKey` (не разлогинивает). `strip_registration`
      («удалить регданные») затирает email + лицензионный ключ; в редакторе эти
      поля скрыты — тронуть их можно только этим действием.
    - **Ребинд мыши (вариант 2.1 — нативный, замена AHK).** Игра не понимает
      боковые кнопки мыши; вместо внешнего AHK-скрипта — `start/stop_mouse_remap`
      на `WH_MOUSE_LL`. Клавиша уходит `PostMessage`-ем ТОЛЬКО в активное окно
      `MechsEarth.exe` (не во все — их может быть 5), маппинг `{ button, key }[]`
      в tauri-store. Детали — other--cop-native-bridge-remaps-mouse-to-active-window;
      команды конфига — other--cop-native-bridge-manages-game-settings; UI —
      view--cop-home + behavior view--cop-home-edits-game-settings.

  ## Открытые вопросы
  - Fallback, если папка не найдена или пуста: подсказка «укажи путь вручную» +
    открыть настройку пути.
  - Точный формат парсинга версии из имени папки (`v4-1-1-8733` → major.minor.patch
    + build) и tie-break, если билды равны — деталь реализации.
  - Скачивание последней версии: источник дистрибутива (сайт игры / собственный
    апдейтер клиента) и триггер (игра не установлена vs устарела) — уточнить.
  - «Настройка и синхронизация базовых параметров игры» — состав параметров и
    механика синхронизации будут заданы юзером отдельно (возможна завязка на
    KV-платформу программы, если синхронизация кросс-клиентная).

