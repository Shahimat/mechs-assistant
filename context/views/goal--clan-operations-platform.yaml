key: clan-operations-platform
title: Clan Operations Platform (COP) — единый Tauri-инструмент клана
status: planned

why: |
  Единый инструмент для клана: автопарс личного инвентаря → внесение в общий
  склад → заявки на выдачу → цели клана с трекингом вклада каждого. Публичный
  SPA (shahimat.github.io/…) продолжает отдавать анонимные каталоги + базовый
  калькулятор без auth.

  Изначально MVP3 планировался как «клановый склад» на Cloudflare Workers + D1
  + Google OAuth + JWT-whitelist (shared BaaS, SPA-first). После обсуждения
  архитектуры (2026-07-16, разворот зафиксирован в CHANGELOG) переформулирован
  в self-hosted COP: master-БД на диске владельца + Cloudflare Workers KV как
  outbox/snapshot-кэш, никакого always-on backend'а, за который мы платим
  сервис-провайдеру. Старый backend+auth-план (Cloudflare+D1+OAuth, Phase 0-7)
  этой целью заменён целиком — его живой интент (приватные клановые фичи +
  auth) поглощён архитектурой ниже.

description: |
  ## Роли клана
  - **owner** (клан-лидер). Единственный, у кого master-БД. Настраивает состав,
    принимает custody, одобряет заявки на выдачу.
  - **delegate** (доверенные лица, у нас 1-2). Дублируют права владельца, когда
    тот оффлайн: принимают события в свою временную custody-таблицу, могут
    одобрять заявки. Текущий разработчик = один из delegates.
  - **member** (клан-мемберы). Смотрят склад, вносят предметы, подают заявки.
  Персональные bearer-токены, распространение вручную через личные сообщения
  (Discord/Telegram).

  ## Архитектура (принципиальная)
  Master SQLite на диске владельца — единственный источник правды, лог движений
  append-only. Cloudflare Workers KV (free-tier, упираемся в ~5% лимитов) —
  промежуточный слой async-репликации: клиент пишет `pending:{uuid}` →
  владелец/delegate drainит и применяет к master. При оффлайн-владельце delegate
  принимает в свой custody-слой, при возвращении владельца — explicit переток
  «custody → master». Retention `pending:*` — 30 дней (TTL).

  Роли KV-ключей: `pending:{uuid}` (outbox операций); `snapshot:latest`
  (компактный JSON текущего состояния для быстрого чтения клиентами);
  `custody:{delegate_id}:{uuid}` (обмен custody); `notify:{member_id}:{...}`
  (заявки и события для admin'ов).

  Cloudflare Worker (~200 строк, apps/cop-worker/) — тонкий фасад над KV:
  POST /pending, GET /snapshot, GET/DELETE /pending, POST /custody, POST /request,
  GET /notifications. Auth — Bearer-token per member; Worker сверяет токен с
  копией members-таблицы (кэш в KV, инвалидация при изменении у владельца).

  Клиент (Tauri) — единый codebase с публичным SPA (общий React из корневого
  src/), плюс Tauri-only роуты и Rust-мосты (parser, sqlite, cop-client).
  Локальный SQLite через tauri-plugin-sql. Offline-first: snapshot из кэша
  мгновенно, KV в фоне.

  ## Модель данных M1 (уточнена 2026-07-17 по разбору ER-диаграммы юзера)
  Движения склада = **документ + строки** (один Alt+Q-снимок = один deposit с
  N предметами):
  - `members(id, name, role, token_hash, status, added_at)` — role owner/
    delegate/member; status active/revoked (ротация токенов).
  - `items(id, catalog, item_key, name_cache, added_at)` — справочник предметов
    склада; **идентичность = кросс-каталожная ссылка (catalog, item_key)**,
    UNIQUE по ней; name_cache — денормализованное имя для отображения, не
    первичный ключ; иконка/навигация в UI через crossCatalogLookup(catalog,
    item_key).
  - `warehouse_events(id, uuid, ts, type, actor_id, target_id, origin,
    custody_from, note, applied_at)` — **шапка** движения; type = deposit/
    withdrawal/correction (узко = только товародвижение); uuid — идемпотентный
    ключ для drain'а из KV; actor_id (кто) + target_id (кому выдали, nullable)
    колонками, без M2M; **без deleted_at** — append-only, правка = новое
    событие correction.
  - `warehouse_event_items(id, event_id, item_id, count_delta)` — **строки**;
    count_delta знаковый (deposit +, withdrawal −).
  - `warehouse(item_id UNIQUE, quantity, updated_at)` — **материализованная
    проекция** остатка, пересобираемая из событий; источник для snapshot:latest
    в KV; своя идентичность по предмету, uuid не нужен.
  - `withdrawal_requests(id, uuid, ts, by_member, items_json, urgency, reason,
    status, resolved_by, resolved_at, resolution_note)` — **отдельная
    сущность**, не подтип Event.
  - `custody_events(...)` — на машинах delegate, временный слой (uuid обязателен).
  - (Будущее) `goals(...)`, `goal_requirements(...)`, `contributions(...)`.

  **Правило uuid:** ставим там, где запись пересекает границу клиент→KV→master
  и может задвоиться при повторном drain'е (warehouse_events, custody_events,
  withdrawal_requests). Проекции/агрегаты (warehouse, будущий прогресс цели)
  uuid не несут — естественная идентичность + пересобираемы.

  ## Non-goals (осознанно НЕ делаем)
  - Публичный доступ ко второму клану (1 клан = 1 инсталляция KV/Worker; второй
    клан разворачивает свой Worker + токены).
  - Полноценная OAuth (bearer-токены вручную — достаточно для 5-20 человек).
  - Real-time collaborative editing (задержка через KV ~30 сек-1 мин приемлема).
  - Мобильный клиент (COP desktop-only через Tauri; мобильщики — публичный SPA).

  ## Риски / открытые вопросы
  - Retention KV vs redundancy: и владелец, и все delegate оффлайн >30 дней →
    pending чистится; наблюдаем по факту.
  - Ротация compromised токенов: revoke в UI, снапшот может отдавать до
    инвалидации кэша (~30 сек) — приемлемо.
  - Миграция при смене владельца: копия .db + reset KV + перегенерация токенов;
    документируется как manual docs/manuals/cop-migrate-owner.md.
  - Concurrent write conflicts: append-only + SUM(count_delta) снимает
    большинство; отрицательный остаток → warning владельцу, разбор вручную.
  - Модель usefulness-веса целей (частичное соответствие требованию при вкладе
    чертежа соседнего уровня) — прорабатываем в M4.

  ## Открытое перед стартом M1
  (а) финальное название приложения (влияет на .msi title, ярлык, updater
  manifest; рабочее — «Мехи COP»); (б) публичный домен для Worker; (в) детальная
  схема миграций SQLite (drizzle-orm/kysely/сырой SQL); (г) стратегия backup
  master-БД у владельца (auto-copy в OneDrive/GDrive vs SQL-dump в приватный
  git-репо клана).

  Между подфазами полезны паузы «поиграли неделю в клане — что работает, что
  переделать».

tasks:
  blocker:
    - 'техдолг «единый codebase SPA+Tauri»: переезд apps/inventory-parser на общий React из корневого src/ + Tauri-only роуты + Rust-мосты + переименование приложения (рабочее «Мехи COP», финализировать перед M1). Делается ПОСЛЕ доработок парсера, ДО M1 — иначе дублируем UI-код каталогов и калькулятора → фаза refactor → блокер: незакрытые доработки goal inventory-parser'

  high:
    - 'Phase M1 · Основа WMS + управление составом клана (~2 недели): master SQLite схема + миграции; Cloudflare Worker + KV setup (deploy через wrangler в apps/cop-worker/); роли owner + member (delegate — только M2); персональные токены с генерацией через UI владельца; события deposit + withdrawal_direct + correction; ПОЛНОЦЕННЫЙ UI кланового склада — (а) список текущего состояния с фильтрами/поиском и иконками из существующих каталогов, (б) timeline событий «Х внёс 5 чертежей ПОЛЕ 2 часа назад», (в) статистика вклада мемберов за период; локальный SQLite «личный склад» (без sync) с кнопкой «внести в клановый»; onboarding-экран вставки токена → приложение проверяет доступ → синхронизирует snapshot. По явному решению юзера 2026-07-16 M1 включает полноценный функционал склада, а не «список позиций и хватит» → фаза feat → блокер: единый codebase'

  medium:
    - 'Phase M2 · Two-host (~3-4 дня): роль delegate + custody-механика — custody-таблица на диске delegate; KV keyspace custody:*, POST /custody; UI владельца «Ожидает custody-transfer» + «Принять всё / выборочно»; UI delegate «Владелец оффлайн X дней, я держу N событий в custody» → фаза feat → блокер: M1'
    - "Phase M3 · Заявки на выдачу (~3-4 дня): withdrawal_requests таблица + UI подачи (мембер) + UI обработки approve/deny/partial с комментарием (owner/delegate); KV notifications-канал + Tauri system notifications (tauri-plugin-notification) для admin'ов при открытом приложении; timeline расширяется заявками/одобрениями/отказами → фаза feat → блокер: M2"

  low:
    - 'Phase M4 · Цели + калькулятор-интеграция (~1-1.5 недели): goals таблица (описание, цель-меха, целевой уровень, deadline); движок MVP2-калькулятора вычисляет goal_requirements; UI цели — прогресс-бар + вклад каждого мембера с usefulness-weighting; личная версия калькулятора в Tauri тянет остатки из локального SQLite; сохранение персонального расчёта как клановой цели через approve владельца → фаза feat → блокеры: M3 + движок goal calculator'

depends_on:
  - inventory-parser
  - calculator
