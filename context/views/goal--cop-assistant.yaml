  medium:
    - 'OCR/pipeline «5 из 13»: recognizePage скипает ячейку целиком, если OCR не прочитал цифру (`if count===null||count===0 continue`), но крoп цифры — вся нижняя 25% ширины ячейки, где цифра только в правом-нижнем углу с прозрачным фоном → tesseract часто возвращает null → 8 из 13 занятых слотов молча выпадают. ПЛАН: (a) сузить OCR-crop до правого-нижнего угла ~40%×30%; (b) не скипать ячейку, если pHash что-то нашёл, а OCR провалился — показывать её с count=? и полем ручного ввода; побочно проверить чтение соседней цифры (ВОЗВРАТ вернул count=42 при реальном 13 — crop уполз) → фаза feat → нет'
