key: cop-assistant
program: cop
title: Помощник по рутине игры
status: active

why: |
  Убрать ручную рутину игрока: пересчёт содержимого инвентаря, хоткеи под частые
  действия, автосброс определённого лута в нужном количестве, автопополнение
  боеприпасов, автоподсчёт. Самая ощутимая для игрока часть COP — работает
  локально, не ждёт серверной платформы. Сюда же перенесён вопрос парсера
  инвентаря (миграция прежней самостоятельной цели inventory-parser).

description: |
  ## Автоматизация игры (high)
  Набор локальных удобств поверх Tauri-клиента: глобальные хоткеи под частые
  действия; автоматический сброс определённого лута в определённом количестве;
  автоматическое пополнение боеприпасов; автоподсчёт содержимого инвентаря.
  Конкретный состав уточняется по ходу игры в клане («поиграли неделю — что
  бесит руками»). Не требует серверной платформы программы.

  ## Парсер инвентаря (medium, миграция)
  Сквозной конвейер уже работает и закрыт кодом (см. CHANGELOG 2026-07-15/16):
  Tauri 2.x + React 19 + Rspack; xcap снимает окно по hwnd без переключения
  фокуса; imageproc template matching UI-угла рамки инвентаря; pHash 16×16
  против index из data/icons/**/*.webp; tesseract.js OCR чисел под иконками;
  серия страниц пагинации с дедупом; diagnostic-export ZIP; автобилд на push +
  Tauri auto-updater. Живут только незакрытые доработки ниже.

  DETECT INVENTORY: template matching UI-угла рамки на каждом скрине. UI игры
  стабильный (10+ лет не менялся), калибровки не делаем. Ломается template →
  правим шаблон, не логику приложения. Разбиение на ячейки — на клиенте через
  GridConfig (offset_x/offset_y/cell_size/cols/rows), ручная калибровка юзера
  через форму GridSettings (сохранение в tauri-plugin-store).

  Reference-калибровка юзера (1920×1080, сохранена в его settings.json на
  Windows): offset_x=12, offset_y=106, cell_size=94, cols=3, rows=5. Это НЕ
  новые дефолты — DEFAULT_GRID остаётся 48/3/4 как средне-грубый старт под
  1920×1080, конкретную докалибровку юзеры делают у себя через форму.

  Парсер — движок для внесения прихода в клановый склад (см. goal--cop-warehouse,
  который зависит от этой подцели).

