key: cop-debts
program: cop
title: Тет-а-тет: долги и взаимозачёты
status: planned

why: |
  Учёт «кто что кому должен вернуть и сколько, кто что взял в долг». Частая
  бытовая механика внутри клана, которую сейчас держат в голове и переписке —
  теряется и приводит к спорам.

description: |
  Модель долга между двумя мемберами: кто → кому, что (ресурс/предмет/сумма),
  сколько, статус (открыт/погашен), с **двусторонним подтверждением** — долг
  фиксируется, когда обе стороны согласны (иначе спорные записи).

  Данные клановые (видны обеим сторонам) → долг пересекает границу
  клиент→KV→master, значит несёт uuid и синхронизируется через платформу
  программы. Поэтому подцель требует платформы (блокер), хотя доменно
  независима от склада.

  Открытый вопрос: моделировать долг как отдельную сущность или как частный
  случай движения склада (withdrawal с пометкой «в долг») — решаем при старте.

