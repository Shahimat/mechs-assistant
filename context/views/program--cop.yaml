key: cop
kind: program
title: Clan Operations Platform (COP) — единый Tauri-инструмент клана
status: active

why: |
  Единый инструмент для клана вокруг игры «Мехи.Земля»: автопарс личного
  инвентаря → внесение в общий склад → заявки на выдачу → цели клана с трекингом
  вклада каждого, плюс помощник по рутине игры, личный планировщик, учёт долгов,
  интеграция калькуляторов и общекомандная связь. Публичный SPA
  (shahimat.github.io/…) продолжает отдавать анонимные каталоги + базовый
  калькулятор без auth.

  COP — это **программа**, а не одна цель: у неё общая технологическая база
  (монорепо с общим переиспользуемым слоем, Rust-мосты, локальный SQLite,
  KV-транспорт, токен-авторизация) и набор функциональных **подцелей** (goal--cop-*),
  каждая со своим приоритетом и жизненным циклом. Платформенный слой (техбаза
  + сервер + синхронизация + авторизация) живёт в `tasks` этого файла; подцель,
  которой он нужен, отмечает блокер «ждёт платформу программы».

  Изначально MVP3 планировался как «клановый склад» на Cloudflare Workers + D1 +
  Google OAuth + JWT-whitelist (shared BaaS, SPA-first). После обсуждения
  архитектуры (2026-07-16, разворот зафиксирован в CHANGELOG) переформулирован
  в self-hosted COP: master-БД на диске владельца + Cloudflare Workers KV как
  outbox/snapshot-кэш, никакого always-on backend'а, за который мы платим
  сервис-провайдеру. Старый backend+auth-план (Cloudflare+D1+OAuth) этой
  программой заменён целиком.

description: |
  ## Роли клана
  - **owner** (клан-лидер). Единственный, у кого master-БД. Настраивает состав,
    принимает custody, одобряет заявки на выдачу.
  - **delegate** (доверенные лица, у нас 1-2). Дублируют права владельца, когда
    тот оффлайн: принимают события в свою временную custody-таблицу, могут
    одобрять заявки. Текущий разработчик = один из delegates.
  - **member** (клан-мемберы). Смотрят склад, вносят предметы, подают заявки.
  Персональные bearer-токены, распространение вручную через личные сообщения
  (Discord/Telegram).

  ## Платформенная архитектура (общая техбаза)
  Монорепо (npm workspaces) с **двумя раздельными приложениями** и общим
  переиспользуемым слоем — публичный SPA и десктопный COP концептуально разные
  сущности под разные задачи, их НЕ сливаем в один бандл. `apps/web` — SPA (GH
  Pages), `apps/cop` — Tauri-клиент, `packages/shared` (@mechs/shared) —
  переиспользуемый код (типы, каталожные компоненты, утилиты, сторы), который
  импортят оба. Оба приложения на React 19 + rspack. COP несёт Tauri-only Rust-
  мосты (parser, sqlite, cop-client) и локальный SQLite через tauri-plugin-sql;
  каталоги и калькуляторы тянет из `@mechs/shared`, а не дублирует. Offline-first:
  snapshot из кэша мгновенно, KV в фоне. Переиспользование инкрементальное —
  общий слой вычленяется из `apps/web` в `packages/shared` по мере надобности
  COP-подцелей, а не разом.

  Master SQLite на диске владельца — единственный источник правды для клановых
  данных. Cloudflare Workers KV (free-tier, упираемся в ~5% лимитов) —
  промежуточный слой async-репликации: клиент пишет `pending:{uuid}` →
  владелец/delegate drainит и применяет к master. При оффлайн-владельце delegate
  принимает в свой custody-слой, при возвращении владельца — explicit переток
  «custody → master». Retention `pending:*` — 30 дней (TTL).

  Роли KV-ключей (generic-транспорт, независим от доменной схемы склада):
  `pending:{uuid}` (outbox операций); `snapshot:latest` (компактный JSON
  текущего состояния для быстрого чтения клиентами);
  `custody:{delegate_id}:{uuid}` (обмен custody); `notify:{member_id}:{...}`
  (заявки и события для admin'ов).

  Cloudflare Worker (~200 строк, apps/cop-worker/) — тонкий фасад над KV:
  POST /pending, GET /snapshot, GET/DELETE /pending, POST /custody, POST /request,
  GET /notifications. Auth — Bearer-token per member; Worker сверяет токен с
  копией members-таблицы (кэш в KV, инвалидация при изменении у владельца).

  **Правило uuid (общее для всех подцелей):** ставим там, где запись пересекает
  границу клиент→KV→master и может задвоиться при повторном drain'е. Проекции и
  агрегаты (материализованные остатки, прогресс цели) uuid не несут —
  естественная идентичность + пересобираемы.

  ## Non-goals (осознанно НЕ делаем)
  - Публичный доступ ко второму клану (1 клан = 1 инсталляция KV/Worker; второй
    клан разворачивает свой Worker + токены).
  - Полноценная OAuth (bearer-токены вручную — достаточно для 5-20 человек).
  - Real-time collaborative editing (задержка через KV ~30 сек-1 мин приемлема).
  - Мобильный клиент (COP desktop-only через Tauri; мобильщики — публичный SPA).

  ## Риски / открытые вопросы (платформенные)
  - Retention KV vs redundancy: и владелец, и все delegate оффлайн >30 дней →
    pending чистится; наблюдаем по факту.
  - Ротация compromised токенов: revoke в UI, снапшот может отдавать до
    инвалидации кэша (~30 сек) — приемлемо.
  - Миграция при смене владельца: копия .db + reset KV + перегенерация токенов;
    документируется как manual docs/manuals/cop-migrate-owner.md.
  - Concurrent write conflicts: append-only-модели + агрегация снимают
    большинство; спорные случаи → warning владельцу, разбор вручную.

  ## Открытое перед стартом платформы
  (а) финальное название приложения (влияет на .msi title, ярлык, updater
  manifest; рабочее — «Мехи COP»); (б) публичный домен для Worker; (в) детальная
  схема миграций SQLite (drizzle-orm/kysely/сырой SQL); (г) стратегия backup
  master-БД у владельца (auto-copy в OneDrive/GDrive vs SQL-dump в приватный
  git-репо клана).

  Между подцелями полезны паузы «поиграли неделю в клане — что работает, что
  переделать».

# Платформенный слой программы. Задачи, общие для всех подцелей: техбаза,
# сервер, транспорт синхронизации, авторизация. Подцель, которой они нужны,
# ставит у себя блокер «ждёт платформу программы» вместо depends_on на подцель.
tasks:
  blocker: []

  high:
    - 'сервер: Cloudflare Worker + KV setup (deploy через wrangler в apps/cop-worker/), эндпоинты POST/GET/DELETE /pending, GET /snapshot, POST /custody, POST /request, GET /notifications → фаза feat → нет'
    - 'система синхронизации: generic KV-транспорт (pending/snapshot/custody/notify) — клиентский drain/apply, идемпотентность по uuid, offline-first snapshot-кэш. Независим от доменной схемы склада → фаза feat → блокер: сервер'
    - "auth/authz: генерация персональных bearer-токенов + ручная выдача, роли owner/delegate/member, ротация/revoke (members.status active/revoked), сверка токена Worker'ом против кэша members в KV → фаза feat → блокер: сервер"
