key: infra
title: Инфраструктура и CI
status: active

why: |
  Кросс-сквозные инфраструктурные задачи — всплывают по факту, не спекулятивно.
  Держим отдельной целью, чтобы мелкие «всплывёт при необходимости» пункты не
  засоряли продуктовые цели.

description: |
  Хостинг публичного SPA — GitHub Pages под префиксом /mechs-assistant/. Tauri-
  приложения раздаются через GitHub Releases. Git/CI-процесс (workflow-ручки,
  ruleset защиты main, дисциплина develop→PR→main) описан в context/workflow.md.
  Data-конвейер (parser-wiki / parser-google-sheets / merge) — convention
  data-overlay.

