id: other--cop-native-bridge
kind: entity
namespace: cop
version: '0.x'

description: |
  Rust-часть Tauri-клиента COP — мост между WebView и ОС/CV-библиотеками.
  Семнадцать команд через invoke_handler + набор Tauri-плагинов. UI, pHash и
  OCR живут во фронтенде (parser--inventory / view--inventory-parser); Rust
  отвечает только за то, что нельзя сделать в WebView: снятие окон ОС,
  template matching UI-рамки, запуск/закрытие внешних процессов игры,
  расстановку их окон, правку конфига игры и нативный ребинд мыши.

  **Команды (`src-tauri/src/lib.rs`):**
    - `list_windows` — перечисление окон ОС (xcap): id/title/размер/minimized.
    - `capture_window(title_pattern)` — PNG-снимок первого окна, чей title
      содержит паттерн (case-insensitive), base64 в WebView; без активации
      и переключения фокуса; Err, если окно свёрнуто или не найдено.
    - `find_inventory_corner(png)` — template matching UI-угла рамки инвентаря
      (imageproc, SumOfSquaredErrorsNormalized); минимум ищется только в
      правой половине скрина (инвентарь всегда справа); score > 0.5 → None.
      Эталон угла захардкожен через include_bytes!
      (`src-tauri/assets/inventory-corner.png`).
    - `debug_visualize_corner(png)` — тот же поиск + красная рамка поверх
      скрина для дебага промахов.
    - `write_file_base64(path, contents)` — запись байтов в выбранный
      диалогом путь (без fs-плагина и scope-настройки).
    - `find_latest_game(base_dir?)` — сканирует папку игры (дефолт
      `%LOCALAPPDATA%\MechsEarth\bin`), парсит подпапки версий
      `v<A-B-C-BUILD>`, возвращает `GameBuild { version_label, dir_name,
      exe_path }` с максимальной версией; без запуска (для UI). Err, если
      папка не найдена или в ней нет билда с `MechsEarth.exe`.
    - `launch_game(base_dir?)` — то же разрешение последней версии +
      `std::process::Command::spawn` найденного exe (cwd = папка билда).
      Жёсткий путь версии не хранится → после апдейта запускается новый
      билд без правки настроек. `async` + `spawn_blocking`: `CreateProcess`
      (его тормозит Defender) уходит в blocking-пул, главный поток не фризит.
    - `close_all_games()` — закрывает все запущенные сессии игры разом:
      форсированный `taskkill /F /IM MechsEarth.exe`. Код 128 (процессов
      нет) трактуется как успех; на не-Windows — Err.
    - `list_game_windows()` — перечисляет top-level видимые окна процессов
      `MechsEarth.exe` с геометрией: `GameWindow { pid, title, x, y, width,
      height }` (координаты абсолютные, в системе виртуального рабочего
      стола → мультимонитор из коробки, x/y могут быть отрицательными).
      Процессы ищутся по имени exe, не по заголовку (устойчиво к
      локализации). Фронтенд использует для «запомнить текущую раскладку».
      Windows-only (`#[cfg(windows)]`, `windows`-crate); иначе Err.
    - `launch_and_arrange(base_dir?, slots)` — мультизапуск + раскладка:
      запускает `slots.len()` инстансов последней версии (тот же resolve,
      что launch_game), ждёт появления окна каждого нового PID (поллинг с
      таймаутом), затем позиционирует окно i в слот i (`SetWindowPos`,
      предварительно `SW_RESTORE`). `slots` — массив `{ x, y, width,
      height }` из пресета. Сопоставление слот↔окно по порядку запуска PID.
      Возвращает сводку (сколько запущено/размещено + предупреждения по
      окнам, не появившимся за таймаут). Windows-only. `async` +
      `spawn_blocking` (блокирующий цикл поллинга/спавна вне главного потока).
    - `read_game_settings(base_dir?)` — читает конфиг игры
      `…\MechsEarth\UserDefault.xml` (родитель `bin`; дефолт
      `%LOCALAPPDATA%\MechsEarth\UserDefault.xml`). Толерантный парсинг
      плоского XML (ключи с `:`/`::` невалидны по строгому XML, но игра их
      читает) → упорядоченный `SettingEntry { key, type, value }`. При первом
      чтении создаёт бэкап-дамп `UserDefault.backup.xml` БЕЗ регданных.
    - `write_game_settings(base_dir?, entries)` — пишет значения обратно с
      сохранением формата: исходный порядок ключей, type-атрибуты,
      нетронутые/нередактируемые ключи (регистрация, блобы `UI:Setting`,
      `Game:Colors:*`) остаются как были.
    - `restore_game_settings(base_dir?)` — применяет `UserDefault.backup.xml`
      («вернуть как было»), СОХРАНЯЯ текущие `LastEmail`/`LicenseKey` (в
      бэкапе их нет — восстановление не разлогинивает игру).
    - `strip_registration(base_dir?)` — затирает `LastEmail` и `LicenseKey`
      в живом конфиге (удалить регданные: email + лицензионный ключ).
    - `open_game_folder(base_dir?)` — открывает файловый менеджер на папке
      игры `…\MechsEarth` (Explorer на Windows).
    - `start_mouse_remap(bindings)` / `stop_mouse_remap()` — нативный ребинд
      боковых кнопок мыши (замена AHK). `WH_MOUSE_LL` на выделенном потоке с
      message-loop; по нажатию замапленной кнопки, если активное окно
      (`GetForegroundWindow`) принадлежит `MechsEarth.exe`, шлёт клавишу
      `PostMessage WM_KEYDOWN/WM_KEYUP` ТОЛЬКО в это окно (не во все) и
      проглатывает исходное событие; иначе — пропускает штатно. Маппинг
      `{ button, key }[]` персистится в tauri-store (ключ mouseRemap).
      Windows-only.

  read/write/restore/strip_registration — чистые fs+XML, при явном baseDir
  работают и в dev (не Windows). open_game_folder + mouse-remap — Windows-only.
  `find_latest_game` тоже `async` — скан папки не блокирует главный поток.

  **Плагины:** global-shortcut, store, updater, process, dialog.

  UI игры стабилен 10+ лет — калибровки нет; ломается template → правим
  `inventory-corner.png` и пересобираем, а не логику.

source_files:
  lib: apps/cop/src-tauri/src/lib.rs
  main: apps/cop/src-tauri/src/main.rs
  corner_template: apps/cop/src-tauri/assets/inventory-corner.png
  config: apps/cop/src-tauri/tauri.conf.json

manuals: []
behaviors:
  - other--cop-native-bridge-captures-window-without-focus
  - other--cop-native-bridge-launches-latest-game
  - other--cop-native-bridge-closes-game-sessions
  - other--cop-native-bridge-arranges-game-windows
  - other--cop-native-bridge-manages-game-settings
  - other--cop-native-bridge-remaps-mouse-to-active-window
