id: other--tile
kind: entity
namespace: ui
version: "0.x"

description: |
  Квадратная плитка навигации. Единый строительный блок для
  `view--home` и `view--catalogs-hub` (и будущих страниц-хабов).
  Показывает иконку по центру и подпись под ней, целиком является
  ссылкой (`react-router` `<Link>`).

  Интерактив:
    - при hover — плавное масштабирование (`transform: scale(1.03)`
      + subtle shadow).
    - при active (клик/тап) — короткий press-эффект (`scale(0.98)`).
    - focus-ring для клавиатурной навигации.

  Иконка передаётся снаружи (`icon: ReactNode`) — может быть MUI-иконкой
  или `<img src={webpUrl}>` из `apps/web/assets/images/` (импорт через alias
  `@img`). Заготовки-исходники лежат в `assets/raw/`, конвертация в
  webp — `npm run convert:webp` (см. convention `assets-layout`).

  Сетка плиток — `TileGrid` (адаптивный CSS Grid, квадратные ячейки
  через `aspect-ratio: 1`).

source_files:
  tile: apps/web/src/components/tiles/Tile.tsx
  tile_styles: apps/web/src/components/tiles/Tile.styles.ts
  grid: apps/web/src/components/tiles/TileGrid.tsx
  grid_styles: apps/web/src/components/tiles/TileGrid.styles.ts

features_enabled:
  - hover-scale
  - active-press
  - focus-ring
  - custom-icon-slot

features_disabled:
  - badge-counter         # без счётчиков «сколько внутри»
  - drag-reorder          # порядок плиток фиксирован в коде

manuals: []
behaviors:
  - other--tile-scales-on-hover-and-navigates-on-click
