id: data--equipment-catalog
kind: entity
namespace: catalog
version: "0.x"

description: |
  Каталог оборудования — всё, что ставится в слоты меха, кроме основного
  вооружения. Объединяет четыре подраздела вики: Дополнительное
  оборудование (page_id=3682), Чипы (3657), Энергоснабжение (3106),
  Защита (3108).

  Один UI-каталог с фильтрацией по подтипу — вместо четырёх отдельных.
  Первичный источник — `parser--wiki` с конфигом на четыре page_id.
  Иконки — из парсера или скриншотов автора, поле `iconPath`.

  Shell-entity MVP1: файл заведён, схема/данные/UI появятся при
  подключении через пилот-цепочку.

source_files:
  data: data/equipment.json              # появится после первого прогона parser--wiki
  types: src/types/equipment.ts

wiki_source:
  page_ids: [3682, 3657, 3106, 3108]
  section: Предметы → Доп. оборудование + Чипы + Энергоснабжение + Защита
  data_flow: auto-parsed

manuals: []
behaviors: []

verified_note: |
  Shell-entity создана в фазе docs MVP1. Схема будет содержать поле
  `subtype` для различения четырёх подкатегорий. Реализация — при
  подключении каталога через пилот-цепочку.
