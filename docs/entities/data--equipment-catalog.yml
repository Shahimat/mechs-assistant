id: data--equipment-catalog
kind: entity
namespace: catalog
version: '1.x'

description: |
  Каталог оборудования — всё, что ставится в слоты меха, кроме основного
  вооружения: аккумуляторы, реакторы, броня, энергощиты, трюма, буры для
  добытчика и чипы. Третий каталог MVP1 после мехов и weapons — накатывается
  по обкатанному конвейеру `parser--wiki` + `parser--google-sheets` +
  `build-data` merger.

  В zustand-стор импортируется merged JSON (`@build/data/equipment.json`)
  — массив объектов `Equipment` без сетевого слоя. Merged JSON генерируется
  build-time скриптом `scripts/build-data`: parsed-данные
  `data/equipment.json` мержатся с overlay `data/overrides/equipment.yml`,
  каждая запись получает `_meta.overlayFields`, `_meta.overlayUpdatedAt`,
  `_meta.overlaySource` для UI-подсветки уточнённых полей.

  Первичный источник — четыре корневых страницы вики: «Дополнительное
  оборудование» (page_id=3682), «Чипы» (3657), «Энергоснабжение» (3106),
  «Защита» (3108). Страницы 3682/3106/3108 — оглавления, ссылаются на
  подстраницы конкретных подтипов; 3657 сразу отдаёт карточки. BFS
  штатный (по паттерну weapons) — идёт по ссылкам с `page_id` из
  `entry-content`.

  На подстраницах карточки размечены классами
  `h2.wiki-header.wiki-item-type-<family>-<subtype>`. Двухчастный
  CSS-класс даёт бесплатно и группу верхнего уровня (`family`), и
  подтип (`subtype`). Обнаружено 7 подтипов на 4 семьи (см. schema).

  Overlay `data/overrides/equipment.yml` синкается из Google Sheets
  (лист `equipment`) через `parser--google-sheets`. Через overlay можно
  добавлять и полностью новые сущности — merger заводит запись, даже
  если ключа нет в parsed. Схема — TS-типы в `src/types/equipment.ts`.

source_files:
  parsed: data/equipment.json
  overlay: data/overrides/equipment.yml
  merged: .build/data/equipment.json # build-time
  merger: scripts/build-data/index.ts
  parser: scripts/parser-wiki/resolvers/equipment.ts # специфичный резолвер
  types: src/types/equipment.ts

wiki_source:
  root_page_ids: [3682, 3657, 3106, 3108]
  root_sections:
    - Предметы → Доп. оборудование (3682) → Добывающий модуль (3687) + Трюма (3693)
    - Предметы → Чипы (3657) — карточки сразу
    - Предметы → Энергоснабжение (3106) → Накопители (3334) + Реакторы (3336)
    - Предметы → Защита (3108) → Броня (3330) + Защитное поле (3364)
  data_flow: auto-parsed
  page_structure: |
    4 корневых page_id из root_page_ids. 3682/3106/3108 — оглавления,
    ссылаются на подстраницы конкретных подтипов. 3657 отдаёт карточки
    сразу. Подстраницы содержат `h2.wiki-header.wiki-item-type-<family>-<subtype>`,
    рядом лежит `table.wiki-item-table`. `family` и `subtype` берём из
    CSS-класса, не из текста заголовка.

schema:
  equipment_key_fields:
    - key # уникальный идентификатор (translit от name)
    - name # полное название с моделью/уровнем
    - model # модель без уровня
    - family # `electronic` | `special` | `energy` | `defence` — верхний уровень CSS-класса
    - subtype # `computer` | `extractor` | `cargo` | `accumulator` | `generator` | `armour` | `shield`
    - slot # «Устанавливается в слот» из таблицы
    - stats # EquipmentStats
  stats_fields:
    required: [durability, weight]
    optional:
      - primary # subtype-specific ключевой числовой параметр (Мощность подъема / Трюм / Емкость / Мощность / Броня / Мощность поля)
      - primaryLabel # русская подпись параметра из вики (для чипов может отсутствовать)
  optional_top_level:
    - requiredLevel
    - requiredRobotType # у буров: «Добытчик»
    - buyPrice # { bonds?, regls? }
    - sellPrice # { bonds?, regls? }
    - craftFromBlueprints # список названий чертежей
    - description
    - iconPath # data/icons/equipment/<key>.webp
    - wikiUrl
  subtypes:
    - key: computer
      css: electronic-computer
      family: electronic
      label_ru: Чипы
      root_page_id: 3657
      approx_count: 42
      primary: null # у чипов основной эффект в описании, числового primary нет
    - key: extractor
      css: special-extractor
      family: special
      label_ru: Буры
      root_page_id: 3687
      approx_count: 7
      primary: Мощность подъема
    - key: cargo
      css: special-cargo
      family: special
      label_ru: Трюма
      root_page_id: 3693
      approx_count: 13
      primary: Трюм
    - key: accumulator
      css: energy-accumulator
      family: energy
      label_ru: Накопители
      root_page_id: 3334
      approx_count: 25
      primary: Емкость
    - key: generator
      css: energy-generator
      family: energy
      label_ru: Реакторы
      root_page_id: 3336
      approx_count: 27
      primary: Мощность
    - key: armour
      css: defence-armour
      family: defence
      label_ru: Броня
      root_page_id: 3330
      approx_count: 29
      primary: Броня
    - key: shield
      css: defence-shield
      family: defence
      label_ru: Энергощиты
      root_page_id: 3364
      approx_count: 31
      primary: Мощность поля

features_enabled: [json-source, typed-schema, overlay-merge]
features_disabled: [network-fetch, dynamic-schema]

manuals: []
behaviors:
  - data--equipment-catalog-loaded-from-json
  - data--equipment-catalog-schema-typed
  # UI-каталогов над этой data-сущностью семь — по одному на subtype:
  - view--chips-catalog-renders-cards-grid
  - view--shields-catalog-renders-cards-grid
  - view--armour-catalog-renders-cards-grid
  - view--accumulators-catalog-renders-cards-grid
  - view--reactors-catalog-renders-cards-grid
  - view--drills-catalog-renders-cards-grid
  - view--cargos-catalog-renders-cards-grid

verified_note: |
  Data-слой закрыт 2026-07-13: parser-wiki собрал 173 записи, build-data
  мержит parsed + overlay в `.build/data/equipment.json`, стор
  `src/stores/equipment/store.ts` читает merged JSON. UI-раздроб на 7
  view (chips/shields/armour/accumulators/reactors/drills/cargos)
  реализован: единый store, общие карточные компоненты
  `src/components/catalogs/equipment/`, 7 тонких обёрток над
  `EquipmentSubCatalog`. Все behaviors verified 2026-07-13.
