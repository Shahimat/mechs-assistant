id: data--robots-catalog
kind: entity
namespace: catalog
version: '1.x'

description: |
  Каталог мехов (роботов) игры Мехи.Земля. Единый источник данных
  приложения по мехам. В zustand-стор импортируется merged JSON
  (`@build/data/robots.json`) — массив объектов `Robot` без сетевого
  слоя. Merged JSON генерируется build-time скриптом `scripts/build-data`:
  parsed-данные `data/robots.json` мержатся с overlay
  `data/overrides/robots.yml`, каждый мех получает `_meta.overlayFields`,
  `_meta.overlayUpdatedAt`, `_meta.overlaySource` — на них UI строит
  подсветку уточнённых полей. Схема — TypeScript-типы в
  `apps/web/src/types/robot.ts`.

  Первичный источник — вики `new.mechs.su`, подстраницы по типам мехов:
  Боец (page_id=3301), Транспортник (3088), Добытчик (3099),
  Разведчик (3102). Наполнение и обновление `data/robots.json` —
  универсальный парсер `parser--wiki`. Overlay `data/overrides/robots.yml`
  синкается из Google Sheets через `parser--google-sheets`
  (см. convention `data-overlay`).

  Пилот-каталог MVP1 (подход C): цепочка
  `wiki → parser--wiki → data/robots.json → merger → .build/data/robots.json
  → view` плюс параллельная ветка `Sheets → parser--google-sheets →
  data/overrides/robots.yml → merger` обкатана на мехах и готова к
  накатыванию на остальные 10 каталогов.

source_files:
  parsed: data/robots.json
  overlay: data/overrides/robots.yml
  merged: .build/data/robots.json # генерируется build-time, импортируется стором
  merger: scripts/build-data/index.ts
  types: apps/web/src/types/robot.ts

wiki_source:
  page_ids: [3301, 3088, 3099, 3102]
  section: Роботы
  data_flow: auto-parsed # без гибрида, всё из парсера + иконки

schema:
  robot_types: [боец, транспортник, добытчик, разведчик]
  robot_key_fields:
    - key # уникальный идентификатор
    - name # название с уровнем
    - model # модель робота
    - type # RobotType
    - requiredLevel # требуемый уровень персонажа
    - stats # RobotStats
  stats_fields:
    required: [durability, capacity, speed, maxSpeed, armor, energyFields]
    optional:
      [maxCapacity, regenerationPerMinute, additionalInvulnerability, additionalAcceleration]
  optional_top_level:
    - buyPrice
    - sellPrice
    - upgradePrice
    - upgradeReglPercent
    - itemUpgradePercent
    - extraSlots
    - features
    - backSideDamage
    - howitzerDamage
    - missChance
    - description
    - iconPath # data/icons/mechs/<key>.webp (пишет parser--wiki)
    - wikiUrl

features_enabled: [json-source, typed-schema]
features_disabled: [network-fetch, dynamic-schema]

manuals: []
behaviors:
  - data--robots-catalog-loaded-from-json
  - data--robots-catalog-schema-typed
  - view--robots-catalog-renders-cards-grid # кросс-ссылка: карточный view читает данные каталога
