id: data--robots-catalog
kind: entity
namespace: catalog
version: "1.x"

description: |
  Каталог мехов (роботов) игры Мехи.Земля. Единый источник данных
  приложения по мехам. Данные хранятся в `data/robots.json` (массив
  объектов `Robot`), импортируются в zustand-стор напрямую (без
  сетевого слоя). Схема — TypeScript-типы в `src/types/robot.ts`.

  Первичный источник — вики `new.mechs.su`, подстраницы по типам мехов:
  Боец (page_id=3301), Транспортник (3088), Добытчик (3099),
  Разведчик (3102). Наполнение и обновление `robots.json` — универсальный
  парсер `parser--wiki` (см. context/roadmap.md, сквозной эпик «Данные»).

  Пилот-каталог MVP1 (подход C): полностью автоматизированная цепочка
  `wiki → parser--wiki → S3 → build-time bundle → data/robots.json → view`
  сначала обкатывается на мехах, потом наливаются остальные 10 каталогов.

source_files:
  data: data/robots.json
  types: src/types/robot.ts

wiki_source:
  page_ids: [3301, 3088, 3099, 3102]
  section: Роботы
  data_flow: auto-parsed          # без гибрида, всё из парсера + иконки

schema:
  robot_types: [боец, транспортник, добытчик, разведчик]
  robot_key_fields:
    - key            # уникальный идентификатор
    - name           # название с уровнем
    - model          # модель робота
    - type           # RobotType
    - requiredLevel  # требуемый уровень персонажа
    - stats          # RobotStats
  stats_fields:
    required: [durability, capacity, speed, maxSpeed, armor, energyFields]
    optional: [maxCapacity, regenerationPerMinute, additionalInvulnerability, additionalAcceleration]
  optional_top_level:
    - buyPrice
    - sellPrice
    - upgradePrice
    - upgradeReglPercent
    - itemUpgradePercent
    - extraSlots
    - features
    - backSideDamage
    - howitzerDamage
    - missChance
    - description
    - imageUrl        # соответствует iconPath из convention data-overlay
    - wikiUrl

features_enabled: [json-source, typed-schema]
features_disabled: [network-fetch, dynamic-schema]

manuals: []
behaviors:
  - data--robots-catalog-loaded-from-json
  - data--robots-catalog-schema-typed
  - view--robots-catalog-renders-cards-grid   # кросс-ссылка: карточный view читает данные каталога
