id: data--robots-catalog
kind: entity
namespace: catalog
version: "1.x"

description: |
  Каталог роботов игры Мехи.Земля. Единый источник данных для приложения.
  Данные хранятся в `data/robots.json` (массив объектов `Robot`),
  импортируются в zustand-стор напрямую (без сетевого слоя).
  Схема — TypeScript-типы в `src/types/robot.ts`.

  Первичный источник данных — вики `new.mechs.su/wiki/robots`; наполнение
  и обновление `robots.json` будет автоматизировано через долгоживущий
  парсер (future entity `parser--wiki-robots`, см. context/roadmap.md,
  сквозной эпик «Данные»).

source_files:
  data: data/robots.json
  types: src/types/robot.ts

schema:
  robot_types: [боец, транспортник, добытчик, разведчик]
  robot_key_fields:
    - key            # уникальный идентификатор
    - name           # название с уровнем
    - model          # модель робота
    - type           # RobotType
    - requiredLevel  # требуемый уровень персонажа
    - stats          # RobotStats
  stats_fields:
    required: [durability, capacity, speed, maxSpeed, armor, energyFields]
    optional: [maxCapacity, regenerationPerMinute, additionalInvulnerability, additionalAcceleration]
  optional_top_level:
    - buyPrice
    - sellPrice
    - upgradePrice
    - upgradeReglPercent
    - itemUpgradePercent
    - extraSlots
    - features
    - backSideDamage
    - howitzerDamage
    - missChance
    - description
    - imageUrl
    - wikiUrl

features_enabled: [json-source, typed-schema]
features_disabled: [network-fetch, dynamic-schema]

manuals: []
behaviors:
  - data--robots-catalog-loaded-from-json
  - data--robots-catalog-schema-typed
  - view--robots-catalog-renders-cards-grid   # кросс-ссылка: карточный view читает данные каталога
