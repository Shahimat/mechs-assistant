id: view--catalogs-hub
kind: entity
namespace: ui
version: "0.x"

description: |
  Хаб каталогов (`/catalogs`). Сетка из 11 квадратных плиток
  (`other--tile`), каждая — переход в конкретный каталог. У каждой
  плитки — тематическая webp-иконка из `assets/images/catalog-icons/`.

  На момент 2026-07-12 работает только каталог мехов
  (`/catalogs/mechs-catalog` → `view--robots-catalog`); остальные 10
  (Оружие, Оборудование, Боезапасы, Предметы, Лут, Чертежи,
  Ископаемое, Компоненты, Валюта, Навыки) ведут на `CatalogStubPage`
  с заглушкой «в разработке» — они оживут по мере расширения парсера
  вики и overlay из Google Sheets на соответствующие сущности.

  Визуально и структурно идентичен `view--home` — тот же паттерн
  «страница из плиток», отличается только контент. Компоненты
  `other--tile` / `TileGrid` переиспользуются напрямую.

source_files:
  page: src/pages/CatalogsHubPage.tsx
  stub: src/pages/catalogs/CatalogStubPage.tsx    # универсальная заглушка для 10 каталогов в разработке

features_enabled:
  - tiles-grid
  - navigate-to-catalog

features_disabled:
  - catalog-search        # поиск по каталогам не нужен, пока их 11
  - group-by-category     # плоский список плиток

manuals: []
behaviors:
  - view--catalogs-hub-renders-catalog-tiles
