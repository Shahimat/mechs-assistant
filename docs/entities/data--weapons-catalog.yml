id: data--weapons-catalog
kind: entity
namespace: catalog
version: '1.x'

description: |
  Каталог вооружения — оружие, устанавливаемое в основные слоты мехов.
  Второй каталог MVP1 (после мехов) — первый реальный тест
  переиспользуемого конвейера `parser--wiki` + `parser--google-sheets`
  + `build-data` merger.

  В zustand-стор импортируется merged JSON (`@build/data/weapons.json`)
  — массив объектов `Weapon` без сетевого слоя. Merged JSON генерируется
  build-time скриптом `scripts/build-data` (общий для всех каталогов):
  parsed-данные `data/weapons.json` мержатся с overlay
  `data/overrides/weapons.yml`, каждая запись получает
  `_meta.overlayFields`, `_meta.overlayUpdatedAt`, `_meta.overlaySource`
  — на них UI строит подсветку уточнённых полей.

  Первичный источник — вики `new.mechs.su/?page_id=3341`
  («Вооружение»). Страница 3341 — оглавление, ссылается на подстраницы
  категорий (Пушка = 3338, Пулемет = 3347, Мортира = 3349, …, Лазер =
  3389, Ремпушки для транспортников = 3391, для добытчиков = 3393).
  На каждой подстранице — таблицы
  `wiki-item-table.wiki-item-type-weapon.wiki-item-weapon-<category>`,
  где `<category>` — CSS-slug. На 2026-07-13 обнаружено 16 категорий:
  `bullet, bullet-eng, bullet-heavy, missile, missile-eng, mortar,
  howitzer, howitzer-eng, launcher, launcher-eng, rk, rk-eng, laser,
  repair, faser, empp`.

  Поле `group` в таблице (например «Мортира, Пулемет крупнокалиберный»)
  склеенное и одинаково у обеих категорий пары — семантически не
  различает оружие. **UI-фильтр строится на `category`**, не на
  `group`; русские подписи капсул — из hardcoded таблицы в
  `WeaponsCatalog.tsx`.

  Overlay `data/overrides/weapons.yml` синкается из Google Sheets
  (лист `weapons`) через `parser--google-sheets`. Через overlay можно
  добавлять и полностью новые сущности — merger заводит запись, даже
  если ключа нет в parsed (см. convention `data-overlay`, раздел
  «Что живёт в overlay», пункт про новые сущности). Схема — TS-типы
  в `src/types/weapon.ts`.

  **Трансформация weapon (`transformsFrom`).** Большинство weapon'ов
  на вики имеют цепочку преобразований: `Мортира ← Мортира 5 ← Мортира
  10 ← ...`. На странице weapon оформлено как склеенное поле
  «Преобразуется из [icon prev] / Для преобразования требуется»:
  td1 содержит ссылку на предыдущий weapon (data-description),
  td2 — ингредиенты (span'ы с иконкой + `<sub>`) + Боны/Реглы.
  Резолвер распаковывает в `transformsFrom.fromKey` +
  `transformsFrom.ingredients[]` + `bondsCost/reglsCost`. Отдельная
  ветвь параллельна `data--blueprints-catalog` (крафт с нуля).

source_files:
  parsed: data/weapons.json
  overlay: data/overrides/weapons.yml
  merged: .build/data/weapons.json # build-time
  merger: scripts/build-data/index.ts
  parser: scripts/parser-wiki/resolvers/weapons.ts # специфичный резолвер
  types: src/types/weapon.ts

wiki_source:
  root_page_id: 3341 # оглавление «Вооружение»
  root_section: Предметы → Вооружение
  data_flow: auto-parsed # чистый парсер, гибридным не является
  page_structure: |
    root(3341) — оглавление, только ссылки на подстраницы категорий.
    Подстраницы (3338, 3347, 3349, ...) содержат таблицы
    `wiki-item-table.wiki-item-type-weapon.wiki-item-weapon-<category>`,
    по одной таблице на единицу оружия. Категория берётся из CSS-класса.

schema:
  weapon_key_fields:
    - key # уникальный идентификатор (translit от name)
    - name # полное название с моделью/уровнем
    - model # модель без уровня
    - category # CSS-slug из wiki-item-weapon-<slug>: bullet/missile/mortar/... 16 категорий (см. description)
    - group # склеенное поле вики («Мортира, Пулемет крупнокалиберный»); одинаково у пары категорий, для фильтрации не использовать
    - slot # «Орудие» / «Ремонтная пушка» (у ремпушек)
    - stats # WeaponStats
  stats_fields:
    required: [damageMin, damageMax, range, energyConsumption, rateOfFire, durability, weight]
    optional:
      - ammo # у лазеров и энергетики отсутствует (бесконечно); у ремпушек = «Запчасти»
      - minRange # мёртвая зона у пушек, гаубиц, мортир
  optional_top_level:
    - requiredLevel
    - transformsFrom # { fromKey, ingredients[], bondsCost?, reglsCost? } — трансформация из предыдущего weapon (напр. «Мортира ← Мортира 5»); данные из td «Преобразуется из» + «Для преобразования требуется» на странице weapon
    - buyPrice # { bonds?, regls? }
    - sellPrice # { bonds?, regls? }
    - craftFromBlueprints # список названий чертежей
    - description
    - iconPath # data/icons/weapons/<key>.webp
    - wikiUrl

features_enabled: [json-source, typed-schema, overlay-merge]
features_disabled: [network-fetch, dynamic-schema]

manuals: []
behaviors:
  - data--weapons-catalog-loaded-from-json
  - view--weapons-catalog-renders-cards-grid # кросс-ссылка: view читает данные каталога
