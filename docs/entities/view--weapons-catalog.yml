id: view--weapons-catalog
kind: entity
namespace: ui
version: '0.x'

description: |
  Карточный каталог оружия — второй view MVP1 после мехов. Сетка
  карточек с иллюстрацией, ключевыми параметрами и звёздочкой
  избранного. По клику на карточке открывается детализация
  (MUI Dialog).

  Монтируется по маршруту `/catalogs/weapons-catalog` через
  `WeaponsCatalogPage` — тонкая обёртка-страница поверх `WeaponsCatalog`.
  Собирается из примитивов `other--catalog-shell` (`CatalogHeader`,
  `CatalogSection`, `CatalogGrid`, `FavoritesDnDSection`, `SearchField`,
  `PairToggleGroup`, `LevelRangeFilter`) плюс weapons-специфичные
  компоненты (`WeaponCard`, `WeaponDetail`, `SortableWeaponCard`).

  Фильтры:
    - **Группа** — `PairToggleGroup` (split-капсула + одиночные) через
      `usePairFilter`. **Значения фильтра — CSS-категории оружия**
      (`w.category`, из `wiki-item-weapon-<slug>`), а не поле `group`
      из таблицы вики. Причина: у большинства оружий поле `group`
      склеенное («Мортира, Пулемет крупнокалиберный») и одинаково для
      обеих категорий пары — фильтровать по нему бесполезно
      (`only-a` и `only-b` давали одинаковый результат). CSS-категория
      уникальна для каждого экземпляра — соответствует странице вики.
      Русские подписи кнопок — из hardcoded таблицы в
      `WeaponsCatalog.tsx` (16 категорий: Пулемет/Пушка, Мортира,
      Гаубица, Гранатомет, Лазер, Ремонтная пушка и т.д.).
    - **Уровень** — `LevelRangeFilter` (Slider через
      `useLevelRangeFilter`).

  Дальнейшие фильтры (слот, дальность, урон, наличие боезапаса) можно
  расширить, когда станет ясно, какая гранулярность действительно
  нужна.

  Читает данные каталога из `data--weapons-catalog` через
  `useWeaponsStore` (параллель `useRobotsStore`), использует общую
  механику избранного `other--favorites` (список ключей + IndexedDB).

source_files:
  page: apps/web/src/pages/catalogs/WeaponsCatalogPage.tsx # роутовая обёртка (/catalogs/weapons-catalog)
  view: apps/web/src/components/catalogs/weapons/WeaponsCatalog.tsx
  card: apps/web/src/components/catalogs/weapons/WeaponCard.tsx
  detail: apps/web/src/components/catalogs/weapons/WeaponDetail.tsx
  sortable_card: apps/web/src/components/catalogs/weapons/SortableWeaponCard.tsx

features_enabled:
  - cards-grid
  - weapon-detail-view
  - favorites-star
  - favorites-dnd
  - overlay-highlight # общий OverlayBadge
  - search-in-section
  - filter-category # split-капсулы по CSS-category с русскими подписями
  - filter-level-range # Slider по requiredLevel

features_disabled:
  - filter-group # поле group в вики склеенное, семантически неразличимо между парами — заменено на filter-category
  - filter-slot # у всех оружий сейчас один слот «Орудие», не даёт разделения

manuals_extra: |
  Секция «Преобразуется из» — если `weapon.transformsFrom` заполнен:
    - В карточке: короткий chip «⇢ [prev name]» (lookup имени по fromKey из useWeaponsStore).
    - В детали: chip prev + список ингредиентов chip'ами + «Стоимость: Боны N».

manuals: []
behaviors:
  - view--weapons-catalog-renders-cards-grid
  - view--weapons-catalog-opens-weapon-detail-on-click
  - other--favorites-toggle-on-star-click # кросс-ссылка: звёздочка живёт внутри карточки оружия
