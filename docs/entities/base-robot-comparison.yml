id: base-robot-comparison
kind: entity
namespace: comparison
version: "1.x"

description: |
  Механика «базового робота» для попарного сравнения. Пользователь
  выбирает базового робота чекбоксом в строке «Базовый робот». Ячейки
  остальных роботов подсвечиваются зелёным (лучше базового) или красным
  (хуже) по параметру, с учётом семантики параметра (для цены и урона
  меньше = лучше; для промаха — больше = лучше; и т.п.).

source_files:
  store: src/stores/robots/store.ts               # поле `baseRobotKey`, action `setBaseRobot`
  grid: src/components/RobotsGrid.tsx              # BaseRobotCheckboxCell + cellStyle сравнения

state:
  storage_key: baseRobotKey                # ключ в zustand-состоянии и в indexedDB
  storage_type: string | null

persistence:
  layer: indexeddb-persistence
  persisted: true
  default_after_hydration: robots[0].key    # если в indexedDB пусто и есть роботы

comparison_rules:
  no_color:                        # параметры без сравнения
    - Тип
    - Уровень
    - Базовый робот
    - Избранное
    - Дополнительные слоты
    - Особенности
  bigger_is_better:                # зелёный если больше базового
    - Прочность
    - Вместимость
    - Макс. вместимость
    - Скорость
    - Макс. скорость
    - Броня
    - Поля
    - Восстановление/мин
    - Цена продажи (бонусы)
    - Цена продажи (реглы)
    - Вероятность промаха (%)
  smaller_is_better:               # зелёный если меньше базового
    - Цена покупки (бонусы)
    - Цена покупки (реглы)
    - Цена для прокачки (бонусы)
    - Цена для прокачки (реглы)
    - Прокачка (реглы %)
    - Прокачка предметов (%)
    - Урон в спину/бок (%)
    - Урон от гаубиц (%)
  presence_matters:                # значение есть vs прочерк
    - Доп. неуязвимость            # есть = зелёный
    - Доп. ускорение               # есть = зелёный

palette:
  better: "#2e7d32"    # зелёный
  worse: "#d32f2f"     # красный

manuals: []
behaviors:
  - base-robot-selected-via-checkbox
  - base-robot-comparison-highlights-diff
  - indexeddb-persistence-hydrates-on-mount    # кросс-ссылка: baseRobotKey персистится
  - indexeddb-persistence-writes-on-key-change # кросс-ссылка: baseRobotKey персистится
