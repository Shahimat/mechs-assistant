version: "0.x"

description: |
  Каталог навыков и умений персонажа. Источник — вики: Навык
  (page_id=2902) + Умение (2905).

  **В MVP1 — только факты:** название, описание, уровни, категория.
  Модель модификаторов (например, «Торговля» → множитель цены продажи
  лута) — отдельная фаза `docs` перед MVP2, когда навыки будут
  использоваться в калькуляторе.

  Наполнение — `parser--wiki`. Иконки — из парсера или скриншотов, поле
  `iconPath`.

  Shell-entity MVP1.

