id: favorites
kind: entity
namespace: comparison
version: "1.x"

description: |
  Механика избранных роботов. Пользователь ставит звёздочку в строке
  «Избранное» — робот помечается как favorite, его столбец
  автоматически перемещается ближе к началу (сразу после столбца
  `parameter`) для удобства сравнения.

source_files:
  store: src/stores/robots/store.ts               # поле `favorites: string[]`, action `toggleFavorite`
  cell: src/components/FavoriteStarCell.tsx        # UI-иконка Star/StarBorder
  grid: src/components/RobotsGrid.tsx              # effect, двигающий favorite-столбцы к началу

state:
  storage_key: favorites                # ключ в zustand-состоянии и в indexedDB
  storage_type: string[]                # массив ключей роботов (robot.key)
  toggle_action: toggleFavorite(robotKey)

persistence:
  layer: indexeddb-persistence
  persisted: true                        # см. persistKeys в store.ts

ui_behavior:
  visual: MUI Star (жёлтый) / StarBorder (серый)
  column_reorder: favorite-роботов сдвигаем к позиции 1 (сразу после `parameter`)

features_enabled: [toggle, persist, auto-reorder]

manuals: []
behaviors:
  - favorites-toggle-on-star-click
  - favorites-columns-pinned-after-parameter
  - indexeddb-persistence-hydrates-on-mount    # кросс-ссылка: favorites персистится
  - indexeddb-persistence-writes-on-key-change # кросс-ссылка: favorites персистится
