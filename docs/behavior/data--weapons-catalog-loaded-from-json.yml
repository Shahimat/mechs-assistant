id: data--weapons-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--weapons-catalog]
title: Каталог оружия загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/weapons-catalog`, стор оружия пуст
    when: срабатывает `initializeWeapons` (через useEffect в корневом
      компоненте `view--weapons-catalog`)
    then: |
      состояние стора `weapons` заполнено массивом из
      `@build/data/weapons.json`, `isLoading` перешёл из true в false,
      `error` = null. Источник — merged JSON, генерируется build-time
      merger'ом (`scripts/build-data`) из `data/weapons.json` (parsed)
      и `data/overrides/weapons.yml` (overlay из Google Sheets).

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeWeapons`
    then: |
      `weapons = []`, `view--weapons-catalog` показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: `initializeWeapons` попадает в catch
    then: |
      `isLoading = false`, `error` = текст ошибки, `view--weapons-catalog`
      показывает error state.

verified: true
verified_at: 2026-07-12
verified_note: |
  Проверено чтением кода и прогоном парсера:
  `useWeaponsStore.initializeWeapons` (`src/stores/weapons/store.ts:48-63`)
  импортирует данные из `@build/data/weapons.json` (merged JSON) и
  синхронно ставит `weapons`, `isLoading=false`, `error=null` через
  try/catch. `WeaponsCatalog.tsx:34-38` вызывает `initializeWeapons()`
  через useEffect при пустом сторе. Merged JSON собирается
  `scripts/build-data/index.ts` из `data/weapons.json` (parsed
  парсером — 142 записи) + `data/overrides/weapons.yml` (сейчас нет);
  верифицировано `npm run build:data → ✓ weapons: merged 142 entries
  (0 with overlay) → .build/data/weapons.json`.
