id: view--robots-catalog-opens-mech-detail-on-click
kind: behavior
namespace: ui
entities: [view--robots-catalog]
title: Клик по карточке меха открывает детализацию (RobotDetail)

scenarios:
  - given: сетка карточек отрисована, пользователь видит нужный мех
    when: пользователь кликает по карточке меха (не по звёздочке избранного)
    then: |
      открывается RobotDetail для этого меха — модалка или отдельная
      страница (конкретика решается в фазе feat, зависит от макета).
      В детализации отображается полный набор параметров меха: все поля
      Robot (stats, buyPrice, sellPrice, upgradePrice, features,
      extraSlots, специальные модификаторы урона).

  - given: RobotDetail открыт
    when: пользователь закрывает его (крестик / клавиша Esc / клик по фону)
    then: возвращается к сетке карточек, состояние стора не меняется.

  - given: пользователь кликает по звёздочке избранного внутри карточки
    when: обработчик события звёздочки перехватывает клик
    then: |
      детализация НЕ открывается, срабатывает только
      other--favorites-toggle-on-star-click.

verified: true
verified_at: 2026-07-12
verified_note: |
  Проверено чтением кода: клик по CardActionArea
  (`RobotCard.tsx:63`) выставляет selectedRobot через `onClick(robot)`
  (`RobotsCatalog.tsx:139`), RobotDetail рендерится как MUI Dialog
  с `open={robot !== null}` (`RobotDetail.tsx:122-125`). Развилка
  «модалка vs отдельная страница» закрыта в пользу модалки.
  Закрытие: Dialog `onClose` (крестик, Esc, клик по фону) — стандартное
  поведение MUI + явная IconButton (`RobotDetail.tsx:137-139`),
  состояние стора не меняется. Клик по звёздочке использует
  `e.stopPropagation()` (`RobotCard.tsx:45-48`) — детализация не
  открывается. В детализации отрисованы все поля Robot: stats,
  buyPrice/sellPrice/upgradePrice, upgradeReglPercent, itemUpgradePercent,
  backSideDamage/howitzerDamage/missChance, extraSlots, features,
  description (`RobotDetail.tsx:184-271`).
