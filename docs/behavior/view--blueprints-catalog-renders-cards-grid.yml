id: view--blueprints-catalog-renders-cards-grid
kind: behavior
namespace: ui
entities: [view--blueprints-catalog]
title: view--blueprints-catalog рендерит сетку карточек чертежей из data--blueprints-catalog

scenarios:
  - given: стор чертежей гидратирован, `blueprints` содержит записи
    when: пользователь открыл `/catalogs/blueprints-catalog`
    then: |
      view--blueprints-catalog рендерит сетку `BlueprintCard`. В карточке:
      имя, chip `category` (+ chip `subtype` если equipment), «Создает ×N:
      <имя цели>» (lookup через crossCatalogLookup), «Прочность: N».

      Панель фильтров: `SearchField` (поиск по имени) + `ToggleButtonGroup`
      с 7 раздельными кнопками через `useTypeFilter<BlueprintCategory>`
      (порядок — Мехи, Оружие, Оборудование, Компоненты, Апгрейды, Паки,
      Телепорты). Матч по `blueprint.category`, multi-select.

  - given: массив `blueprints` пуст
    when: пользователь открыл `/catalogs/blueprints-catalog`
    then: view показывает empty state.

  - given: '`error` не null (ошибка загрузки)'
    when: пользователь открыл `/catalogs/blueprints-catalog`
    then: view показывает error state (Alert severity=error).

verified: true
verified_at: 2026-07-14
verified_note: |
  Реализация: `src/components/catalogs/blueprints/BlueprintsCatalog.tsx`
  + `BlueprintCard.tsx`. Категории раздельные (по решению юзера отошли от
  пар в пользу паттерна мехов); категория 'mech' добавлена первой.
  Иконка чертежа — композит `assets/raw/blueprint.png` + product-иконка
  (см. `scripts/parser-wiki/lib/icons.ts` overlayBackground). Build
  зелёный.
