id: view--armour-catalog-renders-cards-grid
kind: behavior
namespace: ui
entities: [view--armour-catalog]
title: view--armour-catalog рендерит сетку карточек брони из data--equipment-catalog

scenarios:
  - given: стор оборудования гидратирован, `equipment` содержит записи
    when: пользователь открыл `/catalogs/armour-catalog`
    then: |
      view--armour-catalog фильтрует `equipment` по
      `subtype === 'armour'` и рендерит сетку `EquipmentCard` — по
      одной карточке на каждую запись. В карточке: название, требуемый
      уровень (chip, если есть), ключевой параметр (`stats.primary` = «Броня»), прочность/вес, звёздочка
      избранного. Иллюстрация — из `iconPath` (или placeholder).

      Панель фильтров: `LevelRangeFilter` (Slider по `requiredLevel`).
      Записи без `requiredLevel` не отсекаются level-фильтром.

  - given: "после фильтрации по `subtype='armour'` массив пуст (данные ещё не загружены или в JSON нет записей нужного subtype)"
    when: пользователь открыл `/catalogs/armour-catalog`
    then: |
      view--armour-catalog показывает empty state (Alert аналогично
      мехам и weapons).

  - given: "`error` не null (ошибка загрузки данных)"
    when: пользователь открыл `/catalogs/armour-catalog`
    then: view--armour-catalog показывает error state (Alert severity=error).

verified: false
verified_note: |
  Сценарий обновлён в фазе docs 2026-07-14 через shared `EquipmentCard`: карточка получает короткий chip трансформации «⇢ [prev name]» когда `transformsFrom` заполнен (для extractor/drills — поле всегда пустое, для компьютера/chips — только у одного экземпляра). Реализация — в фазе feat.
