id: view--cop-home-launches-latest-game-on-click
kind: behavior
namespace: cop
entities: [view--cop-home]
title: Главная страница COP показывает последнюю версию, запускает игру и закрывает сессии

scenarios:
  - given: HomeView смонтирован (первый таб shell), путь до папки игры
      прочитан из tauri-store (settings.json → gameDir; пусто = дефолт)
    when: компонент монтируется
    then: |
      Вызывает find_latest_game({ baseDir: gameDir || null }); при успехе
      показывает «Последняя установленная версия: <version_label>», при
      ошибке — подсказку про путь и текст ошибки.

  - given: показана главная страница
    when: пользователь жмёт «Запустить игру»
    then: |
      Вызывается launch_game({ baseDir }); кнопка на время блокируется
      («Запуск…»). Успех — обновляет показанную версию; ошибка —
      выводит её в блок .error, процесс не стартует.

  - given: игра только что запущена по клику
    when: пользователь жмёт «Запустить игру» повторно (дабл-клик/спам)
      во время запуска или в течение ~400мс кулдауна после
    then: |
      Повторный вызов игнорируется (ранний return по launching||cooldown,
      кнопка disabled) — второй инстанс случайно не стартует. По истечении
      кулдауна кнопка снова активна.

  - given: запущены одна или несколько сессий игры
    when: пользователь жмёт «Закрыть все сессии»
    then: |
      Вызывается close_all_games(); кнопка на время блокируется
      («Закрываю…»). Все процессы MechsEarth.exe снимаются разом; ошибка —
      выводится в блок .error.

  - given: открыта настройка пути
    when: пользователь сохраняет непустой путь или жмёт «Сброс»
    then: |
      Значение пишется в tauri-store (gameDir) и переживает перезапуск;
      сразу переспрашивается find_latest_game с новым путём.

verified: false
verified_note: |
  Спецификация добавлена вместе с реализацией (HomeView.tsx + features.ts
  таб 'home' первым/enabled; добавлены кулдаун-гард запуска и кнопка
  «Закрыть все сессии» → close_all_games). TS typecheck + eslint пройдены.
  UI в Tauri-окне не прогонялся (нужен Windows + установленная игра для
  реального find/launch/close), поэтому verified: false.
