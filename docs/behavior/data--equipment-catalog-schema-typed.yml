id: data--equipment-catalog-schema-typed
kind: behavior
namespace: catalog
entities: [data--equipment-catalog]
title: Каждая запись в equipment.json соответствует типу Equipment (TS strict)

scenarios:
  - given: 'TypeScript strict включён (`strict: true`) и `resolveJsonModule: true`'
    when: файл `store.ts` импортирует `equipmentData` из
      `@build/data/equipment.json` и приводит его к `Equipment[]`
    then: |
      сборка проходит без ошибок типа, `Equipment`-типы из
      `src/types/equipment.ts` применимы ко всем записям (`key`, `name`,
      `model`, `family`, `subtype`, `stats.*`).

  - given: в JSON появилась запись, у которой отсутствует обязательное поле
      (`family` / `subtype` / `stats.durability` / `stats.weight`)
    when: разработчик пытается собрать проект (`npm run build`)
    then: |
      сборка/typecheck должны падать. На практике поле проверяется
      через приведение `as Equipment[]`, поэтому явная валидация —
      задача автора JSON. Оговорка та же, что для robots/weapons —
      без runtime-валидации (zod и т.п.) проверка неполная.

verified: false
verified_note: |
  Схема расширена в фазе docs 2026-07-14: `transformsFrom?: { fromKey, ingredients[], bondsCost?, reglsCost? }`. Реализация парсера + UI — в фазе feat.
