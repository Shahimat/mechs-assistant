id: favorites-toggle-on-star-click
kind: behavior
namespace: comparison
entities: [favorites]
title: Клик по звёздочке добавляет/удаляет робота из избранного и персистит в IndexedDB

scenarios:
  - given: робот с ключом K не в избранном (`favorites` не содержит K)
    when: пользователь кликает по `FavoriteStarCell` в столбце этого робота
    then: |
      вызывается `toggleFavorite(K)`, `favorites` становится [...prev, K],
      middleware записывает новый массив в indexedDB
      (`db=mechs-assistant`, `store=robots-store`, `key=favorites`),
      иконка меняется на жёлтый Star.

  - given: робот с ключом K уже в избранном
    when: пользователь кликает по звёздочке
    then: |
      `favorites` становится prev.filter(k => k !== K), IndexedDB
      обновляется, иконка меняется на серый StarBorder.

  - given: пользователь перезагрузил страницу
    when: стор гидратируется из indexedDB
    then: |
      `favorites` восстанавливается из IDB, `FavoriteStarCell`
      отрисовывает Star для сохранённых ключей.

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением store.ts (`toggleFavorite` через
  `indexOf`/`filter`, `favorites` в `persistKeys`) и
  indexedDBMiddleware.ts (`setWithPersistence` пишет ключ при
  изменении). FavoriteStarCell использует Star/StarBorder из
  @mui/icons-material с цветом `#ffc107`. Реальную запись в IDB
  здесь не гонял (это ветка `indexeddb-persistence-writes-on-key-change`).
