id: data--components-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--components-catalog]
title: Каталог компонентов загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/components-catalog`, стор компонентов пуст
    when: срабатывает `initializeComponents` (через useEffect в корневом
      компоненте `view--components-catalog`)
    then: |
      состояние стора `components` заполнено массивом из
      `@build/data/components.json`, `isLoading` = false, `error` = null.

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeComponents`
    then: |
      `components = []`, view показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: "`initializeComponents` попадает в catch"
    then: |
      `isLoading = false`, `error` = текст ошибки, view показывает error state.

verified: true
verified_at: 2026-07-14
verified_note: |
  Проверено чтением кода и прогонами: `apps/web/src/stores/components/store.ts` — `initializeComponents` импортирует `@build/data/components.json` и синхронно ставит `components`, `isLoading=false`, `error=null` через try/catch. `ComponentsCatalog.tsx` вызывает `initializeComponents()` через useEffect при пустом сторе. Merged JSON собирается `scripts/build-data`: `npm run build:data → ✓ components: merged 32 entries (0 with overlay) → .build/data/components.json`. `npm run build`, `tsc --noEmit`, `npm run lint` — зелёные. Empty/error state рендерится Alert-компонентами.
