id: data--skills-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--skills-catalog]
title: Каталог навыков загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/skills-catalog`, стор навыков пуст
    when: срабатывает `initializeSkills` (через useEffect в корневом
      компоненте `view--skills-catalog`)
    then: |
      состояние стора `skills` заполнено массивом из `@build/data/skills.json`,
      `isLoading` = false, `error` = null.

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeSkills`
    then: |
      `skills = []`, view показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: "`initializeSkills` попадает в catch"
    then: |
      `isLoading = false`, `error` = текст ошибки, view показывает error state.

verified: true
verified_at: 2026-07-14
verified_note: |
  Проверено чтением кода и прогонами: `apps/web/src/stores/skills/store.ts` — `initializeSkills` импортирует `@build/data/skills.json` и синхронно ставит `skills`, `isLoading=false`, `error=null`. `SkillsCatalog.tsx` вызывает `initializeSkills()` через useEffect при пустом сторе. Merged JSON собирается `scripts/build-data`: `npm run build:data → ✓ skills: merged 12 entries (0 with overlay) → .build/data/skills.json`. `npm run build`, `tsc --noEmit`, `npm run lint` — зелёные.
