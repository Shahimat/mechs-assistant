id: view--home-renders-section-tiles
kind: behavior
namespace: ui
entities: [view--home]
title: Главная страница рендерит сетку плиток разделов приложения

scenarios:
  - given: пользователь открыл `/`
    when: React Router монтирует `HomePage`
    then: |
      отображается `<TileGrid>` с 5 плитками разделов в фиксированном
      порядке (по решению юзера):
        1. «Каталоги» → `/catalogs` (иконка `catalog-icon.webp`)
        2. «Клановый склад» → `/warehouse` (MVP3, stub-страница)
        3. «Калькулятор характеристик» → `/stats-calculator` (MVP4, stub)
        4. «Калькулятор мехов» → `/mechs-calculator` (MVP2, stub)
        5. «Планы разработки» → `/todo`
      Иконки 2-5 — из `apps/web/assets/images/main-icons/{mech-calc,stats-calc,
      clan-storage,todo}.webp` (нарезаны sharp'ом из
      `assets/raw/4-icons-on-main-page.png`, 512×512 каждая).

  - given: пользователь кликает по плитке нереализованного MVP-эпика
    when: клик по «Калькулятор мехов» / «Калькулятор характеристик» / «Клановый склад»
    then: |
      навигация на соответствующий роут, где рендерится `WipPage` с
      заголовком раздела и Alert «Раздел в разработке. Появится в
      рамках MVPN». Каталоги, TODO — работают реально.

  - given: список разделов расширяется дальше
    when: разработчик добавляет новую плитку в `HomePage`
    then: |
      достаточно добавить запись в массив `TILES` — сетка адаптивно
      перестроится, hover/click-эффекты и focus-ring идут из
      `other--tile` без дополнительного кода.

verified: true
verified_at: 2026-07-14
verified_note: |
  Проверено чтением `HomePage.tsx` (массив `TILES` = 5 записей),
  `router.tsx` (роуты `/mechs-calculator`, `/stats-calculator`,
  `/warehouse` → `<WipPage>`), файлов иконок в
  `apps/web/assets/images/main-icons/`. Build зелёный.
