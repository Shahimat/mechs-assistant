id: data--items-catalog-schema-typed
kind: behavior
namespace: catalog
entities: [data--items-catalog]
title: Каждая запись в items.json соответствует типу Item (TS strict)

scenarios:
  - given: "TypeScript strict включён (`strict: true`) и `resolveJsonModule: true`"
    when: файл `store.ts` импортирует `itemsData` из
      `@build/data/items.json` и приводит его к `Item[]`
    then: |
      сборка проходит без ошибок типа, `Item`-типы из
      `src/types/item.ts` применимы ко всем записям.

  - given: в JSON появилась запись с отсутствующим `subtype` или `stats.weight`
    when: разработчик пытается собрать проект (`npm run build`)
    then: |
      сборка/typecheck должны падать. На практике проверка через `as Item[]`
      — assert, не runtime-валидация (та же оговорка для всех data-каталогов).

verified: false
verified_note: |
  Схема расширена в фазе docs 2026-07-14: `ItemSubtype` +'upgrade', `providesSkill?: { skillKey, value }` overlay. Реализация — в фазе feat.
