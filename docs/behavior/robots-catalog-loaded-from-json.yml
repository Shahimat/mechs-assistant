id: robots-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [robots-catalog]
title: Каталог роботов загружается из data/robots.json при инициализации стора

scenarios:
  - given: пользователь открыл приложение, стор роботов ещё пустой
    when: срабатывает `initializeRobots` (через useEffect в RobotsGrid или вызов из getTransposedData)
    then: |
      состояние стора `robots` заполнено массивом из `data/robots.json`,
      `isLoading` перешёл из true в false, `error` = null.

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeRobots`
    then: |
      `robots = []`, `getTransposedData` возвращает `{ rows: [], robots: [] }`,
      UI показывает Alert «Нет данных для отображения».

  - given: при чтении/парсинге JSON выброшена ошибка
    when: `initializeRobots` попадает в catch
    then: |
      `isLoading = false`, `error` = текст ошибки, UI показывает
      `<Alert severity="error">{error}</Alert>`.

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением store.ts (импорт `robotsData` из `data/robots.json`,
  `initializeRobots` с try/catch и всеми тремя ветвями: успех, пустой
  массив, ошибка) и `npm run build` (сборка проходит).
