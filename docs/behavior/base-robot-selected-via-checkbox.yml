id: base-robot-selected-via-checkbox
kind: behavior
namespace: comparison
entities: [base-robot-comparison]
title: Клик по чекбоксу «Базовый робот» назначает робота базовым и персистит выбор

scenarios:
  - given: пользователь в строке «Базовый робот» отмечает чекбокс в столбце робота K
    when: срабатывает onChange у `BaseRobotCheckboxCell`
    then: |
      вызывается `setBaseRobot(K)`, стор проверяет, что робот с ключом K
      существует в `robots`, ставит `baseRobotKey = K`,
      middleware записывает `baseRobotKey` в IndexedDB.

  - given: `setBaseRobot(K)` вызван с несуществующим ключом
    when: проверка `robots.some(r => r.key === K)` возвращает false
    then: |
      состояние не меняется, `baseRobotKey` остаётся прежним, запись в
      IDB не происходит.

  - given: страница перезагружена
    when: middleware гидратирует состояние из IDB
    then: |
      если в IDB был `baseRobotKey` — восстанавливается он;
      если ключа не было и есть роботы — middleware ставит
      `baseRobotKey = robots[0].key` как дефолт.

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением store.ts: `setBaseRobot` проверяет
  `robots.some(r => r.key === key)`, при промахе — ранний return;
  при успехе — `set({ baseRobotKey: key })`. Дефолт при пустом IDB
  ставится в middleware `loadPersistedState`: если patch пустой и в
  сторе есть роботы, `baseRobotKey = robots[0].key`.
