id: data--blueprints-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--blueprints-catalog]
title: Каталог чертежей загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/blueprints-catalog`, стор пуст
    when: срабатывает `initializeBlueprints` через useEffect
    then: |
      состояние `blueprints` заполнено массивом из
      `@build/data/blueprints.json`, `isLoading` = false, `error` = null.

  - given: JSON распарсен, но массив пустой
    when: срабатывает `initializeBlueprints`
    then: |
      `blueprints = []`, view показывает empty state.

  - given: при чтении JSON выброшена ошибка
    when: "`initializeBlueprints` попадает в catch"
    then: |
      `isLoading = false`, `error` = текст, view показывает error state.

verified: false
verified_note: |
  Спецификация создана в фазе docs 2026-07-14, реализация — в фазе feat.
