id: base-robot-comparison-highlights-diff
kind: behavior
namespace: comparison
entities: [base-robot-comparison, robots-grid]
title: Ячейки роботов подсвечиваются зелёным/красным относительно базового по семантике параметра

scenarios:
  - given: базовый робот выбран, текущая ячейка — параметр «Прочность» (bigger_is_better)
    when: cellStyle сравнивает значения
    then: |
      если currentNum > baseNum → color `#2e7d32` (зелёный),
      если currentNum < baseNum → color `#d32f2f` (красный),
      если равно → без окраски.

  - given: параметр — «Цена покупки (бонусы)» (smaller_is_better)
    when: cellStyle сравнивает значения
    then: currentNum > baseNum → красный; currentNum < baseNum → зелёный.

  - given: параметр — «Доп. неуязвимость» (presence_matters)
    when: у текущего значение есть, у базового «-»
    then: color зелёный (наличие лучше отсутствия).

  - given: параметр из списка `no_color` (Тип, Уровень, Базовый робот, Избранное, Дополнительные слоты, Особенности)
    when: cellStyle применяется
    then: возвращается baseStyle без color — сравнение не производится.

  - given: сама ячейка принадлежит базовому роботу
    when: cellStyle обрабатывает её
    then: цвет не применяется (она нейтральна для самой себя).

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением cellStyle в RobotsGrid.tsx. Сверил список параметров
  с `comparison_rules` в entity `base-robot-comparison`: списки
  no_color / smaller_is_better / presence_matters / bigger_is_better
  (как default) полностью совпадают с ветками кода. Палитра `#2e7d32`
  (better) и `#d32f2f` (worse) подтверждена в коде. Ячейка базового
  робота цветом не помечается (isBaseRobot → возврат baseStyle без color).
