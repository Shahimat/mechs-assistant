id: data--ore-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--ore-catalog]
title: Каталог руды загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/ore-catalog`, стор руды пуст
    when: срабатывает `initializeOre` (через useEffect в корневом компоненте
      `view--ore-catalog`)
    then: |
      состояние стора `ore` заполнено массивом из `@build/data/ore.json`,
      `isLoading` = false, `error` = null.

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeOre`
    then: |
      `ore = []`, view показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: "`initializeOre` попадает в catch"
    then: |
      `isLoading = false`, `error` = текст ошибки, view показывает error state.

verified: true
verified_at: 2026-07-13
verified_note: |
  Проверено чтением кода и прогонами: `apps/web/src/stores/ore/store.ts` — `initializeOre` импортирует `@build/data/ore.json` (merged JSON) и синхронно ставит `ore`, `isLoading=false`, `error=null` через try/catch. `OreCatalog.tsx` вызывает `initializeOre()` через useEffect при пустом сторе. Merged JSON собирается `scripts/build-data`: `npm run build:data → ✓ ore: merged 8 entries (0 with overlay) → .build/data/ore.json`. `npm run build`, `tsc --noEmit`, `npm run lint` — зелёные. Empty/error state рендерится Alert-компонентами.
