id: view--catalogs-hub-renders-catalog-tiles
kind: behavior
namespace: ui
entities: [view--catalogs-hub]
title: Хаб каталогов рендерит сетку плиток по одной на каталог

scenarios:
  - given: пользователь открыл `/catalogs`
    when: React Router монтирует `CatalogsHubPage`
    then: |
      отображается `<TileGrid>` с плитками каталогов. На момент 2026-07-12
      подключена одна плитка «Мехи» (иконка `PrecisionManufacturing`,
      `to="/catalogs/mechs-catalog"`). Клик уводит в
      `view--robots-catalog`.

  - given: подключён новый data-каталог (например, `data--weapons-catalog`)
    when: разработчик добавляет плитку и страницу в CatalogsHubPage
    then: |
      плитка встаёт в сетку без изменений компонентов `Tile` / `TileGrid`,
      навигация ведёт на соответствующий `catalogs/<slug>-catalog` URL.

  - given: пользователь на подстранице каталога (например, `/catalogs/mechs-catalog`)
    when: он кликает по крошке «Каталоги» в breadcrumbs
    then: возвращается на `/catalogs`.

verified: true
verified_at: 2026-07-12
verified_note: |
  Проверено чтением кода: `CatalogsHubPage.tsx` рендерит `<TileGrid>`
  с одной плиткой `<Tile to="/catalogs/mechs-catalog" title="Мехи"
  icon={<PrecisionManufacturing />} />`. Роут `/catalogs/mechs-catalog`
  ведёт на `MechsCatalogPage`, который рендерит `MechsCatalog` из
  `src/components/catalogs/mechs/`. Breadcrumb «Каталоги» на подмаршруте
  кликабелен (Link, `handle: { crumb: 'Каталоги' }` на родителе), это
  автоматически даёт возврат на /catalogs.
