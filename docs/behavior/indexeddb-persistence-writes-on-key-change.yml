id: indexeddb-persistence-writes-on-key-change
kind: behavior
namespace: persistence
entities: [indexeddb-persistence, favorites, base-robot-comparison]
title: Middleware записывает в IndexedDB только те persistKeys, значение которых изменилось

scenarios:
  - given: `setBaseRobot(K)` вызван, `baseRobotKey` в состоянии меняется с A на K
    when: setWithPersistence сравнивает next[key] и current[key] для каждого persistKey
    then: |
      для `baseRobotKey` (значение изменилось) вызывается
      `setToIndexedDB(db, 'robots-store', 'baseRobotKey', K)`,
      для `favorites` (значение не изменилось) запись не происходит.

  - given: `toggleFavorite(K)` вызван, `favorites` меняется
    when: setWithPersistence сравнивает ключи
    then: пишется только `favorites`, `baseRobotKey` не трогается.

  - given: `initializeRobots` пишет `robots`, `isLoading`, `error`
    when: setWithPersistence обрабатывает патч
    then: |
      `robots`/`isLoading`/`error` не входят в persistKeys — запись
      в IDB для них НЕ выполняется, `set(partial)` применяется как обычно.

  - given: запись в IDB упала (например, из-за ограничения квоты)
    when: catch в цепочке `.then(setToIndexedDB).catch(...)`
    then: ошибка логируется в `console.error`, состояние в памяти всё равно обновлено.

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением `setWithPersistence` в indexedDBMiddleware.ts:
  для каждого persistKey сравниваются next[key] и current[key],
  при изменении запускается `setToIndexedDB` через then/catch.
  Ключи вне persistKeys (`robots`, `isLoading`, `error`,
  `_persistHydrated`) не пишутся. Ошибки IDB — console.error, состояние
  в памяти всё равно обновляется через `set(partial, replace)`.
