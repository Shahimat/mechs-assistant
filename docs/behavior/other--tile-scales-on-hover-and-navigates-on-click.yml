id: other--tile-scales-on-hover-and-navigates-on-click
kind: behavior
namespace: ui
entities: [other--tile]
title: Плитка реагирует на hover/click эффектами и уводит на целевой маршрут

scenarios:
  - given: плитка `<Tile to="/catalogs" title="Каталоги" icon={<LibraryBooks />} />` смонтирована
    when: пользователь наводит мышь на плитку
    then: |
      плитка плавно увеличивается (`transform: scale(1.03)`), добавляется
      subtle shadow. Анимация — CSS transition ~150мс.

  - given: пользователь удерживает нажатие / тап на плитке
    when: срабатывает `:active` состояние
    then: |
      плитка кратко «вжимается» (`transform: scale(0.98)`), возвращается
      в исходное состояние при отпускании.

  - given: пользователь кликнул по плитке
    when: срабатывает `<Link>` react-router-dom
    then: |
      навигация переходит на `to`-URL без перезагрузки страницы,
      history меняется (URL в адресной строке обновляется).

  - given: пользователь навигируется клавиатурой (Tab, Enter)
    when: плитка получает фокус
    then: |
      появляется focus-ring (`outline` или `box-shadow` с цветом
      `theme.palette.primary.main`), Enter/Space срабатывают как клик.

verified: true
verified_at: 2026-07-13
verified_note: |
  Проверено юзером 2026-07-13 визуально в браузере (hover-scale, active-press, focus-ring, SPA-навигация по клику). Все 17 плиток на CatalogsHubPage реагируют штатно.
