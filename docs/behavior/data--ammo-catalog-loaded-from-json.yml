id: data--ammo-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--ammo-catalog]
title: Каталог боезапасов загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/ammo-catalog`, стор боезапасов пуст
    when: срабатывает `initializeAmmo` (через useEffect в корневом
      компоненте `view--ammo-catalog`)
    then: |
      состояние стора `ammo` заполнено массивом из
      `@build/data/ammo.json`, `isLoading` перешёл из true в false,
      `error` = null. Источник — merged JSON, генерируется build-time
      merger'ом (`scripts/build-data`) из `data/ammo.json` (parsed)
      и `data/overrides/ammo.yml` (overlay из Google Sheets).

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeAmmo`
    then: |
      `ammo = []`, `view--ammo-catalog` показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: "`initializeAmmo` попадает в catch"
    then: |
      `isLoading = false`, `error` = текст ошибки, `view--ammo-catalog`
      показывает error state.

verified: true
verified_at: 2026-07-13
verified_note: |
  Проверено чтением кода и прогонами: `apps/web/src/stores/ammo/store.ts` — `initializeAmmo` импортирует `@build/data/ammo.json` (merged JSON) и синхронно ставит `ammo`, `isLoading=false`, `error=null` через try/catch. `AmmoCatalog.tsx` вызывает `initializeAmmo()` через useEffect при пустом сторе. Merged JSON собирается `scripts/build-data`: `npm run build:data → ✓ ammo: merged 58 entries (0 with overlay) → .build/data/ammo.json`. `npm run build`, `tsc --noEmit`, `npm run lint` — зелёные. Empty/error state рендерится Alert-компонентами в `AmmoCatalog`.
