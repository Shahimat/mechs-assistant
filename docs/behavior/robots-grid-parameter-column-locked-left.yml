id: robots-grid-parameter-column-locked-left
kind: behavior
namespace: ui
entities: [robots-grid]
title: Столбец `parameter` всегда крайний слева и не может быть перемещён правее

scenarios:
  - given: пользователь тащит столбец робота левее столбца `parameter`
    when: срабатывает `onColumnMoved`
    then: |
      handleColumnMoved определяет, что перемещённый столбец оказался
      левее `parameter`, и возвращает его на позицию `parameterIndex + 1`
      через `api.moveColumns([...], targetIndex)`.

  - given: программное перемещение столбцов (например, favorites в начало)
    when: `isProgrammaticMoveRef.current === true`
    then: |
      handleColumnMoved НЕ откатывает движение — иначе будет конфликт с
      механикой favorites (`favorites-columns-pinned-after-parameter`).

  - given: сам столбец `parameter` перетаскивают
    when: срабатывает `onColumnMoved` c `movedColumnId === 'parameter'`
    then: обработчик возвращает без действий (AG Grid оставит его на месте благодаря `lockPosition: 'left'`).

verified: true
verified_at: 2026-07-04
verified_note: |
  Проверено чтением RobotsGrid.tsx: `lockPosition: 'left'` на столбце
  `parameter`, `handleColumnMoved` вычисляет parameterIndex и возвращает
  столбец на `parameterIndex + 1` через `moveColumns`. Флаг
  `isProgrammaticMoveRef` защищает от отката программных перемещений.
