id: view--cargos-catalog-renders-cards-grid
kind: behavior
namespace: ui
entities: [view--cargos-catalog]
title: view--cargos-catalog рендерит сетку карточек трюм из data--equipment-catalog

scenarios:
  - given: стор оборудования гидратирован, `equipment` содержит записи
    when: пользователь открыл `/catalogs/cargos-catalog`
    then: |
      view--cargos-catalog фильтрует `equipment` по
      `subtype === 'cargo'` и рендерит сетку `EquipmentCard` — по
      одной карточке на каждую запись. В карточке: название, требуемый
      уровень (chip, если есть), ключевой параметр (`stats.primary` = «Трюм»), прочность/вес, звёздочка
      избранного. Иллюстрация — из `iconPath` (или placeholder).

      Панель фильтров: `LevelRangeFilter` (Slider по `requiredLevel`).
      Записи без `requiredLevel` не отсекаются level-фильтром.

  - given: "после фильтрации по `subtype='cargo'` массив пуст (данные ещё не загружены или в JSON нет записей нужного subtype)"
    when: пользователь открыл `/catalogs/cargos-catalog`
    then: |
      view--cargos-catalog показывает empty state (Alert аналогично
      мехам и weapons).

  - given: "`error` не null (ошибка загрузки данных)"
    when: пользователь открыл `/catalogs/cargos-catalog`
    then: view--cargos-catalog показывает error state (Alert severity=error).

verified: true
verified_at: 2026-07-14
verified_note: |
  Реализовано: карточка отображает компактный chip «Транс.» с title
  «Преобразуется из: <fromKey>» когда `transformsFrom` заполнен.
  Проверено чтением `WeaponCard.tsx`/`EquipmentCard.tsx` + build
  зелёный.
