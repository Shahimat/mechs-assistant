id: view--weapons-catalog-renders-cards-grid
kind: behavior
namespace: ui
entities: [view--weapons-catalog]
title: view--weapons-catalog рендерит сетку карточек оружия из data--weapons-catalog

scenarios:
  - given: стор оружия гидратирован, `weapons` содержит массив оружия
    when: пользователь открыл `/catalogs/weapons-catalog`
    then: |
      view--weapons-catalog рендерит сетку WeaponCard — по одной
      карточке на каждый экземпляр оружия из стора. В карточке
      отображаются: название, группа (chip), требуемый уровень (chip,
      если есть), ключевые характеристики (урон, дальность,
      скорострельность, прочность) и звёздочка избранного. Иллюстрация
      — из `iconPath` (или placeholder, если нет).

      Панель фильтров: `PairToggleGroup` по CSS-category (split-капсулы
      для пар вроде «Пулемет + Пушка» и одиночные кнопки для «Лазер»,
      «Ремонтная пушка») + `LevelRangeFilter` (Slider по requiredLevel).
      Активные значения фильтра — русские подписи; матч производится
      после обратной трансформации в CSS-slug через `LABEL_TO_CATEGORY`
      и сравнивается с `w.category`.

  - given: массив `weapons` пуст (данные ещё не загружены или JSON пустой)
    when: пользователь открыл `/catalogs/weapons-catalog`
    then: |
      view--weapons-catalog показывает empty state (Alert
      «Нет данных для отображения» аналогично мехам).

  - given: "`error` не null (ошибка загрузки данных)"
    when: пользователь открыл `/catalogs/weapons-catalog`
    then: view--weapons-catalog показывает error state (Alert severity=error).

verified: false
verified_note: |
  Сценарий обновлён в фазе docs 2026-07-14: карточка получает короткий chip трансформации «⇢ [prev name]» когда `transformsFrom` заполнен. Реализация — в фазе feat.
