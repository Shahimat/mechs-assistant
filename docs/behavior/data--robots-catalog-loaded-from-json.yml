id: data--robots-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--robots-catalog]
title: Каталог роботов загружается из data/robots.json при инициализации стора

scenarios:
  - given: пользователь открыл приложение, стор роботов ещё пустой
    when: срабатывает `initializeRobots` (через useEffect в корневом
      компоненте `view--robots-catalog`)
    then: |
      состояние стора `robots` заполнено массивом из `data/robots.json`,
      `isLoading` перешёл из true в false, `error` = null.

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeRobots`
    then: |
      `robots = []`, `view--robots-catalog` показывает empty state
      (см. `view--robots-catalog-renders-cards-grid`, сценарий 2).

  - given: при чтении/парсинге JSON выброшена ошибка
    when: `initializeRobots` попадает в catch
    then: |
      `isLoading = false`, `error` = текст ошибки, `view--robots-catalog`
      показывает error state.

verified: true
verified_at: 2026-07-12
verified_note: |
  Проверено чтением кода: `RobotsCatalog.tsx:89-93` — useEffect вызывает
  `initializeRobots()` при пустом сторе; `store.ts:40-56` — impl
  синхронный через `set({ isLoading }) → try/set(robots) / catch/set(error)`.
  Empty/error state отрисовывается в `RobotsCatalog.tsx:184-206`.
  Оговорка: стор импортирует данные из `@build/data/robots.json` —
  merged JSON (parsed + overrides + _meta), генерируется build-time
  скриптом `scripts/build-data`. Первичный источник (`data/robots.json`)
  и overlay (`data/overrides/robots.yml`) прогоняются через merger.
  См. entity `data--robots-catalog`.
