id: view--robots-catalog-renders-cards-grid
kind: behavior
namespace: ui
entities: [view--robots-catalog]
title: view--robots-catalog рендерит сетку карточек мехов из data--robots-catalog

scenarios:
  - given: стор роботов гидратирован, `robots` содержит массив мехов
    when: пользователь открыл приложение
    then: |
      view--robots-catalog рендерит сетку RobotCard — по одной карточке
      на каждый мех из стора. В карточке отображаются: название, тип,
      требуемый уровень, ключевые характеристики (durability, speed и
      т.п.) и звёздочка избранного. Иллюстрация меха — из data--robots-catalog
      (поле imageUrl).

  - given: массив `robots` пуст (данные ещё не загружены или JSON пустой)
    when: пользователь открыл приложение
    then: |
      view--robots-catalog показывает empty state (скелетоны или
      сообщение «нет данных» — конкретика решается в фазе feat).

  - given: `error` не null (ошибка загрузки данных)
    when: пользователь открыл приложение
    then: view--robots-catalog показывает error state (алерт с текстом ошибки).

verified: true
verified_at: 2026-07-12
verified_note: |
  Проверено чтением кода и живого прод-деплоя https://shahimat.github.io/mechs-assistant/:
  `RobotsCatalog.tsx:326-336` рендерит `<Grid>` из RobotCard по массиву
  `otherRobots`, избранные — в отдельной `<FavoritesGrid>` c drag-and-drop
  (dnd-kit); карточка (`RobotCard.tsx:54-117`) отображает название/тип/
  requiredLevel/durability/armor/speed/capacity и звёздочку избранного.
  Empty state — Alert `Нет данных для отображения` (RobotsCatalog.tsx:200-206),
  error state — Alert severity=error с текстом ошибки (192-198). Скелетоны
  из старой формулировки не использованы — конкретика зафиксирована.
  Плюс введён loading state (`CircularProgress`, 184-190) и уточнение
  «Ничего не найдено по фильтрам» при активных фильтрах (319-324).
