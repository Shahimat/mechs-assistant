id: view--cargos-catalog-opens-detail-on-click
kind: behavior
namespace: ui
entities: [view--cargos-catalog]
title: Клик по карточке в view--cargos-catalog открывает детализацию (EquipmentDetail)

scenarios:
  - given: сетка карточек отрисована, пользователь видит нужную запись
    when: пользователь кликает по карточке (не по звёздочке избранного)
    then: |
      открывается `EquipmentDetail` для этой записи — MUI Dialog,
      аналогично `RobotDetail`/`WeaponDetail`. В детализации показаны
      все поля `Equipment`: `family`/`subtype`/`slot`/`requiredLevel`
      + все `stats` (`durability`, `weight`, `primary`, `primaryLabel`)
      + `buyPrice`/`sellPrice` + `craftFromBlueprints` + `description`
      + `requiredRobotType` (у буров).

  - given: EquipmentDetail открыт
    when: пользователь закрывает его (крестик / Esc / клик по фону)
    then: возврат к сетке карточек, состояние стора не меняется.

  - given: пользователь кликает по звёздочке избранного внутри карточки
    when: обработчик события звёздочки перехватывает клик
    then: |
      детализация НЕ открывается, срабатывает только
      `other--favorites-toggle-on-star-click`. Избранное для equipment —
      общий набор ключей на все семь UI-каталогов оборудования.

verified: true
verified_at: 2026-07-14
verified_note: |
  Реализовано: детализация показывает секцию «Преобразование» с
  строкой «Из» (fromKey), списком мини-карточек `IngredientMiniCard`
  (иконка+×N+tooltip+cross-catalog навигация) и строкой «Стоимость»
  (Боны/Реглы). Проверено чтением `WeaponDetail.tsx`/`EquipmentDetail.tsx`
  + build зелёный.
