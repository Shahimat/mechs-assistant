id: data--equipment-catalog-loaded-from-json
kind: behavior
namespace: catalog
entities: [data--equipment-catalog]
title: Каталог оборудования загружается из merged JSON при инициализации стора

scenarios:
  - given: пользователь открыл `/catalogs/equipment-catalog`, стор оборудования пуст
    when: срабатывает `initializeEquipment` (через useEffect в корневом
      компоненте `view--equipment-catalog`)
    then: |
      состояние стора `equipment` заполнено массивом из
      `@build/data/equipment.json`, `isLoading` перешёл из true в false,
      `error` = null. Источник — merged JSON, генерируется build-time
      merger'ом (`scripts/build-data`) из `data/equipment.json` (parsed)
      и `data/overrides/equipment.yml` (overlay из Google Sheets).

  - given: JSON успешно распарсен, но массив пустой
    when: срабатывает `initializeEquipment`
    then: |
      `equipment = []`, `view--equipment-catalog` показывает empty state.

  - given: при чтении/парсинге JSON выброшена ошибка
    when: '`initializeEquipment` попадает в catch'
    then: |
      `isLoading = false`, `error` = текст ошибки, `view--equipment-catalog`
      показывает error state.

verified: true
verified_at: 2026-07-13
verified_note: |
  Проверено чтением кода и прогонами: `src/stores/equipment/store.ts` — `initializeEquipment` (строки 40-56) импортирует `@build/data/equipment.json` (merged JSON) и синхронно ставит `equipment`, `isLoading=false`, `error=null` через try/catch. `EquipmentSubCatalog.tsx:55-59` вызывает `initializeEquipment()` через useEffect при пустом сторе. Merged JSON собирается `scripts/build-data`: `npm run build:data → ✓ equipment: merged 173 entries (0 with overlay) → .build/data/equipment.json`. `npm run build`, `tsc --noEmit`, `npm run lint` — зелёные. Empty/error state рендерится Alert-компонентами в `EquipmentSubCatalog`.
