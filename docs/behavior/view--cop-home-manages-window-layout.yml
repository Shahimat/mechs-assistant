id: view--cop-home-manages-window-layout
kind: behavior
namespace: cop
entities: [view--cop-home]
title: Главная COP запоминает раскладку окон игры и запускает мультибокс по пресету

scenarios:
  - given: открыто одно или несколько окон игры (мультибокс расставлен
      пользователем вручную как удобно), COP на Windows
    when: пользователь жмёт «Запомнить текущую раскладку»
    then: |
      Вызывается list_game_windows(); полученная геометрия окон
      (GameWindow[] { pid, title, x, y, width, height }) сохраняется в
      tauri-store (ключ windowLayout) как пресет
      `{ slots: { x, y, width, height }[] }` — по слоту на окно, в порядке
      выдачи Rust. Число слотов = сколько окон было открыто. Ручного ввода
      координат нет — «запомни как сейчас». Ошибка — в блок .error.

  - given: пресет раскладки сохранён (N слотов)
    when: пользователь жмёт «Запустить и разложить»
    then: |
      Вызывается launch_and_arrange({ baseDir, slots }); запускает N
      инстансов последней версии и раскладывает их окна по слотам.
      На кнопку распространяется тот же кулдаун-гард, что и на одиночный
      запуск. По завершении показывается сводка (сколько запущено/размещено
      + предупреждения по окнам, не появившимся за таймаут); ошибка — в
      блок .error. Кнопка активна только когда пресет сохранён.

  - given: пресет ещё не сохранён (windowLayout пуст)
    when: главная страница смонтирована
    then: |
      Кнопка «Запустить и разложить» неактивна (disabled) — раскладывать
      нечего. Доступна только «Запомнить текущую раскладку». После
      сохранения пресета кнопка мультибокса включается.

  - given: пресет сохранён и переживает перезапуск COP
    when: пользователь закрывает и снова открывает COP
    then: |
      windowLayout читается из tauri-store при монтировании; пресет
      «для конкретного меня» не требует перенастройки между сессиями.

verified: false
verified_note: |
  Реализовано (code-complete): UI раскладки в HomeView.tsx (кнопки
  «Запомнить текущую раскладку» → list_game_windows, «Запустить и
  разложить» → launch_and_arrange, чтение/запись ключа windowLayout в
  tauri-store, disabled-гейт мультизапуска по наличию пресета, общий
  кулдаун-гард с одиночным запуском) + Rust-команды list_game_windows /
  launch_and_arrange. TS typecheck + eslint чисты, `cargo check` на macOS
  проходит (Windows-ветка не собирается). UI в Tauri-окне и реальная
  раскладка не прогонялись — нужен Windows с установленной игрой и открытым
  мультибоксом. До этого verified: false.
