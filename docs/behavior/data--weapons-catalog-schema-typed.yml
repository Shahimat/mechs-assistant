id: data--weapons-catalog-schema-typed
kind: behavior
namespace: catalog
entities: [data--weapons-catalog]
title: Каждая запись в weapons.json соответствует типу Weapon (TS strict)

scenarios:
  - given: 'TypeScript strict включён (`strict: true`) и `resolveJsonModule: true`'
    when: файл `store.ts` импортирует `weaponsData` из
      `@build/data/weapons.json` и приводит его к `Weapon[]`
    then: |
      сборка проходит без ошибок типа. `Weapon`-тип из
      `apps/web/src/types/weapon.ts` (category / group / slot / stats.* / …).

  - given: в JSON появилась запись без обязательного поля (`category`
      / `stats.damageMin` / `stats.durability` / ...)
    when: разработчик пытается собрать проект (`npm run build`)
    then: |
      сборка/typecheck должны падать. На практике `weaponsData as Weapon[]`
      — assert, не runtime-валидация. Оговорка та же, что для всех
      data-каталогов.

  - given: у записи заполнено новое поле `transformsFrom`
    when: TS-компиляция проверяет типы
    then: |
      `transformsFrom?: { fromKey: string; ingredients: TransformIngredient[];
      bondsCost?: number; reglsCost?: number }` — опциональное. Записи
      без него (базовые weapon'ы без предшественника) проходят typecheck.

verified: true
verified_at: 2026-07-14
verified_note: |
  `Weapon.transformsFrom?: Transform` реализован в `apps/web/src/types/weapon.ts`
  (Transform из `apps/web/src/types/common.ts`). Резолвер
  `scripts/parser-wiki/resolvers/weapons.ts::extractTransform`
  распаковывает td «Преобразуется из» + «Для преобразования требуется»:
  275 из 323 записей получили transformsFrom. Merger резолвит
  `ingredients[i].catalog` из parsed JSON-ов (см. `scripts/build-data/
  index.ts::resolveCrossCatalogRefs`). UI-рендер: chip «Транс.» в
  WeaponCard + секция «Преобразование» в WeaponDetail с
  `IngredientMiniCard` для ингредиентов. `npx tsc --noEmit` — 0 ошибок.
