id: view--cop-home-edits-game-settings
kind: behavior
namespace: cop
entities: [view--cop-home]
title: Главная COP редактирует настройки игры, чистит регданные, ребиндит мышь и открывает папку игры

scenarios:
  - given: главная COP смонтирована, стиль блока — минимализм (иконка-кнопки
      без текста, всё в тултипах)
    when: пользователь жмёт иконку-шестерёнку «Настройки игры»
    then: |
      Открывается модалка редактора: invoke('read_game_settings', { baseDir })
      отдаёт упорядоченный `SettingEntry[]`. При первом открытии Rust создаёт
      бэкап-дамп без регданных (см.
      other--cop-native-bridge-manages-game-settings). Редактор ГЕНЕРИЧЕСКИЙ:
      виджет по типу (int/float → числовое поле, bool → тумблер, str → текст,
      `Keyboard:*` → контрол захвата клавиши), ключи сгруппированы по префиксу
      до `:` (Keyboard, Render, Game:Colors и т.п.). Регистрационные поля
      (`LastEmail`, `LicenseKey`) и непрозрачные блобы (`UI:Setting`,
      `Game:Colors:*`) не выставляются как редактируемые. Ошибка — в блок .error.

  - given: модалка открыта, значения отредактированы
    when: пользователь жмёт иконку сохранения
    then: |
      invoke('write_game_settings', { baseDir, entries }) пишет значения
      обратно с сохранением формата и нетронутых ключей; показывается успех.
      Ошибка — в .error.

  - given: в конфиге есть регистрационные данные
    when: пользователь жмёт иконку-корзину «Удалить регданные»
    then: |
      invoke('strip_registration', { baseDir }) затирает `LastEmail` и
      `LicenseKey` в живом конфиге (email + лицензионный ключ). Действие —
      единственный путь тронуть регданные из UI (в самом редакторе они скрыты).

  - given: бэкап-дамп существует
    when: пользователь жмёт иконку «Вернуть как было»
    then: |
      invoke('restore_game_settings', { baseDir }) применяет бэкап, СОХРАНЯЯ
      текущие `LastEmail`/`LicenseKey` (в дампе их нет — восстановление не
      разлогинивает игру). Редактор перечитывается.

  - given: главная COP смонтирована
    when: пользователь жмёт иконку-папку «Открыть папку игры»
    then: invoke('open_game_folder', { baseDir }) открывает файловый менеджер
      на папке игры (`…\MechsEarth`).

  - given: боковые кнопки мыши игра не понимает нативно
    when: пользователь в секции ребинда задаёт «кнопка мыши → игровая клавиша»
      и включает ребинд
    then: |
      invoke('start_mouse_remap', { bindings }) включает нативный ремап;
      повторное выключение — stop_mouse_remap. Клавиша уходит только в активное
      окно игры (см. other--cop-native-bridge-remaps-mouse-to-active-window),
      маппинг персистится в tauri-store.

verified: false
verified_note: |
  Реализовано: features/home/GameSettingsModal.tsx (генерик-виджеты по типу,
  группировка по префиксу до `:`, Keyboard:* — захват клавиши, непрозрачные
  блобы UI:Setting/Game:Colors:* заблокированы; секция ребинда мыши с
  тумблером и правкой клавиш, персист в tauri-store ключ mouseRemap) +
  иконка-кнопки на главной (HomeView.tsx: настройки, открыть папку) icon-only
  через HomeIconButton + shell Tooltip; порядок ряда запуска: запуск → папка →
  настройки → закрыть все сессии (крайняя правая, danger). Регистрационные
  поля в редакторе скрыты (фильтр REG_KEYS), тронуть — только «удалить
  регданные». tsc + eslint зелёные. НЕ проверено в живом приложении на
  Windows (рендеринг модалки, захват клавиш, реальный конфиг) — verified: false.
