name: build-inventory-parser

# Собирает Tauri-приложение apps/inventory-parser под Windows.
# Запуск — только вручную (workflow_dispatch). Артефакты (.exe, .msi)
# кладутся в Actions → run → Artifacts на 30 дней.
#
# Не триггерится по push, чтобы не жечь CI-минуты на каждый мелкий
# коммит; собираем осознанно, когда хотим свежий билд для теста.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Cargo build profile'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: build-inventory-parser
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/inventory-parser
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/inventory-parser/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/inventory-parser/src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        run: |
          if ('${{ inputs.profile }}' -eq 'debug') {
            npm run tauri build -- --debug
          } else {
            npm run tauri build
          }
        shell: pwsh

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-parser-exe
          path: apps/inventory-parser/src-tauri/target/${{ inputs.profile }}/inventory-parser.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload installer artifacts (.msi + .exe setup)
        uses: actions/upload-artifact@v4
        with:
          name: inventory-parser-installers
          path: |
            apps/inventory-parser/src-tauri/target/${{ inputs.profile }}/bundle/msi/*.msi
            apps/inventory-parser/src-tauri/target/${{ inputs.profile }}/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
