name: sync-sheets

on:
  workflow_dispatch:

concurrency:
  group: sync-sheets
  cancel-in-progress: false

jobs:
  sync-sheets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT под учёткой владельца — нужен, чтобы push в main прошёл
          # bypass ruleset (Write-role bypass покрывает людей, а не
          # github-actions[bot]). Тот же секрет, что в
          # merge-develop-to-main.
          token: ${{ secrets.MERGE_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.email "sync-bot@users.noreply.github.com"
          git config user.name "mechs-sync-bot"

      - name: Sync sheets
        env:
          GSHEETS_SA_KEY: ${{ secrets.GSHEETS_SA_KEY }}
          MECHS_OVERLAY_SPREADSHEET_ID: ${{ secrets.MECHS_OVERLAY_SPREADSHEET_ID }}
        run: |
          # parser-google-sheets читает GSHEETS_SA_KEY (не GSHEETS_SA_KEY_PATH) — JSON строкой из secret.
          npm run sync:sheets

      - name: Commit overrides
        id: commit
        run: |
          git add data/overrides/
          if git diff --cached --quiet; then
            echo "Изменений нет"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "sync: overrides from Google Sheets ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
