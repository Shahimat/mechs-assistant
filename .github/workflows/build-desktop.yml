name: build-desktop

on:
  push:
    branches: [develop]
    paths:
      - 'apps/cop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      job:
        description: 'Что собрать: dev (тест-артефакты) или release (публикация)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - release
      profile:
        description: 'Cargo-профиль (только для job=dev)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: build-desktop-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.job == 'dev')
    runs-on: windows-latest
    env:
      BUILD_PROFILE: ${{ inputs.profile || 'release' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/cop/src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        working-directory: apps/cop
        shell: pwsh
        run: |
          '{"bundle":{"createUpdaterArtifacts":false}}' | Set-Content updater-off.json
          if ('${{ env.BUILD_PROFILE }}' -eq 'debug') {
            npm run tauri build -- --debug --config updater-off.json
          } else {
            npm run tauri build -- --config updater-off.json
          }

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mechs-cop-exe
          path: apps/cop/src-tauri/target/${{ env.BUILD_PROFILE }}/mechs-cop.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload installer artifacts (.msi + .exe setup)
        uses: actions/upload-artifact@v4
        with:
          name: mechs-cop-installers
          path: |
            apps/cop/src-tauri/target/${{ env.BUILD_PROFILE }}/bundle/msi/*.msi
            apps/cop/src-tauri/target/${{ env.BUILD_PROFILE }}/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'release' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    env:
      APP_VERSION: 0.1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/cop/src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Inject version into tauri.conf.json and package.json
        working-directory: apps/cop
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          (Get-Content src-tauri/tauri.conf.json) `
            -replace '"version":\s*"[^"]+"', ('"version": "' + $version + '"') `
            | Set-Content src-tauri/tauri.conf.json
          (Get-Content package.json) `
            -replace '"version":\s*"[^"]+"', ('"version": "' + $version + '"') `
            | Set-Content package.json
          Write-Host "Version set to $version"

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/cop
          tagName: mechs-cop-v${{ env.APP_VERSION }}
          releaseName: 'Mechs COP v${{ env.APP_VERSION }}'
          releaseBody: |
            Ручная сборка из main (commit ${{ github.sha }}).

            Установка: скачай `.msi` или NSIS `-setup.exe` ниже,
            запусти. Уже установленное приложение обновится
            автоматически — не надо вручную качать.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
